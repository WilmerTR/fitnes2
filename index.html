<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="theme-color" content="#0f1117"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>FitApp</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#0f1117;--bg2:#181d28;--bg3:#1e2433;--bg4:#252c3d;--bg5:#2e3650;
  --b:rgba(255,255,255,0.06);--b2:rgba(255,255,255,0.12);
  --t:#f0f2f8;--t2:#8b93a8;--t3:#4a5268;
  --acc:#f5c518;
  --acc2:#e6b800;
  --blue:#4d9fff;--green:#3dd68c;--red:#ff5c5c;--orange:#ff8c42;--teal:#2dd4bf;--purple:#a78bfa;
  --r:12px;--r2:18px;--r3:22px;
  --card-grad:linear-gradient(135deg,#1e2433,#181d28);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--t);font-family:'DM Sans',sans-serif;overflow:hidden}
body{display:flex;flex-direction:column;max-width:430px;margin:0 auto}

/* SPLASH */
#splash{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .5s}
#splash.hide{opacity:0;pointer-events:none}
.sp-logo{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:90px;color:var(--acc);letter-spacing:-3px;line-height:1;text-shadow:0 0 40px rgba(245,197,24,.4)}
.sp-sub{font-size:11px;letter-spacing:4px;color:var(--t3);margin-top:6px;text-transform:uppercase}
.sp-bar{width:100px;height:2px;background:var(--bg3);border-radius:2px;margin-top:48px;overflow:hidden}
.sp-fill{height:2px;background:var(--acc);animation:spfill 2s cubic-bezier(.4,0,.2,1) forwards}
@keyframes spfill{from{width:0}to{width:100%}}
.sp-status{font-size:11px;color:var(--t3);margin-top:16px;letter-spacing:1px}

/* LOGIN */
#loginScreen{position:fixed;inset:0;background:var(--bg);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:9998;padding:32px}
#loginScreen.show{display:flex}
.login-logo{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:72px;color:var(--acc);letter-spacing:-2px;line-height:1;margin-bottom:8px}
.login-sub{font-size:12px;color:var(--t3);letter-spacing:3px;text-transform:uppercase;margin-bottom:48px}
.login-title{font-size:18px;font-weight:600;color:var(--t);margin-bottom:8px}
.login-desc{font-size:13px;color:var(--t2);text-align:center;line-height:1.7;margin-bottom:32px;max-width:280px}
.google-btn{display:flex;align-items:center;gap:12px;padding:14px 24px;background:white;border:none;border-radius:var(--r2);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;color:#1a1a1a;width:100%;max-width:300px;justify-content:center;transition:all .2s;box-shadow:0 4px 20px rgba(0,0,0,.4)}
.google-btn:hover{opacity:.9}
.google-btn svg{flex-shrink:0}
.sync-badge{display:flex;align-items:center;gap:6px;margin-top:20px;font-size:11px;color:var(--t3)}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--green)}

/* HEADER */
.header{padding:env(safe-area-inset-top,14px) 18px 12px;flex-shrink:0}
.hrow{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.logo{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:26px;color:var(--acc);letter-spacing:-0.5px;text-shadow:0 0 12px rgba(245,197,24,.3)}
.hright{display:flex;align-items:center;gap:8px}
.wchip{display:flex;align-items:center;gap:5px;background:var(--bg3);border:0.5px solid var(--b2);border-radius:999px;padding:5px 12px;font-size:11px;color:var(--t2)}
.wchip b{color:var(--acc);font-weight:700;text-shadow:0 0 8px rgba(245,197,24,.3)}
.user-avatar{width:28px;height:28px;border-radius:50%;cursor:pointer;border:1.5px solid var(--b2)}
.user-placeholder{width:28px;height:28px;border-radius:50%;background:var(--bg3);border:1.5px solid var(--b2);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:12px;color:var(--t3)}

.dstrip{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none}
.dstrip::-webkit-scrollbar{display:none}
.dp{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:2px;padding:9px 11px;background:var(--bg2);border:0.5px solid var(--b);border-radius:var(--r);cursor:pointer;transition:all .18s;min-width:46px;position:relative}
.dp.active{background:var(--acc);border-color:var(--acc);box-shadow:0 0 12px rgba(245,197,24,.3)}
.dp.active .dpn,.dp.active .dpd{color:#000}
.dp.rest-d{opacity:.4}
.dpn{font-size:11px;font-weight:700;color:var(--t);font-family:'Barlow Condensed',sans-serif;letter-spacing:.3px}
.dpd{font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px}
.dpdot{width:4px;height:4px;border-radius:50%;background:var(--green);position:absolute;top:5px;right:5px;opacity:0}
.dp.done-d .dpdot{opacity:1}

.main{flex:1;overflow-y:auto;padding:0 18px 110px;scrollbar-width:none}
.main::-webkit-scrollbar{display:none}

/* SYNC INDICATOR */
.sync-bar{display:flex;align-items:center;gap:6px;padding:6px 12px;background:rgba(45,212,191,.08);border:0.5px solid rgba(45,212,191,.15);border-radius:999px;font-size:10px;color:var(--teal);margin-bottom:10px;width:fit-content}
.sync-bar.saving{color:var(--orange);background:rgba(251,146,60,.08);border-color:rgba(251,146,60,.15)}
.sync-bar.error{color:var(--red);background:rgba(248,113,113,.08);border-color:rgba(248,113,113,.15)}
.sync-pulse{width:5px;height:5px;border-radius:50%;background:currentColor;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* HERO */
.hero{background:var(--card-grad);border:0.5px solid var(--b2);border-radius:var(--r3);padding:20px;margin:8px 0 12px;position:relative;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,.3)}
.hero::after{content:'';position:absolute;top:-50px;right:-50px;width:160px;height:160px;border-radius:50%;background:var(--acc);opacity:.03}
.hero-cat{font-size:10px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;margin-bottom:4px}
.hero-name{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:44px;color:var(--t);line-height:1;letter-spacing:-.5px}
.hero-focus{font-size:12px;color:var(--t2);margin-top:3px}
.hero-meta{display:flex;gap:20px;margin-top:16px}
.hm{display:flex;flex-direction:column;gap:1px}
.hmv{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:700;color:var(--t);line-height:1}
.hml{font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.6px}
.prog-track{background:var(--bg4);height:3px;border-radius:3px;margin-bottom:18px;overflow:hidden}
.prog-fill{height:3px;background:linear-gradient(90deg,var(--acc),var(--acc2));border-radius:3px;transition:width .5s cubic-bezier(.4,0,.2,1);box-shadow:0 0 6px rgba(245,197,24,.4)}

.slbl{font-size:9px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--t3);margin-bottom:8px}

.icard{background:var(--bg2);border:0.5px solid var(--b);border-radius:var(--r2);padding:13px 15px;margin-bottom:18px;display:flex;align-items:flex-start;gap:11px}
.iico{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:15px}
.iico-blue{background:rgba(96,165,250,.1)}
.iico-teal{background:rgba(45,212,191,.1)}
.itext{font-size:12px;color:var(--t2);line-height:1.65}
.itext strong{color:var(--t);font-weight:600}

/* EXERCISE CARDS */
.exlist{display:flex;flex-direction:column;gap:8px;margin-bottom:20px}
.excard{background:var(--card-grad);border:0.5px solid var(--b);border-radius:var(--r2);overflow:hidden;transition:border-color .2s,opacity .2s;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.excard.done-c{opacity:.38}
.excard.open-c{border-color:rgba(245,197,24,.3)}
.extop{display:flex;align-items:center;gap:10px;padding:14px;cursor:pointer;user-select:none}
.exnum{width:30px;height:30px;border-radius:9px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--t2);flex-shrink:0;font-family:'Barlow Condensed',sans-serif}
.exnum.k{background:rgba(245,197,24,.15);color:var(--acc);box-shadow:0 0 8px rgba(245,197,24,.2)}
.exbody{flex:1;min-width:0}
.exname{font-size:14px;font-weight:600;color:var(--t);display:flex;align-items:center;gap:6px;flex-wrap:wrap;line-height:1.3}
.kbadge{font-size:9px;font-weight:700;letter-spacing:1px;padding:2px 7px;border-radius:999px;background:rgba(245,197,24,.15);color:var(--acc);text-transform:uppercase;flex-shrink:0;border:0.5px solid rgba(245,197,24,.3)}
.exsets{font-size:11px;color:var(--t2);margin-top:2px}
.exmuscle{font-size:10px;padding:3px 9px;border-radius:999px;background:var(--bg3);color:var(--t3);flex-shrink:0;border:0.5px solid var(--b)}
.chk{width:26px;height:26px;border-radius:50%;border:1.5px solid var(--b2);display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;transition:all .18s}
.chk.done{background:var(--acc);border-color:var(--acc)}
.chk svg{opacity:0}.chk.done svg{opacity:1}
.chev{color:var(--t3);font-size:13px;transition:transform .22s;flex-shrink:0}
.excard.open-c .chev{transform:rotate(180deg)}
.exdetail{display:none;padding:0 14px 14px;border-top:0.5px solid var(--b)}
.exdetail.open{display:block}

/* WEIGHT BOX */
.wbox{background:var(--bg3);border-radius:var(--r);padding:12px 14px;margin:12px 0 8px}
.wbox-top{display:flex;align-items:center;gap:10px}
.wbox-ico{font-size:18px;flex-shrink:0}
.wbox-info{flex:1;min-width:0}
.wbox-lbl{font-size:10px;color:var(--t3);margin-bottom:2px;text-transform:uppercase;letter-spacing:1px}
.wbox-rec{font-size:11px;color:var(--acc);font-weight:600;line-height:1.4}
.winput{background:var(--bg4);border:0.5px solid var(--b2);border-radius:9px;color:var(--t);font-family:'DM Sans',sans-serif;font-size:20px;font-weight:700;width:72px;padding:7px 8px;text-align:center;flex-shrink:0}
.winput:focus{outline:none;border-color:var(--acc)}
.wunit{font-size:11px;color:var(--t3);flex-shrink:0}
.whislist{margin-top:10px;border-top:0.5px solid var(--b);padding-top:8px;display:flex;flex-direction:column}
.whis-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:0.5px solid var(--b)}
.whis-row:last-child{border-bottom:none}
.whis-week{font-size:11px;color:var(--t3)}
.whis-val{font-size:13px;font-weight:600;color:var(--t);display:flex;align-items:center;gap:5px}
.d-up{color:var(--green);font-size:10px}
.d-dn{color:var(--red);font-size:10px}
.d-eq{color:var(--t3);font-size:10px}

.alt-toggle{display:flex;background:var(--bg4);border:0.5px solid var(--b);border-radius:var(--r);overflow:hidden;margin:10px 0}
.alt-btn{flex:1;padding:8px;font-size:12px;font-weight:600;color:var(--t3);background:transparent;border:none;cursor:pointer;transition:all .18s;font-family:'DM Sans',sans-serif}
.alt-btn.act-alt{background:var(--bg2);color:var(--t);border:0.5px solid var(--b2)}
.alt-tip{font-size:11px;color:var(--teal);background:rgba(45,212,191,.07);border:0.5px solid rgba(45,212,191,.15);border-radius:var(--r);padding:10px 12px;margin-bottom:10px;line-height:1.6}
.alt-content{display:none}.alt-content.show{display:block}

.tipbox{font-size:12px;color:var(--t2);line-height:1.7;margin:8px 0 12px;padding:12px;background:rgba(245,197,24,.05);border-radius:var(--r);border-left:2px solid var(--acc)}
.tipbox strong{color:var(--acc);font-weight:600}
.ytlink{display:flex;align-items:center;gap:10px;padding:11px 13px;background:rgba(248,113,113,.08);border:0.5px solid rgba(248,113,113,.18);border-radius:var(--r);text-decoration:none;color:var(--t)}
.ytico{width:30px;height:30px;background:#ff0000;border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.yttxt{font-size:12px;font-weight:500}.ytsub{font-size:10px;color:var(--t2);margin-top:1px}

/* ACTIVATION */
.actsec{background:rgba(251,146,60,.07);border:0.5px solid rgba(251,146,60,.2);border-radius:var(--r3);padding:16px;margin-bottom:16px}
.acthdr{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.acttitle{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:22px;color:var(--orange);letter-spacing:-.3px}
.actsub{font-size:10px;color:var(--t2);margin-top:1px}
.actitems{display:flex;flex-direction:column;gap:7px}
.actitem{background:var(--bg3);border-radius:var(--r);padding:11px 13px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:opacity .18s}
.actitem.done-a{opacity:.35}
.actbody{flex:1}
.actname{font-size:13px;font-weight:600;color:var(--t)}
.actsubs{font-size:11px;color:var(--t2);margin-top:1px}
.achk{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--b2);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .18s}
.achk.done{background:var(--orange);border-color:var(--orange)}
.achk svg{opacity:0}.achk.done svg{opacity:1}
.actwarn{font-size:11px;color:rgba(251,146,60,.75);margin-top:10px;line-height:1.6;padding:10px;background:rgba(251,146,60,.05);border-radius:10px}

/* REST */
.restscr{display:flex;flex-direction:column;align-items:center;padding:32px 0 20px;text-align:center}
.restbig{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:100px;color:var(--bg3);line-height:1}
.resttitle{font-family:'Barlow Condensed',sans-serif;font-size:32px;font-weight:800;color:var(--t);margin-bottom:8px}
.restdesc{font-size:13px;color:var(--t2);line-height:1.7;max-width:280px;margin-bottom:18px}
.resttip{background:var(--bg2);border:0.5px solid var(--b);border-radius:var(--r2);padding:14px 16px;font-size:12px;color:var(--t2);line-height:1.7;text-align:left;width:100%;margin-bottom:16px}
.resttip strong{color:var(--acc)}

/* STATS */
.statsgrid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:20px}
.statcard{background:var(--bg2);border:0.5px solid var(--b);border-radius:var(--r2);padding:16px}
.statnum{font-family:'Barlow Condensed',sans-serif;font-size:48px;font-weight:800;color:var(--acc);line-height:1;text-shadow:0 0 20px rgba(245,197,24,.3)}
.statlbl{font-size:11px;color:var(--t2);margin-top:2px}
.weekbars{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:20px}
.wb{display:flex;flex-direction:column;align-items:center;gap:4px}
.wbn{font-size:9px;color:var(--t3)}
.wbwrap{width:100%;height:50px;background:var(--bg3);border-radius:4px;overflow:hidden;display:flex;align-items:flex-end}
.wbbar{width:100%;background:linear-gradient(180deg,var(--acc),var(--acc2));border-radius:4px;transition:height .5s cubic-bezier(.4,0,.2,1)}
.btn-out{flex:1;padding:11px;background:var(--bg2);border:0.5px solid var(--b);border-radius:var(--r);color:var(--t2);font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer}
.btn-danger{width:100%;padding:11px;background:rgba(248,113,113,.08);border:0.5px solid rgba(248,113,113,.18);border-radius:var(--r);color:var(--red);font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;margin-top:6px}
.logout-btn{width:100%;padding:11px;background:var(--bg2);border:0.5px solid var(--b);border-radius:var(--r);color:var(--t2);font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;margin-top:6px;display:flex;align-items:center;justify-content:center;gap:8px}

/* BODY MEASUREMENTS */
.mcard{background:var(--bg2);border:0.5px solid var(--b2);border-radius:var(--r3);padding:18px;margin-bottom:14px}
.mcard-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.mcard-title{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:800;color:var(--t);letter-spacing:-.3px}
.mcard-date{font-size:11px;color:var(--t3)}
.mgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.mfield{display:flex;flex-direction:column;gap:4px}
.mfield-lbl{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:1px}
.mfield-row{display:flex;align-items:center;gap:5px}
.minput{background:var(--bg3);border:0.5px solid var(--b2);border-radius:9px;color:var(--t);font-family:'DM Sans',sans-serif;font-size:18px;font-weight:700;width:100%;padding:8px 10px;text-align:center}
.minput:focus{outline:none;border-color:var(--acc)}
.munit{font-size:10px;color:var(--t3);white-space:nowrap}
.mbtn{width:100%;padding:13px;background:linear-gradient(135deg,var(--acc),var(--acc2));color:#000;border:none;border-radius:var(--r);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:700;cursor:pointer;box-shadow:0 4px 15px rgba(245,197,24,.25)}
.mhist-title{font-size:9px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--t3);margin:18px 0 10px}
.mhist-entry{background:var(--bg2);border:0.5px solid var(--b);border-radius:var(--r2);padding:14px;margin-bottom:8px}
.mhist-date{font-size:11px;color:var(--acc);font-weight:600;margin-bottom:10px}
.mhist-vals{display:grid;grid-template-columns:1fr 1fr;gap:4px}
.mhist-item{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:0.5px solid var(--b)}
.mhist-item:last-child{border-bottom:none}
.mhist-k{font-size:11px;color:var(--t2)}
.mhist-v{font-size:12px;font-weight:600;color:var(--t);display:flex;align-items:center;gap:4px}
.dg{color:var(--green);font-size:10px}
.dr{color:var(--red);font-size:10px}
.dn{color:var(--t3);font-size:10px}
.no-meas{text-align:center;padding:28px 16px;color:var(--t3);font-size:13px;line-height:1.8}

/* TIPS */
.tipcard{background:var(--bg2);border:0.5px solid var(--b);border-radius:var(--r2);padding:16px;margin-bottom:10px}
.tipctitle{font-size:13px;font-weight:600;color:var(--t);margin-bottom:6px;display:flex;align-items:center;gap:8px}
.tipnum{width:22px;height:22px;border-radius:7px;background:rgba(245,197,24,.12);color:var(--acc);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:'Barlow Condensed',sans-serif;border:0.5px solid rgba(245,197,24,.2)}
.tipbody{font-size:12px;color:var(--t2);line-height:1.7}

/* ACTIVATION HISTORY */
.act-hist{background:var(--bg2);border:0.5px solid var(--b);border-radius:var(--r2);padding:14px;margin-top:12px}
.act-hist-title{font-size:9px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--t3);margin-bottom:10px}
.act-hist-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.act-hist-day{display:flex;flex-direction:column;align-items:center;gap:4px;padding:6px 2px;border-radius:8px;background:var(--bg3)}
.act-hist-today{border:1px solid var(--acc);background:rgba(212,255,71,.06)}
.act-hist-done .act-hist-dot{background:var(--acc);color:#000;font-weight:700;box-shadow:0 0 8px rgba(245,197,24,.4)}
.act-hist-lbl{font-size:9px;color:var(--t3)}
.act-hist-today .act-hist-lbl{color:var(--acc)}
.act-hist-dot{width:24px;height:24px;border-radius:50%;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--t3)}


/* PROFILE */
.prof-hero{background:var(--bg2);border:0.5px solid var(--b2);border-radius:var(--r3);padding:24px 20px;margin-bottom:14px;position:relative;overflow:hidden;text-align:center}
.prof-hero::before{content:'';position:absolute;top:-60px;right:-60px;width:200px;height:200px;border-radius:50%;background:var(--acc);opacity:.04}
.prof-avatar{width:80px;height:80px;border-radius:50%;border:3px solid var(--acc);margin:0 auto 12px;display:block;object-fit:cover}
.prof-avatar-placeholder{width:80px;height:80px;border-radius:50%;border:3px solid var(--acc);margin:0 auto 12px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:32px}
.prof-name{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:28px;color:var(--t);letter-spacing:-.3px;margin-bottom:2px}
.prof-email{font-size:11px;color:var(--t3);margin-bottom:16px}
.prof-badges{display:flex;justify-content:center;gap:8px;flex-wrap:wrap}
.prof-badge{display:flex;align-items:center;gap:5px;padding:5px 12px;border-radius:999px;font-size:11px;font-weight:600;border:0.5px solid}
.prof-badge-acc{background:rgba(245,197,24,.12);color:var(--acc);border-color:rgba(245,197,24,.3)}
.prof-badge-orange{background:rgba(251,146,60,.1);color:var(--orange);border-color:rgba(251,146,60,.2)}
.prof-badge-blue{background:rgba(96,165,250,.1);color:var(--blue);border-color:rgba(96,165,250,.2)}
.prof-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px;margin-bottom:14px}
.prof-stat{background:var(--bg2);border:0.5px solid var(--b);border-radius:var(--r2);padding:14px 10px;text-align:center}
.prof-stat-num{font-family:'Barlow Condensed',sans-serif;font-size:38px;font-weight:800;color:var(--acc);line-height:1;text-shadow:0 0 15px rgba(245,197,24,.25)}
.prof-stat-lbl{font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:1px;margin-top:3px;line-height:1.3}
.prof-section{background:var(--bg2);border:0.5px solid var(--b);border-radius:var(--r2);padding:16px;margin-bottom:10px}
.prof-section-title{font-size:9px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--t3);margin-bottom:12px}
.prof-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:0.5px solid var(--b)}
.prof-row:last-child{border-bottom:none}
.prof-row-left{display:flex;align-items:center;gap:10px}
.prof-row-ico{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.prof-row-label{font-size:13px;color:var(--t);font-weight:500}
.prof-row-sub{font-size:11px;color:var(--t3);margin-top:1px}
.prof-row-val{font-size:13px;font-weight:700;color:var(--acc)}
.streak-bar{display:flex;gap:4px;margin-top:10px}
.streak-day{flex:1;height:6px;border-radius:3px;background:var(--bg4)}
.streak-day.done{background:var(--acc)}
.streak-day.rest-s{background:var(--bg3)}
.ring-wrap{position:relative;width:80px;height:80px}
.ring-wrap svg{transform:rotate(-90deg)}
.ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring-pct{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:800;color:var(--acc);line-height:1}
.ring-lbl{font-size:8px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px}


/* 1RM TEST */
.test-wrap{padding:14px 0}
.test-hero{background:linear-gradient(135deg,rgba(245,197,24,.1),rgba(245,197,24,.02));border:0.5px solid rgba(245,197,24,.25);border-radius:var(--r3);padding:22px 18px;margin-bottom:14px;text-align:center;box-shadow:0 4px 20px rgba(245,197,24,.08)}
.test-icon{font-size:40px;margin-bottom:8px}
.test-title{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:28px;color:var(--acc);letter-spacing:-.3px;margin-bottom:4px;text-shadow:0 0 20px rgba(245,197,24,.3)}
.test-sub{font-size:12px;color:var(--t2);line-height:1.6;max-width:280px;margin:0 auto}
.test-exlist{display:flex;flex-direction:column;gap:8px;margin-bottom:14px}
.test-exitem{background:var(--bg2);border:0.5px solid var(--b);border-radius:var(--r2);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:border-color .2s}
.test-exitem:hover{border-color:var(--b2)}
.test-exitem.has-rm{border-color:rgba(74,222,128,.3)}
.test-exleft{display:flex;align-items:center;gap:10px}
.test-exico{width:34px;height:34px;border-radius:10px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.test-exname{font-size:14px;font-weight:600;color:var(--t)}
.test-exsub{font-size:11px;color:var(--t3);margin-top:1px}
.test-rm-badge{font-size:12px;font-weight:700;color:var(--green);background:rgba(74,222,128,.1);border:0.5px solid rgba(74,222,128,.2);padding:4px 10px;border-radius:999px}
.test-rm-badge.pending{color:var(--t3);background:var(--bg3);border-color:var(--b)}

.test-step{background:var(--bg2);border:0.5px solid var(--b2);border-radius:var(--r3);padding:20px;margin-bottom:12px}
.test-step-num{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--acc);margin-bottom:4px}
.test-step-title{font-family:'Barlow Condensed',sans-serif;font-size:24px;font-weight:800;color:var(--t);margin-bottom:8px}
.test-step-body{font-size:13px;color:var(--t2);line-height:1.7}

.warmup-series{display:flex;flex-direction:column;gap:8px;margin:12px 0}
.warmup-row{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--bg3);border-radius:var(--r)}
.warmup-pct{font-size:11px;font-weight:700;color:var(--acc);width:36px;flex-shrink:0;text-shadow:0 0 8px rgba(245,197,24,.3)}
.warmup-peso{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:800;color:var(--t);flex:1}
.warmup-reps{font-size:12px;color:var(--t2)}

.test-inputs{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:14px 0}
.test-input-wrap{display:flex;flex-direction:column;gap:6px}
.test-input-lbl{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:1px}
.test-input-row{display:flex;align-items:center;gap:6px}
.test-big-input{background:var(--bg3);border:0.5px solid var(--b2);border-radius:var(--r);color:var(--t);font-family:'Barlow Condensed',sans-serif;font-size:32px;font-weight:800;width:100%;padding:10px 12px;text-align:center}
.test-big-input:focus{outline:none;border-color:var(--acc)}
.test-unit{font-size:12px;color:var(--t3)}

.rir-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:12px 0}
.rir-btn{padding:14px 8px;background:var(--bg3);border:0.5px solid var(--b);border-radius:var(--r);color:var(--t2);font-size:13px;font-weight:600;cursor:pointer;text-align:center;transition:all .18s;font-family:'DM Sans',sans-serif}
.rir-btn.selected{background:rgba(212,255,71,.12);border-color:var(--acc);color:var(--acc)}
.rir-btn.invalid{background:rgba(248,113,113,.08);border-color:rgba(248,113,113,.2);color:var(--red)}

.rm-result{background:linear-gradient(135deg,rgba(245,197,24,.12),rgba(245,197,24,.03));border:0.5px solid rgba(245,197,24,.35);border-radius:var(--r3);padding:24px;text-align:center;margin:14px 0;box-shadow:0 8px 30px rgba(245,197,24,.1)}
.rm-result-label{font-size:11px;color:var(--t3);text-transform:uppercase;letter-spacing:2px;margin-bottom:4px}
.rm-result-num{font-family:'Barlow Condensed',sans-serif;font-size:72px;font-weight:900;color:var(--acc);line-height:1;text-shadow:0 0 30px rgba(245,197,24,.4)}
.rm-result-unit{font-size:18px;color:var(--t2);margin-bottom:16px}
.rm-work-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:14px}
.rm-work-item{background:var(--bg2);border-radius:var(--r);padding:10px;text-align:center}
.rm-work-pct{font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:1px}
.rm-work-peso{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:800;color:var(--t)}
.rm-work-uso{font-size:10px;color:var(--t2);margin-top:2px}

/* BOTTOM NAV */
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:rgba(15,17,23,.97);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-top:0.5px solid rgba(245,197,24,.1);padding:8px 10px env(safe-area-inset-bottom,10px);display:flex;gap:3px;z-index:100}
.nbtn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 2px;border-radius:var(--r);border:none;background:transparent;color:var(--t3);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:9px;letter-spacing:.2px;transition:all .18s}
.nbtn.active{background:rgba(245,197,24,.12);color:var(--t);border:0.5px solid rgba(245,197,24,.2)}
.nbtn.active .ni{color:var(--acc);filter:drop-shadow(0 0 4px rgba(245,197,24,.5))}
.ni{font-size:15px;line-height:1;transition:color .18s}

@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.fade{animation:fadeUp .3s ease both}
</style>
</head>

// ── STRIP ─────────────────────────────────────────────────────────
function buildStrip(){
  const c = document.getElementById('dayStrip');
  c.innerHTML = '';
  DAYS.forEach((d,i)=>{
    const k = `${weekNum}_${i}`;
    const allDone = d.exercises.length>0 && d.exercises.every((_,ei)=>checked[`${k}_${ei}`]);
    const el = document.createElement('div');
    el.className='dp'+(i===curDay?' active':'')+(d.rest?' rest-d':'')+(allDone?' done-d':'');
    el.innerHTML=`<span class="dpn">${d.short}</span><span class="dpd">${d.name.substring(0,3)}</span><div class="dpdot"></div>`;
    el.onclick=()=>{ curDay=i; expanded={}; altState={}; buildStrip(); renderWorkout(); };
    c.appendChild(el);
  });
  c.children[curDay].scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'});
}

// ── WEIGHT BOX ────────────────────────────────────────────────────
// Map dayIdx+exIdx to 1RM key
const EX_RM_MAP = {
  '0_0':'press_banca',
  '1_0':'sentadilla',  '1_1':'peso_muerto', '1_3':'hip_thrust',
  '3_0':'press_banca_jue', '3_3':'press_militar',
  '4_0':'remo_barra',
  '5_0':'bulg_smith',  '5_2':'rdl', '5_3':'hip_thrust_sab'
};

function weightBox(dayIdx, exIdx, rec){
  const baseKey  = `${weekNum}_${dayIdx}_${exIdx}`;
  const rmKey    = EX_RM_MAP[`${dayIdx}_${exIdx}`];
  const rm       = rmKey ? oneRM[rmKey] : null;

  // ── Si tiene 1RM → mostrar peso automático ──
  if(rm){
    const w75 = Math.round(rm*0.75/2.5)*2.5;
    const w80 = Math.round(rm*0.80/2.5)*2.5;
    const w70 = Math.round(rm*0.70/2.5)*2.5;
    const warmup = [
      {pct:40, peso:Math.round(rm*0.40/2.5)*2.5, reps:8},
      {pct:60, peso:Math.round(rm*0.60/2.5)*2.5, reps:5},
      {pct:75, peso:Math.round(rm*0.75/2.5)*2.5, reps:3},
    ];
    let warmupHTML='';
    warmup.forEach(s=>{
      warmupHTML+=`<div class="warmup-row">
        <div class="warmup-pct">${s.pct}%</div>
        <div class="warmup-peso">${s.peso>0?s.peso+'kg':'Peso corporal'}</div>
        <div class="warmup-reps">${s.reps} reps</div>
      </div>`;
    });

    return `<div class="wbox">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
        <span style="font-size:18px">🤖</span>
        <div style="flex:1">
          <div class="wbox-lbl">Peso calculado — 1RM: ${rm}kg</div>
          <div style="display:flex;gap:8px;margin-top:6px;flex-wrap:wrap">
            <div style="background:rgba(212,255,71,.12);border:0.5px solid rgba(212,255,71,.2);border-radius:8px;padding:6px 12px;text-align:center">
              <div style="font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:800;color:var(--acc);line-height:1">${w75}kg</div>
              <div style="font-size:9px;color:var(--t3);margin-top:2px">75% · Hipertrofia</div>
            </div>
            <div style="background:var(--bg3);border:0.5px solid var(--b);border-radius:8px;padding:6px 12px;text-align:center">
              <div style="font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:800;color:var(--t);line-height:1">${w80}kg</div>
              <div style="font-size:9px;color:var(--t3);margin-top:2px">80% · Fuerza</div>
            </div>
            <div style="background:var(--bg3);border:0.5px solid var(--b);border-radius:8px;padding:6px 12px;text-align:center">
              <div style="font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:800;color:var(--t);line-height:1">${w70}kg</div>
              <div style="font-size:9px;color:var(--t3);margin-top:2px">70% · Volumen</div>
            </div>
          </div>
        </div>
      </div>
      <div style="font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--t3);margin-bottom:6px">🔥 Calentamiento específico</div>
      <div class="warmup-series">${warmupHTML}</div>
      <div style="font-size:10px;color:var(--t3);margin-top:8px;text-align:right;cursor:pointer" onclick="showTab('test',document.querySelectorAll('.nbtn')[2])">
        Re-testear 1RM →
      </div>
    </div>`;
  }

  // ── Sin 1RM → mostrar aviso + botón al test ──
  const noRmHTML = rmKey ? `
    <div style="background:rgba(212,255,71,.05);border:0.5px solid rgba(212,255,71,.15);border-radius:var(--r);padding:12px;margin:10px 0;display:flex;align-items:center;gap:10px">
      <span style="font-size:22px">🧪</span>
      <div style="flex:1">
        <div style="font-size:13px;font-weight:600;color:var(--acc)">Haz el test de fuerza</div>
        <div style="font-size:11px;color:var(--t2);margin-top:2px">La app calculará tu peso automáticamente</div>
      </div>
      <button onclick="showTab('test',document.querySelectorAll('.nbtn')[2])" style="background:var(--acc);color:#000;border:none;border-radius:8px;padding:7px 12px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap">Ir al test</button>
    </div>` : '';

  // historial manual para ejercicios sin 1RM
  const curVal = weights[baseKey]||'';
  let prevEntries=[];
  for(let w=weekNum;w>=Math.max(1,weekNum-3);w--){
    const v=weights[`${w}_${dayIdx}_${exIdx}`];
    if(v) prevEntries.push({week:w,val:parseFloat(v)});
  }
  let histHTML='';
  if(prevEntries.length>0){
    histHTML='<div class="whislist">';
    prevEntries.forEach((r,i)=>{
      const label=r.week===weekNum?'Esta semana':`Semana ${r.week}`;
      let delta='';
      if(i<prevEntries.length-1){
        const diff=+(r.val-prevEntries[i+1].val).toFixed(1);
        if(diff>0) delta=`<span class="d-up">+${diff} kg</span>`;
        else if(diff<0) delta=`<span class="d-dn">${diff} kg</span>`;
        else delta=`<span class="d-eq">= sin cambio</span>`;
      }
      histHTML+=`<div class="whis-row"><span class="whis-week">${label}</span><span class="whis-val">${r.val} kg ${delta}</span></div>`;
    });
    histHTML+='</div>';
  }
  return `<div class="wbox">
    ${noRmHTML}
    <div class="wbox-top">
      <span class="wbox-ico">🏋️</span>
      <div class="wbox-info"><div class="wbox-lbl">Peso que usas</div><div class="wbox-rec">${rec}</div></div>
      <input class="winput" type="number" inputmode="decimal" placeholder="—" value="${curVal}"
        onchange="saveWeight('${baseKey}',this.value)" oninput="saveWeight('${baseKey}',this.value)"/>
      <span class="wunit">kg</span>
    </div>${histHTML}</div>`;
}

window.saveWeight = (key,val)=>{
  if(val&&val.trim()!=='') weights[key]=val;
  else delete weights[key];
  if(window.saveToCloud) window.saveToCloud();
};

// ── ACTIVATION CARD ───────────────────────────────────────────────
function todayKey(){ return new Date().toDateString(); }

function actCard(isPage){
  const tk=todayKey();
  const fn=isPage?'toggleActP':'toggleAct';
  const doneCount=ACTIVATION.items.filter((_,i)=>actChk[`act_${tk}_${i}`]).length;
  const allDone=doneCount===ACTIVATION.items.length;
  let h=`<div class="actsec"><div class="acthdr"><span style="font-size:20px">🍑</span>
    <div><div class="acttitle">${ACTIVATION.title}</div><div class="actsub">${ACTIVATION.sub}</div></div></div>
    <div style="font-size:11px;color:var(--t2);margin-bottom:10px">
      Hoy: <b style="color:var(--orange)">${doneCount}/${ACTIVATION.items.length}</b> ejercicios
      ${allDone?'<span style="color:var(--green);margin-left:6px">✓ Ronda completa</span>':''}
    </div>
    <div class="actitems">`;
  ACTIVATION.items.forEach((ex,i)=>{
    const ck=`act_${tk}_${i}`;const done=!!actChk[ck];
    h+=`<div class="actitem${done?' done-a':''}" onclick="${fn}('${ck}')">
      <div class="actbody"><div class="actname">${ex.name}</div><div class="actsubs">${ex.sub}</div></div>
      <div class="achk${done?' done':''}">${chkSvg()}</div></div>`;
  });
  if(allDone){
    h+=`<button class="mbtn" style="margin-top:10px;font-size:12px;padding:10px" onclick="resetActRound()">🔄 Nueva ronda</button>`;
  }
  h+=`</div><div class="actwarn">${ACTIVATION.warn}</div></div>`;
  return h;
}

window.resetActRound=()=>{
  const tk=todayKey();
  let r=1;
  while(ACTIVATION.items.some((_,i)=>actChk[`act_${tk}_r${r}_${i}`])) r++;
  ACTIVATION.items.forEach((_,i)=>{
    actChk[`act_${tk}_r${r}_${i}`]=true;
    delete actChk[`act_${tk}_${i}`];
  });
  if(window.saveToCloud) window.saveToCloud();
  const actBtn=document.querySelector('.nbtn.active');
  if(actBtn&&actBtn.textContent.includes('ctivac')) renderActPage();
  else renderWorkout();
};

// ── RENDER WORKOUT ────────────────────────────────────────────────
function renderWorkout(){
  const d=DAYS[curDay];const main=document.getElementById('main');
  if(d.rest){
    main.innerHTML=`<div class="restscr fade">
      <div class="restbig">ZZZ</div>

  const total=d.exercises.length;

        <span class="chev">&#8964;</span></div>
      <div class="exdetail${isOpen?' open':''}">`;
    html+=seriesBox(curDay,i,ex);
    if(ex.hasAlt){
      html+=`<div class="alt-toggle">
        <button class="alt-btn${useAlt==='A'?' act-alt':''}" onclick="setAlt(${i},'A')">${ex.altA.label}</button>
        <button class="alt-btn${useAlt==='B'?' act-alt':''}" onclick="setAlt(${i},'B')">${ex.altB.label}</button></div>

        <div class="alt-content${useAlt==='B'?' show':''}"><div class="alt-tip">${ex.altB.tip}</div></div>`;

// ── INTERACTIONS ──────────────────────────────────────────────────
window.toggleEx=(i)=>{ expanded[i]=!expanded[i]; renderWorkout(); };
window.toggleCheck=(ck)=>{ checked[ck]=!checked[ck]; if(window.saveToCloud) window.saveToCloud(); buildStrip(); renderWorkout(); };
window.toggleAct=(ck)=>{ actChk[ck]=!actChk[ck]; if(window.saveToCloud) window.saveToCloud(); renderWorkout(); };
window.toggleActP=(ck)=>{ actChk[ck]=!actChk[ck]; if(window.saveToCloud) window.saveToCloud(); renderActPage(); };
window.setAlt=(i,side)=>{ altState[`${curDay}_${i}`]=side; renderWorkout(); };

// ── TABS ──────────────────────────────────────────────────────────
window.showTab=(tab,btn)=>{
  document.querySelectorAll('.nbtn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  expanded={}; altState={};
  if(tab==='rutina'){buildStrip();renderWorkout();}
  else if(tab==='activacion') renderActPage();
  else if(tab==='stats') renderStats();
  else if(tab==='perfil') renderProfile();
  else if(tab==='test') renderTestPage();
  else if(tab==='medidas') renderMedidas();
  else renderTips();
};

// ── ACTIVATION PAGE ───────────────────────────────────────────────
function renderActPage(){
  const tk=todayKey();
  const doneCount=ACTIVATION.items.filter((_,i)=>actChk[`act_${tk}_${i}`]).length;
  const allDone=doneCount===ACTIVATION.items.length;
  // Contar rondas completas de hoy
  let roundsToday=0;

    let dayRounds=0;
    if(ACTIVATION.items.every((_,i)=>actChk[`act_${dk}_${i}`])) dayRounds++;
    let rr=1;
    while(ACTIVATION.items.every((_,i)=>actChk[`act_${dk}_r${rr}_${i}`])){ dayRounds++; rr++; }
    histHTML+=`<div class="act-hist-day${dd===0?' act-hist-today':''}${dayRounds>0?' act-hist-done':''}">

  histHTML+='</div><div style="font-size:10px;color:var(--t2);margin-top:6px">Número = rondas completadas ese día</div></div>';
  let h=`<div class="fade" style="padding:14px 0">
    <div class="actsec">
      <div class="acthdr"><span style="font-size:20px">🍑</span>
        <div><div class="acttitle">${ACTIVATION.title}</div><div class="actsub">${ACTIVATION.sub}</div></div></div>
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">
        <div style="font-size:11px;color:var(--t2)">Hoy: <b style="color:var(--orange)">${doneCount}/${ACTIVATION.items.length}</b> ejercicios</div>
        ${roundsToday>0?`<div style="font-size:11px;background:rgba(212,255,71,.12);color:var(--green);padding:3px 10px;border-radius:99px">🔥 ${roundsToday} ronda${roundsToday>1?'s':''} hoy</div>`:''}
      </div>
      <div class="actitems">`;
  ACTIVATION.items.forEach((ex,i)=>{
    const ck=`act_${tk}_${i}`;const done=!!actChk[ck];
    h+=`<div class="actitem${done?' done-a':''}" onclick="toggleActP('${ck}')">
      <div class="actbody"><div class="actname">${ex.name}</div><div class="actsubs">${ex.sub}</div></div>
      <div class="achk${done?' done':''}">${chkSvg()}</div></div>`;
  });
  if(allDone){
    h+=`<button class="mbtn" style="margin-top:10px;font-size:12px;padding:10px" onclick="resetActRound()">🔄 Nueva ronda (+1)</button>`;
  }
  h+=`</div><div class="actwarn">${ACTIVATION.warn}</div></div>
    ${histHTML}
    <div class="tipcard" style="margin-top:12px">
      <div class="tipctitle"><div class="tipnum">!</div>Cómo usarla</div>
      <div class="tipbody">Pon una alarma cada 45-60 min mientras trabajas sentado. Levántate, haz la rutina completa (3-4 min) y toca "Nueva ronda". Cada ronda cuenta.</div>
    </div></div>`;
  document.getElementById('main').innerHTML=h;
}

// Ejercicios clave que necesitan test de 1RM
const KEY_EXERCISES = [
  {key:'press_banca',     name:'Press banca con barra',        icon:'🏋️', dayIdx:0, exIdx:0, baseKg:20},
  {key:'sentadilla',      name:'Sentadilla libre con barra',   icon:'🦵', dayIdx:1, exIdx:0, baseKg:20},
  {key:'peso_muerto',     name:'Peso muerto',                  icon:'⚡', dayIdx:1, exIdx:1, baseKg:20},
  {key:'hip_thrust',      name:'Hip Thrust con barra',         icon:'🍑', dayIdx:1, exIdx:3, baseKg:20},
  {key:'press_banca_jue', name:'Press banca (Jueves)',         icon:'🏋️', dayIdx:3, exIdx:0, baseKg:20},
  {key:'press_militar',   name:'Press militar con mancuernas', icon:'🎯', dayIdx:3, exIdx:3, baseKg:8},
  {key:'remo_barra',      name:'Remo con barra',               icon:'🔄', dayIdx:4, exIdx:0, baseKg:20},
  {key:'bulg_smith',      name:'Sentadilla búlgara en Smith',  icon:'🔥', dayIdx:5, exIdx:0, baseKg:10},
  {key:'rdl',             name:'Peso muerto rumano',           icon:'💪', dayIdx:5, exIdx:2, baseKg:12},
  {key:'hip_thrust_sab',  name:'Hip Thrust (Sábado)',          icon:'🍑', dayIdx:5, exIdx:3, baseKg:20},
];

function calc1RM(peso, reps){ return Math.round(peso * (1 + 0.0333 * reps)); }

function calcWarmupSeries(rm){
  const base = rm || 40;
  return [
    {pct:40, reps:8,  peso: Math.round(base*0.40/2.5)*2.5},
    {pct:60, reps:5,  peso: Math.round(base*0.60/2.5)*2.5},
    {pct:75, reps:3,  peso: Math.round(base*0.75/2.5)*2.5},
  ];
}

function getWorkWeight(exKey, pct){
  const rm = oneRM[exKey];
  if(!rm) return null;
  return Math.round(rm*(pct/100)/2.5)*2.5;
}

// ── RENDER TEST PAGE ──────────────────────────────────────────────
function renderTestPage(){
  window.testState = window.testState || {step:'list', exKey:null, peso:null, reps:null, rir:null};
  if(window.testState.step==='list')     renderTestList();
  else if(window.testState.step==='warmup') renderTestWarmup();
  else if(window.testState.step==='test')   renderTestMain();
  else if(window.testState.step==='result') renderTestResult();
}

function renderTestList(){
  let h=`<div class="test-wrap fade">
    <div class="test-hero">
      <div class="test-icon">🧪</div>
      <div class="test-title">Test de Fuerza</div>
      <div class="test-sub">Elige un ejercicio para testear tu 1RM estimado. La app calculará todos tus pesos automáticamente.</div>
    </div>
    <div class="slbl">Ejercicios clave</div>
    <div class="test-exlist">`;

  KEY_EXERCISES.forEach(ex=>{
    const rm = oneRM[ex.key];
    const badge = rm
      ? `<div class="test-rm-badge">1RM: ${rm}kg</div>`
      : `<div class="test-rm-badge pending">Sin test</div>`;
    h+=`<div class="test-exitem${rm?' has-rm':''}" onclick="startTest('${ex.key}')">
      <div class="test-exleft">
        <div class="test-exico">${ex.icon}</div>
        <div>
          <div class="test-exname">${ex.name}</div>
          <div class="test-exsub">${rm?'Toca para re-testear':'Toca para hacer el test'}</div>
        </div>
      </div>
      ${badge}

  h+=`</div>
    <div class="tipcard">
      <div class="tipctitle"><div class="tipnum">!</div>¿Cada cuánto hacer el test?</div>
      <div class="tipbody">Principiante: cada 6-8 semanas · Intermedio: cada 4-6 semanas · Avanzado: cada 3-4 semanas. El test re-calibra todos tus pesos automáticamente.</div>
    </div>
  </div>`;
  document.getElementById('main').innerHTML=h;
}

window.startTest=(exKey)=>{
  window.testState={step:'warmup', exKey, peso:null, reps:null, rir:null};
  renderTestPage();
};

window.validateAndCalc=()=>{
  const p=window.testState.peso; const r=window.testState.reps; const rir=window.testState.rir;
  if(!p||p<=0) return alert('Ingresa el peso usado.');
  if(!r||r<=0) return alert('Ingresa las reps hechas.');
  if(rir===null||rir===undefined) return alert('Selecciona el RIR.');
  if(r<3||r>8){ alert('El test es válido entre 3 y 8 reps. Ajusta el peso.'); return; }
  if(rir==='3+') return alert('Con RIR 3+ el test no es válido. Usa más peso.');
  // Ajustar reps con RIR para 1RM más preciso
  const totalReps = r + (typeof rir==='number'?rir:3);
  const rm = calc1RM(p, totalReps);
  oneRM[window.testState.exKey] = rm;
  window.testState.rm = rm;
  window.testState.step = 'result';
  if(window.saveToCloud) window.saveToCloud();
  renderTestPage();
};

function renderProfile(){
  const user = currentUser;
  const name  = user ? (user.displayName || 'Atleta') : 'Atleta';
  const email = user ? (user.email || '') : '';
  const photo = user ? user.photoURL : null;

  const streak   = calcStreak();
  const weekTotal= DAYS.reduce((a,d)=>a+d.exercises.length,0);
  const weekDone = DAYS.reduce((a,d,di)=>a+d.exercises.filter((_,ei)=>checked[`${weekNum}_${di}_${ei}`]).length,0);
  const weekPct  = weekTotal>0?Math.round((weekDone/weekTotal)*100):0;
  let totalEver  = Object.values(checked).filter(Boolean).length;

  let actWeek=0;
  for(let dd=0;dd<7;dd++){
    const dt=new Date(); dt.setDate(dt.getDate()-dd);
    const dk=dt.toDateString();
    if(ACTIVATION.items.every((_,i)=>actChk[`act_${dk}_${i}`])) actWeek++;
    let rr=1;
    while(ACTIVATION.items.every((_,i)=>actChk[`act_${dk}_r${rr}_${i}`])){ actWeek++; rr++; }
  }

  // Streak bar últimos 7 días
  let streakBars='<div class="streak-bar">';
  for(let dd=6;dd>=0;dd--){
    const dt=new Date(); dt.setDate(dt.getDate()-dd);
    const dayIdx=dt.getDay()===0?6:dt.getDay()-1;
    const dayData=DAYS[dayIdx];
    let cls='streak-day';
    if(dayData.rest) cls+=' rest-s';
    else{
      const anyDone=dayData.exercises.some((_,ei)=>checked[`${weekNum}_${dayIdx}_${ei}`]);
      if(anyDone) cls+=' done';

    streakBars+=`<div class="${cls}"></div>`;
  }
  streakBars+='</div>';

  const dash=(CIRC*(weekPct/100)).toFixed(1);
  const ringHTML=`<div class="ring-wrap">
    <svg width="80" height="80" viewBox="0 0 80 80">

        stroke-dasharray="${dash} ${CIRC.toFixed(1)}" stroke-linecap="round"/>

    <div class="ring-center"><div class="ring-pct">${weekPct}%</div><div class="ring-lbl">semana</div></div>
  </div>`;

  const avatarHTML = photo
    ? `<img src="${photo}" class="prof-avatar" alt="foto"/>`
    : `<div class="prof-avatar-placeholder">💪</div>`;

  const nivel = weekNum<=4?'Principiante':weekNum<=8?'Intermedio':'Avanzado';
  const nivelCls = weekNum<=4?'prof-badge-blue':weekNum<=8?'prof-badge-orange':'prof-badge-acc';

  const tk=todayKey();

  let rrh=1;

  document.getElementById('main').innerHTML=`<div class="fade" style="padding:14px 0">

    <div class="prof-hero">
      ${avatarHTML}

      <div class="prof-badges">
        <div class="prof-badge prof-badge-acc">🏋️ Semana ${weekNum}</div>

        ${streak>2?`<div class="prof-badge prof-badge-orange">🔥 ${streak} días racha</div>`:''}

    </div>

    <div class="prof-grid">
      <div class="prof-stat"><div class="prof-stat-num">${streak}</div><div class="prof-stat-lbl">Días racha</div></div>
      <div class="prof-stat"><div class="prof-stat-num">${totalEver}</div><div class="prof-stat-lbl">Ejercicios totales</div></div>
      <div class="prof-stat"><div class="prof-stat-num">${actWeek}</div><div class="prof-stat-lbl">Activaciones semana</div></div>
    </div>

    <div class="prof-section">
      <div class="prof-section-title">Progreso esta semana</div>
      <div style="display:flex;align-items:center;gap:16px">
        ${ringHTML}
        <div style="flex:1">
          <div style="font-size:13px;color:var(--t);margin-bottom:6px"><b>${weekDone}</b> de <b>${weekTotal}</b> ejercicios</div>

// ── STATS ─────────────────────────────────────────────────────────
function renderStats(){
  let td=0,te=0;
  DAYS.forEach((d,di)=>d.exercises.forEach((_,ei)=>{ te++; if(checked[`${weekNum}_${di}_${ei}`]) td++; }));
  const streak=calcStreak();
  const bars=DAYS.map((d,di)=>{
    if(!d.exercises.length) return{pct:0};
    const dn=d.exercises.filter((_,ei)=>checked[`${weekNum}_${di}_${ei}`]).length;
    return{pct:Math.round((dn/d.exercises.length)*100)};
  });
  let h=`<div class="fade" style="padding:14px 0">
    <div class="slbl">Semana ${weekNum}</div>
    <div class="statsgrid">
      <div class="statcard"><div class="statnum">${td}</div><div class="statlbl">Ejercicios completados</div></div>
      <div class="statcard"><div class="statnum">${streak}</div><div class="statlbl">Días de racha</div></div>
      <div class="statcard"><div class="statnum">${Math.round((td/Math.max(te,1))*100)}%</div><div class="statlbl">Progreso semanal</div></div>
      <div class="statcard"><div class="statnum">${weekNum}</div><div class="statlbl">Semana actual</div></div>
    </div>
    <div class="slbl">Progreso por día</div>
    <div class="weekbars">`;
  DAYS.forEach((d,i)=>{ h+=`<div class="wb"><div class="wbwrap"><div class="wbbar" style="height:${bars[i].pct}%"></div></div><div class="wbn">${d.short}</div></div>`; });
  h+=`</div>
    <div style="display:flex;gap:8px;margin-bottom:8px">
      <button class="btn-out" onclick="prevWeek()">← Anterior</button>
      <button class="btn-out" onclick="nextWeek()">Siguiente →</button>
    </div>
    <button class="btn-danger" onclick="resetWeek()">Reiniciar semana actual</button>
    <button class="logout-btn" onclick="doSignOut()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      Cerrar sesión
    </button></div>`;
  document.getElementById('main').innerHTML=h;
}

function calcStreak(){
  let s=0;const ti=(()=>{ let d=new Date().getDay(); return d===0?6:d-1; })();
  for(let i=ti;i>=0;i--){
    const d=DAYS[i];if(d.rest){s++;continue;}
    const dn=d.exercises.filter((_,ei)=>checked[`${weekNum}_${i}_${ei}`]).length;
    if(dn>0)s++;else break;
  }return s;
}
window.prevWeek=()=>{ if(weekNum>1){weekNum--;} document.getElementById('weekNum').textContent=weekNum; if(window.saveToCloud) window.saveToCloud(); renderStats(); };

// ── MEDIDAS ───────────────────────────────────────────────────────
function renderMedidas(){
  const today=new Date().toLocaleDateString('es-PE',{day:'2-digit',month:'short',year:'numeric'});
  const last=bodyMeas.length>0?bodyMeas[bodyMeas.length-1]:null;
  let fieldsHTML='';
  BODY_FIELDS.forEach(f=>{
    const lastVal=last?(last[f.key]||''):'';
    fieldsHTML+=`<div class="mfield"><div class="mfield-lbl">${f.label}</div>
      <div class="mfield-row"><input class="minput" type="number" inputmode="decimal" placeholder="—" id="mf_${f.key}" value="${lastVal}"/>
      <span class="munit">${f.unit}</span></div></div>`;
  });
  let histHTML='';
  if(bodyMeas.length===0){
    histHTML='<div class="no-meas">📏 Aún no tienes registros.<br>Guarda tus medidas de hoy<br>para empezar a ver tu progreso.</div>';
  } else {
    histHTML=`<div style="display:flex;align-items:center;justify-content:space-between;margin:18px 0 10px">
      <div class="mhist-title" style="margin:0">Historial de medidas</div>
      <button onclick="clearAllMedidas()" style="background:rgba(248,113,113,.08);border:0.5px solid rgba(248,113,113,.2);border-radius:8px;padding:5px 12px;font-size:11px;color:var(--red);cursor:pointer;font-family:'DM Sans',sans-serif">🗑 Borrar todo</button>
    </div>`;
    const reversed=[...bodyMeas].reverse();
    reversed.forEach((entry,ei)=>{
      const realIdx=bodyMeas.length-1-ei;
      const prevEntry=ei<reversed.length-1?reversed[ei+1]:null;
      histHTML+=`<div class="mhist-entry">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
          <div class="mhist-date" style="margin:0">📅 ${entry.date}</div>
          <button onclick="deleteMedida(${realIdx})" style="background:rgba(248,113,113,.08);border:0.5px solid rgba(248,113,113,.2);border-radius:8px;padding:4px 10px;font-size:11px;color:var(--red);cursor:pointer;font-family:'DM Sans',sans-serif">🗑 Borrar</button>
        </div>
        <div class="mhist-vals">`;
      BODY_FIELDS.forEach(f=>{
        const v=entry[f.key];const pv=prevEntry?prevEntry[f.key]:null;
        if(!v)return;
        let deltaHTML='';
        if(pv){
          const diff=+(parseFloat(v)-parseFloat(pv)).toFixed(1);
          if(diff!==0){
            const isGood=LOWER_IS_GOOD.includes(f.key)?diff<0:diff>0;
            const sign=diff>0?'+':'';
            deltaHTML=isGood?`<span class="dg">${sign}${diff}${f.unit}</span>`:`<span class="dr">${sign}${diff}${f.unit}</span>`;
          } else deltaHTML=`<span class="dn">=</span>`;
        }
        histHTML+=`<div class="mhist-item"><span class="mhist-k">${f.label}</span><span class="mhist-v">${v} ${f.unit} ${deltaHTML}</span></div>`;
      });
      histHTML+=`</div></div>`;
    });
  }
  document.getElementById('main').innerHTML=`<div class="fade" style="padding:14px 0">
    <div class="mcard">
      <div class="mcard-head"><div class="mcard-title">📏 Mis Medidas</div><div class="mcard-date">${today}</div></div>
      <div class="mgrid">${fieldsHTML}</div>
      <button class="mbtn" onclick="saveMedidas()">💾 Guardar medidas</button>
    </div>${histHTML}</div>`;
}

window.saveMedidas=()=>{
  const entry={date:new Date().toLocaleDateString('es-PE',{day:'2-digit',month:'long',year:'numeric'})};
  let hasAny=false;
  BODY_FIELDS.forEach(f=>{
    const el=document.getElementById('mf_'+f.key);
    if(el&&el.value&&el.value.trim()!==''){entry[f.key]=el.value.trim();hasAny=true;}
  });
  if(!hasAny){alert('Ingresa al menos una medida antes de guardar.');return;}
  bodyMeas.push(entry);
  if(window.saveToCloud) window.saveToCloud();
  renderMedidas();
};

window.deleteMedida=(idx)=>{
  if(!confirm('¿Borrar este registro de medidas?')) return;
  bodyMeas.splice(idx,1);
  if(window.saveToCloud) window.saveToCloud();
  renderMedidas();
};

window.clearAllMedidas=()=>{
  if(!confirm('¿Borrar TODO el historial de medidas? No se puede deshacer.')) return;
  bodyMeas=[];
  if(window.saveToCloud) window.saveToCloud();
  renderMedidas();
};

// ── AUTH & CLOUD ─────────────────────────────────────────────────
// Safety timeout — if Firebase takes >6s, force show login
const splashTimeout = setTimeout(()=>{
  document.getElementById('splash').classList.add('hide');
  document.getElementById('loginScreen').classList.add('show');
}, 6000);

onAuthStateChanged(auth, async (user) => {
  clearTimeout(splashTimeout);
  if(user){
    currentUser = user;
    document.getElementById('loginScreen').classList.remove('show');
    // Avatar
    const av = document.getElementById('userAvatar');
    if(user.photoURL){
      av.innerHTML = `<img src="${user.photoURL}" class="user-avatar" onclick="showTab('perfil',document.querySelectorAll('.nbtn')[0])"/>`;
    } else {
      av.textContent = user.displayName ? user.displayName[0].toUpperCase() : '👤';
    }
    try { await loadFromCloud(); } catch(e){ console.log('loadFromCloud error:', e); }
    document.getElementById('splash').classList.add('hide');
    document.getElementById('weekNum').textContent = weekNum;
    buildStrip();
    renderWorkout();
  } else {
    currentUser = null;
    document.getElementById('splash').classList.add('hide');
    document.getElementById('loginScreen').classList.add('show');
  }
});

// ── CLOUD SYNC ────────────────────────────────────────────────────
async function loadFromCloud(){
  try {
    document.getElementById('spStatus').textContent = 'Sincronizando...';
    const ref  = doc(db, 'users', currentUser.uid);
    const snap = await getDoc(ref);
    if(snap.exists()){
      const data = snap.data();
      if(data.checked)   checked  = data.checked;
      if(data.oneRM)     oneRM    = data.oneRM;
      if(data.actChk)    actChk   = data.actChk;
      if(data.weights)   weights  = data.weights;
      if(data.bodyMeas)  bodyMeas = data.bodyMeas;
      if(data.weekNum)   weekNum  = data.weekNum;
    }
  } catch(e){ console.log('Load error:', e); }
}

window.saveToCloud = async () => {
  if(!currentUser) return;
  showSyncBar('saving');
  clearTimeout(saveTimeout);
  saveTimeout = setTimeout(async ()=>{
    try {
      await setDoc(doc(db, 'users', currentUser.uid), {
        checked, actChk, weights, bodyMeas, weekNum, oneRM,
        updatedAt: new Date().toISOString()
      });
      showSyncBar('saved');
    } catch(e){
      showSyncBar('error');
    }
  }, 800);
};

function showSyncBar(state){
  let bar = document.getElementById('syncBar');
  if(!bar){
    bar = document.createElement('div');
    bar.id = 'syncBar';
    bar.className = 'sync-bar';
    document.getElementById('main').prepend(bar);
  }
  if(state === 'saving'){
    bar.className = 'sync-bar saving';
    bar.innerHTML = '<div class="sync-pulse"></div> Guardando...';
    setTimeout(()=>{ if(bar.parentNode) bar.remove(); }, 3000);
  } else if(state === 'saved'){
    bar.className = 'sync-bar';
    bar.innerHTML = '✓ Guardado en la nube';
    setTimeout(()=>{ if(bar.parentNode) bar.remove(); }, 2000);
  } else {
    bar.className = 'sync-bar error';
    bar.innerHTML = '⚠ Error al guardar';
    setTimeout(()=>{ if(bar.parentNode) bar.remove(); }, 3000);
  }
}
