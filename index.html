<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="theme-color" content="#0f1117"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>FitApp</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#0f1117;--bg2:#181d28;--bg3:#1e2433;--bg4:#252c3d;--bg5:#2e3650;
  --b:rgba(255,255,255,0.06);--b2:rgba(255,255,255,0.12);
  --t:#f0f2f8;--t2:#8b93a8;--t3:#4a5268;
  --acc:#f5c518;--acc2:#e6b800;
  --blue:#4d9fff;--green:#3dd68c;--red:#ff5c5c;--orange:#ff8c42;--teal:#2dd4bf;--purple:#a78bfa;
  --r:12px;--r2:18px;--r3:22px;
  --card-grad:linear-gradient(135deg,#1e2433,#181d28);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--t);font-family:'DM Sans',sans-serif;overflow:hidden}
body{display:flex;flex-direction:column;max-width:430px;margin:0 auto}

/* SPLASH */
#splash{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .5s}
#splash.hide{opacity:0;pointer-events:none}
.sp-logo{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:90px;color:var(--acc);letter-spacing:-3px;line-height:1;text-shadow:0 0 40px rgba(245,197,24,.4)}
.sp-sub{font-size:11px;letter-spacing:4px;color:var(--t3);margin-top:6px;text-transform:uppercase}
.sp-bar{width:100px;height:2px;background:var(--bg3);border-radius:2px;margin-top:48px;overflow:hidden}
.sp-fill{height:2px;background:var(--acc);animation:spfill 2s cubic-bezier(.4,0,.2,1) forwards}
@keyframes spfill{from{width:0}to{width:100%}}
.sp-status{font-size:11px;color:var(--t3);margin-top:16px;letter-spacing:1px}

/* ── ONBOARDING ── */
#onboardScreen{position:fixed;inset:0;background:var(--bg);display:none;flex-direction:column;z-index:9990;overflow:hidden}
#onboardScreen.show{display:flex}
.ob-progress{height:3px;background:var(--bg3);flex-shrink:0}
.ob-bar{height:3px;background:linear-gradient(90deg,var(--acc),var(--acc2));transition:width .4s cubic-bezier(.4,0,.2,1);border-radius:3px}
.ob-body{flex:1;overflow-y:auto;padding:24px 20px 20px;scrollbar-width:none}
.ob-body::-webkit-scrollbar{display:none}
.ob-step-num{font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--acc);margin-bottom:8px}
.ob-title{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:36px;color:var(--t);line-height:1.05;margin-bottom:6px}
.ob-desc{font-size:13px;color:var(--t2);line-height:1.7;margin-bottom:24px}
.ob-footer{padding:16px 20px env(safe-area-inset-bottom,16px);flex-shrink:0;background:rgba(15,17,23,.97);border-top:0.5px solid var(--b)}
.ob-next{width:100%;padding:15px;background:linear-gradient(135deg,var(--acc),var(--acc2));color:#000;border:none;border-radius:var(--r2);font-family:'DM Sans',sans-serif;font-size:15px;font-weight:700;cursor:pointer;box-shadow:0 4px 20px rgba(245,197,24,.3);transition:opacity .2s}
.ob-next:active{opacity:.85}
.ob-skip{display:block;text-align:center;margin-top:10px;font-size:12px;color:var(--t3);cursor:pointer;padding:4px}

/* Gender cards */
.gender-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:8px}
.gender-card{background:var(--bg2);border:1.5px solid var(--b2);border-radius:var(--r2);padding:24px 16px;text-align:center;cursor:pointer;transition:all .2s}
.gender-card.selected{border-color:var(--acc);background:rgba(245,197,24,.08)}
.gender-card .gc-ico{font-size:40px;margin-bottom:8px}
.gender-card .gc-lbl{font-size:14px;font-weight:600;color:var(--t)}

/* Option pills / cards */
.ob-options{display:flex;flex-direction:column;gap:10px}
.ob-option{background:var(--bg2);border:1.5px solid var(--b2);border-radius:var(--r2);padding:14px 16px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:12px}
.ob-option.selected{border-color:var(--acc);background:rgba(245,197,24,.08)}
.ob-option .oo-ico{font-size:22px;width:36px;text-align:center;flex-shrink:0}
.ob-option .oo-text .oo-lbl{font-size:14px;font-weight:600;color:var(--t)}
.ob-option .oo-text .oo-sub{font-size:11px;color:var(--t2);margin-top:2px}
.ob-option .oo-check{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--b2);margin-left:auto;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
.ob-option.selected .oo-check{background:var(--acc);border-color:var(--acc)}

/* Multi-select chips */
.ob-chips{display:flex;flex-wrap:wrap;gap:10px}
.ob-chip{background:var(--bg2);border:1.5px solid var(--b2);border-radius:999px;padding:10px 16px;cursor:pointer;font-size:13px;font-weight:500;color:var(--t2);transition:all .2s;display:flex;align-items:center;gap:6px}
.ob-chip.selected{border-color:var(--acc);color:var(--acc);background:rgba(245,197,24,.08)}

/* Number inputs */
.ob-num-row{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.ob-num-lbl{font-size:13px;color:var(--t2);min-width:90px}
.ob-num-wrap{display:flex;align-items:center;gap:8px;flex:1}
.ob-num-input{background:var(--bg3);border:1.5px solid var(--b2);border-radius:var(--r);color:var(--t);font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:800;width:90px;padding:8px 10px;text-align:center}
.ob-num-input:focus{outline:none;border-color:var(--acc)}
.ob-num-unit{font-size:13px;color:var(--t3)}
.ob-num-toggle{display:flex;background:var(--bg3);border-radius:999px;padding:3px;gap:2px}
.ob-num-toggle button{padding:5px 14px;border:none;border-radius:999px;font-size:12px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;background:transparent;color:var(--t3);transition:all .2s}
.ob-num-toggle button.active{background:var(--acc);color:#000}
.ob-info-box{background:rgba(245,197,24,.06);border:0.5px solid rgba(245,197,24,.2);border-radius:var(--r);padding:12px 14px;margin-top:12px;font-size:12px;color:var(--t2);line-height:1.7}
.ob-info-box strong{color:var(--acc)}
.ob-info-box.warn{background:rgba(255,92,92,.06);border-color:rgba(255,92,92,.2)}
.ob-info-box.warn strong{color:var(--red)}
.ob-info-box.good{background:rgba(61,214,140,.06);border-color:rgba(61,214,140,.2)}
.ob-info-box.good strong{color:var(--green)}

/* 1RM inside onboard */
.ob-rm-result{background:linear-gradient(135deg,rgba(245,197,24,.12),rgba(245,197,24,.03));border:0.5px solid rgba(245,197,24,.35);border-radius:var(--r2);padding:20px;text-align:center;margin-top:14px}
.ob-rm-num{font-family:'Barlow Condensed',sans-serif;font-size:64px;font-weight:900;color:var(--acc);line-height:1;text-shadow:0 0 30px rgba(245,197,24,.4)}
.ob-rm-edit{background:var(--bg3);border:1.5px solid var(--b2);border-radius:var(--r);color:var(--t);font-family:'Barlow Condensed',sans-serif;font-size:36px;font-weight:800;width:120px;padding:8px;text-align:center;display:none}
.ob-rm-edit:focus{outline:none;border-color:var(--acc)}

/* Schedule days */
.ob-days-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:16px}
.ob-day-btn{aspect-ratio:1;border-radius:var(--r);border:1.5px solid var(--b2);background:var(--bg2);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .2s}
.ob-day-btn.selected{border-color:var(--acc);background:rgba(245,197,24,.1)}
.ob-day-btn .od-lbl{font-size:9px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.5px}
.ob-day-btn .od-num{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:800;color:var(--t);line-height:1}
.ob-day-btn.selected .od-lbl,.ob-day-btn.selected .od-num{color:var(--acc)}

/* Freq selector */
.ob-freq-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}
.ob-freq-btn{aspect-ratio:1;border-radius:var(--r2);border:1.5px solid var(--b2);background:var(--bg2);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .2s}
.ob-freq-btn.selected{border-color:var(--acc);background:rgba(245,197,24,.1)}
.ob-freq-btn .of-num{font-family:'Barlow Condensed',sans-serif;font-size:32px;font-weight:900;color:var(--t)}
.ob-freq-btn .of-lbl{font-size:10px;color:var(--t3)}
.ob-freq-btn.selected .of-num{color:var(--acc)}

/* Equipment multi-select */
.ob-equip-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.ob-equip-card{background:var(--bg2);border:1.5px solid var(--b2);border-radius:var(--r2);padding:14px;cursor:pointer;transition:all .2s;text-align:center}
.ob-equip-card.selected{border-color:var(--acc);background:rgba(245,197,24,.08)}
.ob-equip-card .eq-ico{font-size:28px;margin-bottom:6px}
.ob-equip-card .eq-lbl{font-size:12px;font-weight:600;color:var(--t)}

/* Time picker */
.ob-time-wrap{display:flex;align-items:center;gap:12px;justify-content:center;margin:16px 0}
.ob-time-input{background:var(--bg3);border:1.5px solid var(--b2);border-radius:var(--r);color:var(--t);font-family:'Barlow Condensed',sans-serif;font-size:48px;font-weight:800;width:130px;padding:10px;text-align:center}
.ob-time-input:focus{outline:none;border-color:var(--acc)}
.ob-time-sep{font-family:'Barlow Condensed',sans-serif;font-size:40px;font-weight:800;color:var(--t3)}

/* Login */
#loginScreen{position:fixed;inset:0;background:var(--bg);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:9998;padding:32px}
#loginScreen.show{display:flex}
.login-logo{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:72px;color:var(--acc);letter-spacing:-2px;line-height:1;margin-bottom:8px}
.login-sub{font-size:12px;color:var(--t3);letter-spacing:3px;text-transform:uppercase;margin-bottom:48px}
.login-title{font-size:18px;font-weight:600;color:var(--t);margin-bottom:8px}
.login-desc{font-size:13px;color:var(--t2);text-align:center;line-height:1.7;margin-bottom:32px;max-width:280px}
.google-btn{display:flex;align-items:center;gap:12px;padding:14px 24px;background:white;border:none;border-radius:var(--r2);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;color:#1a1a1a;width:100%;max-width:300px;justify-content:center;transition:all .2s;box-shadow:0 4px 20px rgba(0,0,0,.4)}
.google-btn:hover{opacity:.9}
.skip-login-btn{margin-top:16px;background:transparent;border:none;color:var(--t3);font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;padding:8px}

/* HEADER */
.header{padding:env(safe-area-inset-top,14px) 18px 12px;flex-shrink:0}
.hrow{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.logo{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:26px;color:var(--acc);letter-spacing:-0.5px;text-shadow:0 0 12px rgba(245,197,24,.3)}
.hright{display:flex;align-items:center;gap:8px}
.wchip{display:flex;align-items:center;gap:5px;background:var(--bg3);border:0.5px solid var(--b2);border-radius:999px;padding:5px 12px;font-size:11px;color:var(--t2)}
.wchip b{color:var(--acc);font-weight:700}
.user-avatar{width:28px;height:28px;border-radius:50%;cursor:pointer;border:1.5px solid var(--b2)}
.user-placeholder{width:28px;height:28px;border-radius:50%;background:var(--bg3);border:1.5px solid var(--b2);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:12px;color:var(--t3)}
.dstrip{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none}
.dstrip::-webkit-scrollbar{display:none}
.dp{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:2px;padding:9px 11px;background:var(--bg2);border:0.5px solid var(--b);border-radius:var(--r);cursor:pointer;transition:all .18s;min-width:46px;position:relative}
.dp.active{background:var(--acc);border-color:var(--acc);box-shadow:0 0 12px rgba(245,197,24,.3)}
.dp.active .dpn,.dp.active .dpd{color:#000}
.dp.rest-d{opacity:.4}
.dpn{font-size:11px;font-weight:700;color:var(--t);font-family:'Barlow Condensed',sans-serif;letter-spacing:.3px}
.dpd{font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px}
.dpdot{width:4px;height:4px;border-radius:50%;background:var(--green);position:absolute;top:5px;right:5px;opacity:0}
.dp.done-d .dpdot{opacity:1}

.main{flex:1;overflow-y:auto;padding:0 18px 110px;scrollbar-width:none}
.main::-webkit-scrollbar{display:none}

/* SYNC */
.sync-bar{display:flex;align-items:center;gap:6px;padding:6px 12px;background:rgba(45,212,191,.08);border:0.5px solid rgba(45,212,191,.15);border-radius:999px;font-size:10px;color:var(--teal);margin-bottom:10px;width:fit-content}
.sync-bar.saving{color:var(--orange);background:rgba(251,146,60,.08);border-color:rgba(251,146,60,.15)}
.sync-bar.error{color:var(--red);background:rgba(248,113,113,.08);border-color:rgba(248,113,113,.15)}
.sync-pulse{width:5px;height:5px;border-radius:50%;background:currentColor;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* HERO */
.hero{background:var(--card-grad);border:0.5px solid var(--b2);border-radius:var(--r3);padding:20px;margin:8px 0 12px;position:relative;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,.3)}
.hero::after{content:'';position:absolute;top:-50px;right:-50px;width:160px;height:160px;border-radius:50%;background:var(--acc);opacity:.03}
.hero-cat{font-size:10px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;margin-bottom:4px}
.hero-name{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:44px;color:var(--t);line-height:1;letter-spacing:-.5px}
.hero-focus{font-size:12px;color:var(--t2);margin-top:3px}
.hero-meta{display:flex;gap:20px;margin-top:16px}
.hm{display:flex;flex-direction:column;gap:1px}
.hmv{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:700;color:var(--t);line-height:1}
.hml{font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.6px}
.prog-track{background:var(--bg4);height:3px;border-radius:3px;margin-bottom:18px;overflow:hidden}
.prog-fill{height:3px;background:linear-gradient(90deg,var(--acc),var(--acc2));border-radius:3px;transition:width .5s cubic-bezier(.4,0,.2,1);box-shadow:0 0 6px rgba(245,197,24,.4)}
.slbl{font-size:9px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--t3);margin-bottom:8px}

/* Exercise cards */
.excard{background:var(--bg2);border:0.5px solid var(--b);border-radius:var(--r2);margin-bottom:10px;overflow:hidden;transition:border-color .2s}
.excard.done-c{opacity:.65}
.extop{display:flex;align-items:center;gap:10px;padding:13px 14px;cursor:pointer}
.exnum{width:30px;height:30px;border-radius:9px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--t2);flex-shrink:0;font-family:'Barlow Condensed',sans-serif}
.exnum.k{background:rgba(245,197,24,.12);color:var(--acc);border:0.5px solid rgba(245,197,24,.2)}
.exbody{flex:1;min-width:0}
.exname{font-size:14px;font-weight:600;color:var(--t);display:flex;align-items:center;gap:6px;flex-wrap:wrap;line-height:1.3}
.exsets{font-size:11px;color:var(--t2);margin-top:2px}
.kbadge{font-size:9px;font-weight:700;letter-spacing:1px;padding:2px 7px;border-radius:999px;background:rgba(245,197,24,.15);color:var(--acc);text-transform:uppercase;flex-shrink:0;border:0.5px solid rgba(245,197,24,.3)}
.exmuscle{font-size:10px;color:var(--t3);white-space:nowrap;flex-shrink:0}
.chk{width:26px;height:26px;border-radius:50%;border:1.5px solid var(--b2);display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;transition:all .18s}
.chk.done{background:var(--acc);border-color:var(--acc)}
.chev{color:var(--t3);font-size:18px;transition:transform .2s;flex-shrink:0;margin-left:2px}
.excard.open-c .chev{transform:rotate(180deg)}
.exdetail{max-height:0;overflow:hidden;transition:max-height .3s cubic-bezier(.4,0,.2,1)}
.exdetail.open{max-height:2000px}
.exdetail>*{padding:0 14px}
.exdetail>*:last-child{padding-bottom:14px}
.alt-toggle{display:flex;background:var(--bg3);border-radius:999px;padding:3px;gap:2px;margin:10px 0}
.alt-btn{flex:1;padding:7px 8px;border:none;border-radius:999px;font-size:11px;font-weight:600;color:var(--t3);background:transparent;cursor:pointer;transition:all .18s;font-family:'DM Sans',sans-serif}
.alt-btn.act-alt{background:var(--acc);color:#000}
.alt-content{display:none}
.alt-content.show{display:block}
.alt-tip{font-size:11px;color:var(--teal);background:rgba(45,212,191,.07);border:0.5px solid rgba(45,212,191,.15);border-radius:var(--r);padding:10px 12px;margin-bottom:10px;line-height:1.6}
.tipbox{font-size:12px;color:var(--t2);line-height:1.7;margin:8px 0 12px;padding:12px;background:rgba(245,197,24,.05);border-radius:var(--r);border-left:2px solid var(--acc)}
.tipbox strong{color:var(--acc);font-weight:600}
.ytlink{display:flex;align-items:center;gap:10px;padding:9px 12px;background:var(--bg3);border-radius:var(--r);margin-bottom:10px;text-decoration:none;border:0.5px solid var(--b)}
.ytico{width:30px;height:30px;background:#ff0000;border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.yttxt{font-size:12px;font-weight:500}.ytsub{font-size:10px;color:var(--t2);margin-top:1px}
.icard{background:var(--bg2);border:0.5px solid var(--b);border-radius:var(--r2);padding:13px 15px;margin-bottom:18px;display:flex;align-items:flex-start;gap:11px}
.iico{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:15px}
.iico-blue{background:rgba(96,165,250,.1)}
.iico-teal{background:rgba(45,212,191,.1)}
.itext{font-size:12px;color:var(--t2);line-height:1.65}
.itext strong{color:var(--t);font-weight:600}

/* Weight box */
.wbox{background:var(--bg3);border-radius:var(--r);padding:12px 14px;margin:10px 0}
.wbox-top{display:flex;align-items:center;gap:10px}
.wbox-ico{font-size:20px}
.wbox-info{flex:1}
.wbox-lbl{font-size:11px;color:var(--t3);text-transform:uppercase;letter-spacing:1px}
.wbox-rec{font-size:11px;color:var(--acc);font-weight:600;line-height:1.4}
.winput{background:var(--bg4);border:0.5px solid var(--b2);border-radius:9px;color:var(--t);font-family:'DM Sans',sans-serif;font-size:20px;font-weight:700;width:72px;padding:7px 8px;text-align:center;flex-shrink:0}
.winput:focus{outline:none;border-color:var(--acc)}
.wunit{font-size:12px;color:var(--t3);flex-shrink:0}
.whislist{margin-top:10px;display:flex;flex-direction:column;gap:4px}
.whis-row{display:flex;align-items:center;justify-content:space-between;padding:5px 0;border-bottom:0.5px solid var(--b)}
.whis-week{font-size:11px;color:var(--t3)}
.whis-val{font-size:13px;font-weight:600;color:var(--t);display:flex;align-items:center;gap:5px}
.d-up{font-size:10px;color:var(--green)}.d-dn{font-size:10px;color:var(--red)}.d-eq{font-size:10px;color:var(--t3)}
.warmup-series{display:flex;flex-direction:column;gap:5px;margin-bottom:8px}
.warmup-row{display:flex;align-items:center;gap:10px;padding:8px 10px;background:var(--bg4);border-radius:8px}
.warmup-pct{font-size:10px;font-weight:700;color:var(--t3);width:36px;text-align:center}
.warmup-peso{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:800;color:var(--t);flex:1}
.warmup-reps{font-size:12px;color:var(--t2)}

/* Test */
.test-step{background:var(--bg2);border:0.5px solid var(--b2);border-radius:var(--r3);padding:20px;margin-bottom:12px}

.test-step-title{font-family:'Barlow Condensed',sans-serif;font-size:24px;font-weight:800;color:var(--t);margin-bottom:8px}
.test-step-body{font-size:13px;color:var(--t2);line-height:1.7}
.test-inputs{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:14px 0}
.test-input-wrap{display:flex;flex-direction:column;gap:6px}
.test-input-lbl{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:1px}
.test-big-input{background:var(--bg3);border:0.5px solid var(--b2);border-radius:var(--r);color:var(--t);font-family:'Barlow Condensed',sans-serif;font-size:32px;font-weight:800;width:100%;padding:10px 12px;text-align:center}
.test-big-input:focus{outline:none;border-color:var(--acc)}
.test-unit{font-size:12px;color:var(--t3)}
.rir-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:12px 0}
.rir-btn{padding:14px 8px;background:var(--bg3);border:0.5px solid var(--b);border-radius:var(--r);color:var(--t2);font-size:13px;font-weight:600;cursor:pointer;text-align:center;transition:all .18s;font-family:'DM Sans',sans-serif}
.rir-btn.selected{background:rgba(212,255,71,.12);border-color:var(--acc);color:var(--acc)}
.rm-result{background:linear-gradient(135deg,rgba(245,197,24,.12),rgba(245,197,24,.03));border:0.5px solid rgba(245,197,24,.35);border-radius:var(--r3);padding:24px;text-align:center;margin:14px 0}
.rm-result-label{font-size:11px;color:var(--t3);text-transform:uppercase;letter-spacing:2px;margin-bottom:4px}
.rm-result-num{font-family:'Barlow Condensed',sans-serif;font-size:72px;font-weight:900;color:var(--acc);line-height:1;text-shadow:0 0 30px rgba(245,197,24,.4)}
.rm-result-unit{font-size:18px;color:var(--t2);margin-bottom:16px}
.rm-edit-wrap{margin-top:12px}
.rm-edit-input{background:var(--bg3);border:1.5px solid var(--b2);border-radius:var(--r);color:var(--t);font-family:'Barlow Condensed',sans-serif;font-size:36px;font-weight:800;width:140px;padding:8px;text-align:center;display:none}
.rm-edit-input:focus{outline:none;border-color:var(--acc)}
.rm-work-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:14px}
.rm-work-item{background:var(--bg2);border-radius:var(--r);padding:10px;text-align:center}
.rm-work-pct{font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:1px}
.rm-work-peso{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:800;color:var(--t)}
.rm-work-uso{font-size:10px;color:var(--t2);margin-top:2px}

/* Body weight without equip */
.no-equip-list{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.ne-item{background:var(--bg2);border:0.5px solid var(--b);border-radius:var(--r2);padding:14px;display:flex;align-items:center;gap:12px}
.ne-ico{font-size:22px;width:36px;text-align:center;flex-shrink:0}
.ne-name{font-size:14px;font-weight:600;color:var(--t)}
.ne-sets{font-size:11px;color:var(--t2);margin-top:2px}

/* BOTTOM NAV */
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:rgba(15,17,23,.97);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-top:0.5px solid rgba(245,197,24,.1);padding:8px 6px env(safe-area-inset-bottom,10px);display:flex;gap:2px;z-index:100}
.nbtn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 2px;border-radius:var(--r);border:none;background:transparent;color:var(--t3);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:8px;letter-spacing:.2px;transition:all .18s}
.nbtn.active{background:rgba(245,197,24,.12);color:var(--t);border:0.5px solid rgba(245,197,24,.2)}
.nbtn.active .ni{color:var(--acc);filter:drop-shadow(0 0 4px rgba(245,197,24,.5))}
.ni{font-size:14px;line-height:1;transition:color .18s}

/* FOOD TAB */
.food-cats{display:flex;gap:8px;overflow-x:auto;padding-bottom:8px;scrollbar-width:none;margin-bottom:16px}
.food-cats::-webkit-scrollbar{display:none}
.food-cat{flex-shrink:0;padding:8px 16px;background:var(--bg2);border:1.5px solid var(--b2);border-radius:999px;font-size:12px;font-weight:600;color:var(--t2);cursor:pointer;transition:all .2s;white-space:nowrap}
.food-cat.active{border-color:var(--acc);color:var(--acc);background:rgba(245,197,24,.08)}
.food-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.food-card{background:var(--bg2);border:0.5px solid var(--b);border-radius:var(--r2);overflow:hidden;cursor:pointer;transition:all .2s;active:scale(.98)}
.food-card:active{transform:scale(.97)}
.food-img{width:100%;aspect-ratio:4/3;object-fit:cover;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:40px}
.food-info{padding:10px}
.food-name{font-size:13px;font-weight:600;color:var(--t);margin-bottom:4px;line-height:1.3}
.food-meta{display:flex;gap:6px;flex-wrap:wrap}
.food-cal{font-size:10px;padding:2px 8px;border-radius:999px;background:rgba(245,197,24,.1);color:var(--acc);font-weight:600;border:0.5px solid rgba(245,197,24,.2)}
.food-time{font-size:10px;padding:2px 8px;border-radius:999px;background:var(--bg3);color:var(--t3)}

/* Food detail modal */
.food-modal{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:500;display:none;align-items:flex-end}
.food-modal.show{display:flex}
.food-modal-inner{background:var(--bg2);border-radius:var(--r3) var(--r3) 0 0;width:100%;max-width:430px;margin:0 auto;max-height:85vh;overflow-y:auto;padding:20px;scrollbar-width:none}
.food-modal-inner::-webkit-scrollbar{display:none}
.food-modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.food-modal-title{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:800;color:var(--t)}
.food-modal-close{width:32px;height:32px;border-radius:50%;background:var(--bg3);border:none;color:var(--t2);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.food-recipe-step{display:flex;gap:12px;margin-bottom:14px}
.food-recipe-num{width:26px;height:26px;border-radius:50%;background:rgba(245,197,24,.12);border:0.5px solid rgba(245,197,24,.2);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--acc);flex-shrink:0}
.food-recipe-text{font-size:13px;color:var(--t2);line-height:1.7;padding-top:3px}

/* RELAX TAB */
.relax-cats{display:flex;gap:8px;overflow-x:auto;padding-bottom:8px;scrollbar-width:none;margin-bottom:16px}
.relax-cats::-webkit-scrollbar{display:none}
.relax-cat{flex-shrink:0;padding:8px 16px;background:var(--bg2);border:1.5px solid var(--b2);border-radius:999px;font-size:12px;font-weight:600;color:var(--t2);cursor:pointer;transition:all .2s;white-space:nowrap}
.relax-cat.active{border-color:var(--purple);color:var(--purple);background:rgba(167,139,250,.08)}
.relax-list{display:flex;flex-direction:column;gap:10px}
.relax-card{background:var(--bg2);border:0.5px solid var(--b);border-radius:var(--r2);padding:16px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:all .2s;text-decoration:none}
.relax-card:active{transform:scale(.98)}
.relax-ico-wrap{width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0}
.relax-info{flex:1}
.relax-name{font-size:14px;font-weight:600;color:var(--t);margin-bottom:3px}
.relax-meta{font-size:11px;color:var(--t2);display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.relax-tag{font-size:10px;padding:2px 8px;border-radius:999px;font-weight:600}
.relax-arrow{font-size:20px;color:var(--t3)}
.relax-exercise{background:var(--bg2);border:0.5px solid var(--b);border-radius:var(--r2);padding:16px;margin-bottom:10px}
.relax-ex-title{font-size:15px;font-weight:600;color:var(--t);margin-bottom:6px;display:flex;align-items:center;gap:8px}
.relax-ex-desc{font-size:12px;color:var(--t2);line-height:1.7}

/* STATS TAB */
.statsgrid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:20px}
.statcard{background:var(--bg2);border:0.5px solid var(--b);border-radius:var(--r2);padding:16px}
.statnum{font-family:'Barlow Condensed',sans-serif;font-size:48px;font-weight:800;color:var(--acc);line-height:1;text-shadow:0 0 20px rgba(245,197,24,.3)}
.statlbl{font-size:11px;color:var(--t2);margin-top:2px}
.weekbars{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:16px}
.wb{display:flex;flex-direction:column;align-items:center;gap:4px}
.wbwrap{width:100%;height:50px;background:var(--bg3);border-radius:4px;overflow:hidden;display:flex;align-items:flex-end}
.wbbar{width:100%;background:linear-gradient(180deg,var(--acc),var(--acc2));border-radius:4px;transition:height .5s cubic-bezier(.4,0,.2,1)}
.wbn{font-size:9px;color:var(--t3);font-weight:600;text-transform:uppercase;letter-spacing:.3px}
.btn-out{flex:1;padding:11px;background:var(--bg2);border:0.5px solid var(--b2);border-radius:var(--r);color:var(--t2);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer}
.btn-danger{width:100%;padding:11px;background:rgba(255,92,92,.08);border:0.5px solid rgba(255,92,92,.2);border-radius:var(--r);color:var(--red);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;margin-bottom:8px}
.logout-btn{width:100%;padding:11px;background:var(--bg2);border:0.5px solid var(--b2);border-radius:var(--r);color:var(--t2);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px}

/* PROFILE */
.prof-hero{background:var(--card-grad);border:0.5px solid var(--b2);border-radius:var(--r3);padding:24px 20px;text-align:center;position:relative;overflow:hidden;margin-bottom:12px}
.prof-hero::before{content:'';position:absolute;top:-60px;right:-60px;width:200px;height:200px;border-radius:50%;background:var(--acc);opacity:.04}
.prof-avatar{width:80px;height:80px;border-radius:50%;border:3px solid var(--acc);margin:0 auto 12px;display:block;object-fit:cover}
.prof-avatar-placeholder{width:80px;height:80px;border-radius:50%;border:3px solid var(--acc);margin:0 auto 12px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:32px}
.prof-name{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:28px;color:var(--t);letter-spacing:-.3px;margin-bottom:2px}
.prof-email{font-size:11px;color:var(--t3);margin-bottom:10px}
.prof-badges{display:flex;gap:6px;justify-content:center;flex-wrap:wrap}
.prof-badge{display:flex;align-items:center;gap:5px;padding:5px 12px;border-radius:999px;font-size:11px;font-weight:600;border:0.5px solid}
.prof-badge-acc{color:var(--acc);border-color:rgba(245,197,24,.3);background:rgba(245,197,24,.08)}
.prof-badge-orange{color:var(--orange);border-color:rgba(255,140,66,.3);background:rgba(255,140,66,.08)}
.prof-badge-blue{color:var(--blue);border-color:rgba(77,159,255,.3);background:rgba(77,159,255,.08)}
.prof-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.prof-stat{background:var(--bg2);border:0.5px solid var(--b);border-radius:var(--r2);padding:14px 10px;text-align:center}
.prof-stat-num{font-family:'Barlow Condensed',sans-serif;font-size:38px;font-weight:800;color:var(--acc);line-height:1}
.prof-stat-lbl{font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:1px;margin-top:3px;line-height:1.3}
.prof-section{background:var(--bg2);border:0.5px solid var(--b);border-radius:var(--r2);padding:16px;margin-bottom:10px}
.prof-section-title{font-size:9px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--t3);margin-bottom:12px}
.prof-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:0.5px solid var(--b)}
.prof-row:last-child{border-bottom:none;padding-bottom:0}
.prof-row-left{display:flex;align-items:center;gap:10px}
.prof-row-ico{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.prof-row-label{font-size:13px;color:var(--t);font-weight:500}
.prof-row-sub{font-size:11px;color:var(--t3);margin-top:1px}
.prof-row-val{font-size:13px;color:var(--t2);font-weight:600}
.ring-wrap{position:relative;width:80px;height:80px;flex-shrink:0}
.ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring-pct{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:800;color:var(--acc);line-height:1}
.ring-lbl{font-size:9px;color:var(--t3)}
.streak-bar{display:flex;gap:4px}
.streak-day{flex:1;height:20px;border-radius:4px;background:var(--bg4)}
.streak-day.done{background:var(--acc)}
.streak-day.rest-s{background:var(--bg3)}
.mbtn{width:100%;padding:13px;background:linear-gradient(135deg,var(--acc),var(--acc2));color:#000;border:none;border-radius:var(--r);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:700;cursor:pointer;box-shadow:0 4px 15px rgba(245,197,24,.25)}
.mcard{background:var(--bg2);border:0.5px solid var(--b2);border-radius:var(--r3);padding:18px;margin-bottom:16px}
.mcard-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.mcard-title{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:800;color:var(--t);letter-spacing:-.3px}
.mcard-date{font-size:11px;color:var(--t3)}
.mgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.mfield{display:flex;flex-direction:column;gap:5px}
.mfield-lbl{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:1px}
.mfield-row{display:flex;align-items:center;gap:6px}
.minput{background:var(--bg3);border:0.5px solid var(--b2);border-radius:9px;color:var(--t);font-family:'DM Sans',sans-serif;font-size:18px;font-weight:700;width:100%;padding:8px 10px;text-align:center}
.minput:focus{outline:none;border-color:var(--acc)}
.munit{font-size:11px;color:var(--t3)}
.mhist-title{font-size:9px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--t3);margin:18px 0 10px}
.mhist-entry{background:var(--bg2);border:0.5px solid var(--b);border-radius:var(--r2);padding:14px;margin-bottom:10px}
.mhist-date{font-size:11px;color:var(--acc);font-weight:600;margin-bottom:10px}
.mhist-vals{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.mhist-item{display:flex;flex-direction:column;gap:2px}
.mhist-k{font-size:10px;color:var(--t3)}
.mhist-v{font-size:13px;font-weight:600;color:var(--t);display:flex;align-items:center;gap:4px}
.dg{font-size:10px;color:var(--green)}.dr{font-size:10px;color:var(--red)}.dn{font-size:10px;color:var(--t3)}
.no-meas{text-align:center;padding:28px 16px;color:var(--t3);font-size:13px;line-height:1.8}
.tipcard{background:var(--bg2);border:0.5px solid var(--b);border-radius:var(--r2);padding:14px;margin-bottom:10px}
.tipctitle{font-size:13px;font-weight:600;color:var(--t);margin-bottom:6px;display:flex;align-items:center;gap:8px}
.tipnum{width:22px;height:22px;border-radius:7px;background:rgba(245,197,24,.12);color:var(--acc);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:'Barlow Condensed',sans-serif;border:0.5px solid rgba(245,197,24,.2)}
.tipbody{font-size:12px;color:var(--t2);line-height:1.7}
.actsec{background:var(--bg2);border:0.5px solid var(--b);border-radius:var(--r2);padding:14px;margin-bottom:12px}
.acthdr{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.acttitle{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:22px;color:var(--orange);letter-spacing:-.3px}
.actsub{font-size:11px;color:var(--t2);margin-top:2px}
.actitems{display:flex;flex-direction:column;gap:6px}
.actitem{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:var(--bg3);border-radius:var(--r);cursor:pointer;transition:all .18s;border:0.5px solid var(--b)}
.actitem.done-a{background:rgba(61,214,140,.08);border-color:rgba(61,214,140,.2)}
.actbody{flex:1}
.actname{font-size:13px;font-weight:600;color:var(--t)}
.actsubs{font-size:11px;color:var(--t2);margin-top:2px}
.achk{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--b2);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .18s}
.achk.done{background:var(--green);border-color:var(--green)}
.actwarn{font-size:11px;color:rgba(251,146,60,.75);margin-top:10px;line-height:1.6;padding:10px;background:rgba(251,146,60,.05);border-radius:10px}
.restscr{display:flex;flex-direction:column;align-items:center;padding:28px 0;text-align:center}
.restbig{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:100px;color:var(--bg3);line-height:1}
.resttitle{font-family:'Barlow Condensed',sans-serif;font-size:32px;font-weight:800;color:var(--t);margin-bottom:8px}
.restdesc{font-size:13px;color:var(--t2);line-height:1.7;max-width:280px;margin-bottom:18px}
.resttip{background:var(--bg2);border:0.5px solid var(--b);border-radius:var(--r2);padding:14px 16px;font-size:12px;color:var(--t2);line-height:1.7;text-align:left;width:100%;margin-bottom:16px}
.act-hist{background:var(--bg2);border:0.5px solid var(--b);border-radius:var(--r2);padding:14px;margin-bottom:12px}
.act-hist-title{font-size:9px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--t3);margin-bottom:10px}
.act-hist-grid{display:flex;gap:6px}
.act-hist-day{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.act-hist-lbl{font-size:9px;color:var(--t3);text-transform:uppercase}
.act-hist-dot{width:24px;height:24px;border-radius:50%;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--t3)}
.act-hist-today .act-hist-dot{border:1.5px solid var(--acc)}
.act-hist-done .act-hist-dot{background:var(--acc);color:#000;font-weight:700}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.fade{animation:fadeUp .3s ease both}

/* Invite & feedback */
.action-row{display:flex;gap:10px;margin-bottom:10px}
.action-btn{flex:1;padding:13px;background:var(--bg2);border:0.5px solid var(--b2);border-radius:var(--r2);display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;font-family:'DM Sans',sans-serif;border:none}
.action-btn-ico{font-size:24px}
.action-btn-lbl{font-size:12px;font-weight:600;color:var(--t2)}
.feedback-modal{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:500;display:none;align-items:flex-end}
.feedback-modal.show{display:flex}
.feedback-inner{background:var(--bg2);border-radius:var(--r3) var(--r3) 0 0;width:100%;max-width:430px;margin:0 auto;padding:24px;scrollbar-width:none}
.stars-row{display:flex;gap:12px;justify-content:center;margin:16px 0}
.star{font-size:36px;cursor:pointer;transition:transform .15s;opacity:.3}
.star.active{opacity:1;transform:scale(1.1)}
.feedback-textarea{width:100%;background:var(--bg3);border:1.5px solid var(--b2);border-radius:var(--r);color:var(--t);font-family:'DM Sans',sans-serif;font-size:13px;padding:12px;min-height:100px;resize:none;margin-bottom:14px}
.feedback-textarea:focus{outline:none;border-color:var(--acc)}

/* ── PROGRESS RINGS ── */
.prog-ring-wrap{position:relative;width:60px;height:60px;flex-shrink:0}
.prog-ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.prog-ring-pct{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:800;color:var(--acc);line-height:1}
.prog-ring-lbl{font-size:8px;color:var(--t3);text-transform:uppercase}

/* ── COMMUNITY COMMENTS ── */
.comment-card{background:var(--bg3);border-radius:var(--r2);padding:12px 14px;border:0.5px solid var(--b)}
.comment-header{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.comment-avatar{width:28px;height:28px;border-radius:50%;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--acc);flex-shrink:0;border:1px solid rgba(245,197,24,.2)}
.comment-name{font-size:12px;font-weight:600;color:var(--t);flex:1}
.comment-time{font-size:10px;color:var(--t3)}
.comment-text{font-size:13px;color:var(--t2);line-height:1.65}
.comment-likes{display:flex;align-items:center;gap:4px;margin-top:8px;cursor:pointer}
.comment-like-btn{font-size:12px;color:var(--t3);background:var(--bg4);border:none;border-radius:999px;padding:3px 10px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s}
.comment-like-btn.liked{color:var(--red);background:rgba(255,92,92,.1)}

/* ── NOTIFICATION BELL ── */
.notif-btn{position:relative;width:28px;height:28px;border-radius:50%;background:var(--bg3);border:1px solid var(--b2);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px}
.notif-dot{position:absolute;top:3px;right:3px;width:7px;height:7px;border-radius:50%;background:var(--red);border:1.5px solid var(--bg)}

/* ── WORKOUT TIMER ── */
.timer-bar{position:fixed;top:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:rgba(245,197,24,.95);z-index:200;padding:8px 16px;display:flex;align-items:center;gap:10px;display:none}
.timer-bar.show{display:flex}
.timer-num{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:800;color:#000;min-width:42px}
.timer-lbl{font-size:12px;font-weight:600;color:rgba(0,0,0,.7);flex:1}
.timer-close{background:rgba(0,0,0,.15);border:none;border-radius:999px;padding:3px 10px;font-size:12px;font-weight:700;color:#000;cursor:pointer;font-family:'DM Sans',sans-serif}

/* ── MUSCLE MAP ── */
.muscle-map{display:flex;gap:8px;flex-wrap:wrap;margin:8px 0}
.muscle-tag{font-size:11px;padding:3px 10px;border-radius:999px;font-weight:600;background:rgba(245,197,24,.1);color:var(--acc);border:0.5px solid rgba(245,197,24,.25)}
.muscle-tag.sec{background:rgba(139,147,168,.1);color:var(--t2);border-color:var(--b2)}

/* ── SERIES TRACKER ── */
.series-tracker{display:flex;gap:6px;flex-wrap:wrap;margin:10px 0}
.serie-btn{width:36px;height:36px;border-radius:9px;border:1.5px solid var(--b2);background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--t2);cursor:pointer;transition:all .2s;font-family:'Barlow Condensed',sans-serif}
.serie-btn.done-s{background:var(--acc);border-color:var(--acc);color:#000}
.serie-btn.current-s{border-color:var(--acc);color:var(--acc);box-shadow:0 0 8px rgba(245,197,24,.3)}

/* ── PERSONAL RECORDS ── */
.pr-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:999px;background:linear-gradient(135deg,rgba(245,197,24,.2),rgba(245,197,24,.05));border:0.5px solid rgba(245,197,24,.4);font-size:10px;font-weight:700;color:var(--acc);margin-left:6px}

/* ── WATER TRACKER ── */
.water-track{display:flex;gap:6px;flex-wrap:wrap;margin:8px 0}
.water-cup{font-size:20px;cursor:pointer;opacity:.3;transition:all .2s;filter:grayscale(1)}
.water-cup.filled{opacity:1;filter:none}

/* ── IMPROVED CARDS ── */
.day-summary-card{background:linear-gradient(135deg,rgba(245,197,24,.08),rgba(245,197,24,.02));border:0.5px solid rgba(245,197,24,.2);border-radius:var(--r2);padding:14px;margin-bottom:12px;display:flex;align-items:center;gap:12px}
.dsc-ico{font-size:28px;width:44px;height:44px;background:rgba(245,197,24,.1);border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.dsc-info{flex:1}
.dsc-title{font-size:13px;font-weight:700;color:var(--t);margin-bottom:2px}
.dsc-sub{font-size:11px;color:var(--t2)}
.dsc-val{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:800;color:var(--acc);line-height:1}

/* ── REST TIMER ── */
.rest-timer-modal{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:400;display:none;align-items:center;justify-content:center;flex-direction:column}
.rest-timer-modal.show{display:flex}
.rest-timer-num{font-family:'Barlow Condensed',sans-serif;font-size:120px;font-weight:900;color:var(--acc);line-height:1;text-shadow:0 0 60px rgba(245,197,24,.4)}
.rest-timer-lbl{font-size:16px;color:var(--t2);margin-bottom:32px;letter-spacing:2px;text-transform:uppercase}
.rest-timer-skip{background:var(--bg2);border:1px solid var(--b2);border-radius:999px;padding:10px 28px;font-size:14px;font-weight:600;color:var(--t);cursor:pointer;font-family:'DM Sans',sans-serif}

/* ── IMPROVED PROFILE ── */
.goal-progress{background:var(--bg2);border:0.5px solid var(--b);border-radius:var(--r2);padding:16px;margin-bottom:10px}
.goal-bar-wrap{height:8px;background:var(--bg3);border-radius:8px;margin:8px 0;overflow:hidden}
.goal-bar-fill{height:8px;border-radius:8px;background:linear-gradient(90deg,var(--acc),var(--acc2));transition:width .6s cubic-bezier(.4,0,.2,1)}

</style>
</head>
<body>

<!-- SPLASH -->
<div id="splash">
  <div class="sp-logo">FIT</div>
  <div class="sp-sub">Tu programa personalizado</div>
  <div class="sp-bar"><div class="sp-fill"></div></div>
  <div class="sp-status" id="spStatus">Cargando...</div>
</div>

<!-- ONBOARDING -->
<div id="onboardScreen">
  <div class="ob-progress"><div class="ob-bar" id="obBar" style="width:10%"></div></div>
  <div class="ob-body" id="obBody"></div>
  <div class="ob-footer">
    <button class="ob-next" id="obNext" onclick="obNextStep()">Continuar →</button>
    <div style="display:flex;gap:10px;margin-top:10px">
      <span class="ob-skip" id="obBack" onclick="obBackStep()" style="flex:1;text-align:left">← Atrás</span>
      <span class="ob-skip" id="obSkip" onclick="obSkipStep()" style="flex:1;text-align:right">Omitir</span>
    </div>
  </div>
</div>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-logo">FIT</div>
  <div class="login-sub">Tu programa personalizado</div>
  <div class="login-title">Guarda tu progreso</div>
  <div class="login-desc">Con Gmail tus datos se sincronizan automáticamente entre dispositivos.</div>
  <button class="google-btn" onclick="signInWithGoogle()">
    <svg width="20" height="20" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
    Continuar con Google
  </button>
  <button class="skip-login-btn" onclick="skipLogin()">Continuar sin cuenta (solo local)</button>
</div>

<!-- MAIN APP -->
<div class="header" id="appHeader" style="display:none">
  <div class="hrow">
    <div class="logo">FITAPP</div>
    <div class="hright">
      <div class="wchip">Semana <b id="weekNum">1</b></div>
      <div class="notif-btn" onclick="showNotifs()" id="notifBell">🔔<div class="notif-dot" id="notifDot" style="display:none"></div></div>
      <div id="userAvatar" class="user-placeholder" onclick="showTab('perfil',document.querySelectorAll('.nbtn')[6])">👤</div>
    </div>
  </div>
  <div class="dstrip" id="dayStrip"></div>
</div>
<div class="main" id="main" style="display:none"></div>
<div class="bnav" id="bnav" style="display:none">
  <button class="nbtn active" onclick="showTab('rutina',this)"><span class="ni">🏋️</span>Rutina</button>
  <button class="nbtn" onclick="showTab('activacion',this)"><span class="ni">🍑</span>Activa</button>
  <button class="nbtn" onclick="showTab('alimentos',this)"><span class="ni">🥗</span>Alimentos</button>
  <button class="nbtn" onclick="showTab('tranquilidad',this)"><span class="ni">🧘</span>Calma</button>
  <button class="nbtn" onclick="showTab('test',this)"><span class="ni">🧪</span>Test</button>
  <button class="nbtn" onclick="showTab('medidas',this)"><span class="ni">📏</span>Medidas</button>
  <button class="nbtn" onclick="showTab('perfil',this)"><span class="ni">👤</span>Perfil</button>
</div>


<!-- REST TIMER MODAL -->
<div class="rest-timer-modal" id="restTimerModal">
  <div class="rest-timer-lbl">Descanso entre series</div>
  <div class="rest-timer-num" id="restTimerNum">90</div>
  <div style="font-size:13px;color:var(--t3);margin-bottom:32px">segundos</div>
  <button class="rest-timer-skip" onclick="skipRestTimer()">Saltar descanso ›</button>
</div>

<!-- Food modal -->
<div class="food-modal" id="foodModal" onclick="closeFoodModal(event)">
  <div class="food-modal-inner" id="foodModalInner"></div>
</div>

<!-- Feedback modal -->
<div class="feedback-modal" id="feedbackModal" onclick="closeFeedbackModal(event)">
  <div class="feedback-inner" id="feedbackInner">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
      <div style="font-family:'Barlow Condensed',sans-serif;font-size:24px;font-weight:800;color:var(--t)">Tu opinión</div>
      <button onclick="document.getElementById('feedbackModal').classList.remove('show')" style="width:32px;height:32px;border-radius:50%;background:var(--bg3);border:none;color:var(--t2);font-size:16px;cursor:pointer">✕</button>
    </div>
    <div style="font-size:13px;color:var(--t2);margin-bottom:4px">¿Cómo calificarías FitApp?</div>
    <div class="stars-row" id="starsRow">
      <span class="star" onclick="setStar(1)">⭐</span>
      <span class="star" onclick="setStar(2)">⭐</span>
      <span class="star" onclick="setStar(3)">⭐</span>
      <span class="star" onclick="setStar(4)">⭐</span>
      <span class="star" onclick="setStar(5)">⭐</span>
    </div>
    <textarea class="feedback-textarea" id="feedbackText" placeholder="Cuéntanos qué mejorarías o qué te encanta..."></textarea>
    <button class="mbtn" onclick="submitFeedback()">Enviar comentario 💪</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged }
  from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc }
  from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDtaI4--fvZksSbgHtr-2enyKiFqy3iTdc",
  authDomain: "fitwilmerapp.firebaseapp.com",
  projectId: "fitwilmerapp",
  storageBucket: "fitwilmerapp.firebasestorage.app",
  messagingSenderId: "809165143909",
  appId: "1:809165143909:web:ea6e336074715f9350eb8c"
};
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const provider = new GoogleAuthProvider();
let currentUser = null;
let saveTimeout = null;

// ── ONBOARDING STATE ─────────────────────────────────────────────
let ob = {
  step: 0,
  gender: null,
  goal: null,
  areas: [],
  heightUnit: 'cm',
  heightCm: '',
  weightUnit: 'kg',
  weightKg: '',
  weightGoalKg: '',
  fitnessLevel: null,
  rmExercise: null,
  rmWeight: '',
  rmReps: '',
  rmResult: null,
  freq: null,
  startDay: null,
  equipment: [],
  location: null,
  challenge: null,
  trainTime: '07:00',
  onboardDone: false
};

const OB_STEPS = [
  'gender','goal','areas','height','weight','weightGoal','fitness','rm','freq','equipment','location','challenge','time','login'
];

function obRender(){
  const step = OB_STEPS[ob.step];
  const pct = Math.round(((ob.step+1)/OB_STEPS.length)*100);
  document.getElementById('obBar').style.width = pct+'%';
  const skip = document.getElementById('obSkip');
  const next = document.getElementById('obNext');
  skip.style.display = ['areas','rm','login'].includes(step) ? 'block' : 'none';
  next.textContent = ob.step === OB_STEPS.length-1 ? '¡Empezar ahora! 🚀' : 'Continuar →';

  let html = '';
  if(step==='gender'){
    html = `<div class="ob-step-num">Paso 1 de ${OB_STEPS.length}</div>
    <div class="ob-title">¿Cuál es tu género?</div>
    <div class="ob-desc">Esto nos ayuda a personalizar tu programa y cálculos.</div>
    <div class="gender-grid">
      <div class="gender-card${ob.gender==='hombre'?' selected':''}" onclick="obSet('gender','hombre');obRender()">
        <div class="gc-ico">♂️</div><div class="gc-lbl">Hombre</div>
      </div>
      <div class="gender-card${ob.gender==='mujer'?' selected':''}" onclick="obSet('gender','mujer');obRender()">
        <div class="gc-ico">♀️</div><div class="gc-lbl">Mujer</div>
      </div>
    </div>`;
  } else if(step==='goal'){
    const goals = [
      {k:'fuerza',ico:'💪',lbl:'Volverme más fuerte',sub:'Aumentar mi fuerza máxima'},
      {k:'masa',ico:'🏋️',lbl:'Aumentar masa muscular',sub:'Crecer y definir mi cuerpo'},
      {k:'definicion',ico:'✨',lbl:'Ponerme definido y tonificado',sub:'Marcar el músculo existente'},
      {k:'peso',ico:'⚖️',lbl:'Reducir peso corporal',sub:'Bajar grasa de forma saludable'},
      {k:'salud',ico:'❤️',lbl:'Mejorar salud y bienestar',sub:'Sentirme mejor en general'},
      {k:'rendimiento',ico:'🏆',lbl:'Mejorar rendimiento deportivo',sub:'Rendir más en mi deporte'},
    ];
    html = `<div class="ob-step-num">Paso 2 de ${OB_STEPS.length}</div>
    <div class="ob-title">¿Cuál es tu objetivo principal?</div>
    <div class="ob-desc">Elige el que más te representa ahora mismo.</div>
    <div class="ob-options">${goals.map(g=>`
      <div class="ob-option${ob.goal===g.k?' selected':''}" onclick="obSet('goal','${g.k}');obRender()">
        <div class="oo-ico">${g.ico}</div>
        <div class="oo-text"><div class="oo-lbl">${g.lbl}</div><div class="oo-sub">${g.sub}</div></div>
        <div class="oo-check">${ob.goal===g.k?'✓':''}</div>
      </div>`).join('')}
    </div>`;
  } else if(step==='areas'){
    const areas = ['Espalda','Hombros','Brazos','Pecho','Abdominales','Glúteos','Piernas','Todo el cuerpo'];
    const icos =  ['🔙','🦾','💪','🫀','🎯','🍑','🦵','⚡'];
    html = `<div class="ob-step-num">Paso 3 de ${OB_STEPS.length}</div>
    <div class="ob-title">¿En qué áreas quieres concentrarte?</div>
    <div class="ob-desc">Puedes elegir más de una.</div>
    <div class="ob-chips">${areas.map((a,i)=>`
      <div class="ob-chip${ob.areas.includes(a)?' selected':''}" onclick="obToggleArea('${a}');obRender()">${icos[i]} ${a}</div>`).join('')}
    </div>`;
  } else if(step==='height'){
    html = `<div class="ob-step-num">Paso 4 de ${OB_STEPS.length}</div>
    <div class="ob-title">¿Cuánto mides?</div>
    <div class="ob-desc">Lo usamos para calcular tu IMC y recomendaciones.</div>
    <div class="ob-num-toggle" style="margin-bottom:16px;width:fit-content">
      <button class="${ob.heightUnit==='cm'?'active':''}" onclick="obSet('heightUnit','cm');obRender()">cm</button>
      <button class="${ob.heightUnit==='ft'?'active':''}" onclick="obSet('heightUnit','ft');obRender()">ft</button>
    </div>
    <div class="ob-num-row">
      <span class="ob-num-lbl">Altura</span>
      <div class="ob-num-wrap">
        <input class="ob-num-input" type="number" inputmode="numeric" pattern="[0-9]*" placeholder="${ob.heightUnit==='cm'?'170':'5.8'}" value="${ob.heightCm}" oninput="obSet('heightCm',this.value)"/>
        <span class="ob-num-unit">${ob.heightUnit}</span>
      </div>
    </div>`;
  } else if(step==='weight'){
    const h = parseFloat(ob.heightUnit==='ft' ? (parseFloat(ob.heightCm||0)*30.48) : (ob.heightCm||0));
    const w = parseFloat(ob.weightKg||0);
    let imcHTML = '';
    if(h>0 && w>0){
      const hm = h/100;
      const imc = (w/(hm*hm)).toFixed(1);
      let cat='', cls='';
      if(imc<18.5){cat='Bajo peso';cls='warn';}
      else if(imc<25){cat='Peso normal';cls='good';}
      else if(imc<30){cat='Sobrepeso';cls='warn';}
      else{cat='Obesidad';cls='warn';}
      imcHTML = `<div class="ob-info-box ${cls}"><strong>IMC actual: ${imc}</strong> — ${cat}</div>`;
    }
    html = `<div class="ob-step-num">Paso 5 de ${OB_STEPS.length}</div>
    <div class="ob-title">¿Cuánto pesas?</div>
    <div class="ob-desc">Dato privado, solo para calcular tu IMC y pesos de trabajo.</div>
    <div class="ob-num-toggle" style="margin-bottom:16px;width:fit-content">
      <button class="${ob.weightUnit==='kg'?'active':''}" onclick="obSet('weightUnit','kg');obRender()">kg</button>
      <button class="${ob.weightUnit==='lbs'?'active':''}" onclick="obSet('weightUnit','lbs');obRender()">lbs</button>
    </div>
    <div class="ob-num-row">
      <span class="ob-num-lbl">Peso actual</span>
      <div class="ob-num-wrap">
        <input class="ob-num-input" type="number" inputmode="numeric" pattern="[0-9]*" placeholder="${ob.weightUnit==='kg'?'70':'154'}" value="${ob.weightKg}" oninput="obSet('weightKg',this.value);obRender()"/>
        <span class="ob-num-unit">${ob.weightUnit}</span>
      </div>
    </div>
    ${imcHTML}`;
  } else if(step==='weightGoal'){
    const cur = parseFloat(ob.weightKg||0);
    const goal = parseFloat(ob.weightGoalKg||0);
    let recHTML = '';
    if(cur>0 && goal>0){
      const diff = goal-cur;
      if(Math.abs(diff)<2) recHTML=`<div class="ob-info-box good"><strong>Excelente objetivo.</strong> Muy razonable. Tu programa lo logrará con constancia.</div>`;
      else if(diff<-10) recHTML=`<div class="ob-info-box warn"><strong>Cambio considerable.</strong> Bajar más de 10kg requiere tiempo. Iremos paso a paso sin comprometer tu salud.</div>`;
      else if(diff>10) recHTML=`<div class="ob-info-box warn"><strong>Meta ambiciosa.</strong> Subir masa muscular toma tiempo. Tu programa te guiará de forma progresiva y segura.</div>`;
      else if(diff<0) recHTML=`<div class="ob-info-box good"><strong>Objetivo razonable.</strong> Un déficit moderado con entrenamiento de fuerza es lo más efectivo.</div>`;
      else recHTML=`<div class="ob-info-box good"><strong>Objetivo alcanzable.</strong> Con el programa correcto y nutrición adecuada llegarás a tu meta.</div>`;
    }
    html = `<div class="ob-step-num">Paso 6 de ${OB_STEPS.length}</div>
    <div class="ob-title">¿Cuál es tu peso objetivo?</div>
    <div class="ob-desc">Sé realista. Un cambio de 0.5-1 kg/semana es lo más efectivo.</div>
    <div class="ob-num-row">
      <span class="ob-num-lbl">Peso meta</span>
      <div class="ob-num-wrap">
        <input class="ob-num-input" type="number" inputmode="numeric" pattern="[0-9]*" placeholder="65" value="${ob.weightGoalKg}" oninput="obSet('weightGoalKg',this.value);obRender()"/>
        <span class="ob-num-unit">${ob.weightUnit}</span>
      </div>
    </div>
    ${recHTML}`;
  } else if(step==='fitness'){
    const levels = [
      {k:'principiante',ico:'🌱',lbl:'Principiante',sub:'Menos de 6 meses entrenando o recién empiezo'},
      {k:'intermedio',ico:'⚡',lbl:'Intermedio',sub:'6 meses a 2 años de entrenamiento regular'},
      {k:'avanzado',ico:'🔥',lbl:'Avanzado',sub:'Más de 2 años entrenando consistentemente'},
    ];
    html = `<div class="ob-step-num">Paso 7 de ${OB_STEPS.length}</div>
    <div class="ob-title">¿Cuál es tu nivel de fitness?</div>
    <div class="ob-desc">Sé honesto, eso nos ayuda a ajustar la intensidad perfecta para ti.</div>
    <div class="ob-options">${levels.map(l=>`
      <div class="ob-option${ob.fitnessLevel===l.k?' selected':''}" onclick="obSet('fitnessLevel','${l.k}');obRender()">
        <div class="oo-ico">${l.ico}</div>
        <div class="oo-text"><div class="oo-lbl">${l.lbl}</div><div class="oo-sub">${l.sub}</div></div>
        <div class="oo-check">${ob.fitnessLevel===l.k?'✓':''}</div>
      </div>`).join('')}
    </div>`;
  } else if(step==='rm'){
    const exs = [
      {k:'press_banca',ico:'🏋️',lbl:'Press de banca'},
      {k:'sentadilla',ico:'🦵',lbl:'Sentadilla con barra'},

window.obSet = (k,v) => { ob[k]=v; };
window.obToggleArea = (a) => { const i=ob.areas.indexOf(a); i>=0?ob.areas.splice(i,1):ob.areas.push(a); };
window.obToggleEquip = (e) => { const i=ob.equipment.indexOf(e); i>=0?ob.equipment.splice(i,1):ob.equipment.push(e); };
window.obCalcRM = () => {
  const w=parseFloat(ob.rmWeight), r=parseInt(ob.rmReps);
  if(w>0&&r>0&&r<=10){ ob.rmResult = Math.round(w*(1+(r/30))); obRender(); }
};
window.obToggleRMEdit = () => {
  const input = document.getElementById('rmEditInput');
  const num = document.getElementById('rmDisplayNum');
  if(input.style.display==='none'){ input.style.display='block'; num.style.display='none'; }
  else { input.style.display='none'; num.style.display='block'; }
};
window.obUpdateRM = (v) => {
  ob.rmResult = Math.round(parseFloat(v)||0);
  const num = document.getElementById('rmDisplayNum');
  if(num) num.textContent = ob.rmResult+'kg';
};
window.obSetHour = (h) => { ob.trainTime = String(h).padStart(2,'0')+':00'; };
window.obSetAMPM = (ampm) => {
  const h = parseInt((ob.trainTime||'07:00').split(':')[0]);
  if(ampm==='AM' && h>=12) ob.trainTime = String(h-12).padStart(2,'0')+':00';
  else if(ampm==='PM' && h<12) ob.trainTime = String(h+12).padStart(2,'0')+':00';
};
window.obBackStep = () => { if(ob.step > 0){ ob.step--; obRender(); document.getElementById('obBody').scrollTop=0; } };
window.obNextStep = () => {
  if(ob.step < OB_STEPS.length-1){ ob.step++; obRender(); document.getElementById('obBody').scrollTop=0; }
  else { obFinishLocal(); }
};
window.obSkipStep = () => {
  if(ob.step < OB_STEPS.length-1){ ob.step++; obRender(); document.getElementById('obBody').scrollTop=0; }
  else { obFinishLocal(); }
};
window.obRender = obRender;
window.obFinishLocal = () => {
  ob.onboardDone=true;
  localStorage.setItem('fitapp_ob', JSON.stringify(ob));
  if(ob.rmExercise && ob.rmResult) oneRM[ob.rmExercise] = ob.rmResult;
  document.getElementById('onboardScreen').classList.remove('show');
  showApp();
};
window.signInWithGoogleOnboard = async () => {
  try {
    await signInWithPopup(auth, provider);
    ob.onboardDone=true;
    localStorage.setItem('fitapp_ob', JSON.stringify(ob));
    if(ob.rmExercise && ob.rmResult) oneRM[ob.rmExercise] = ob.rmResult;
    document.getElementById('onboardScreen').classList.remove('show');
  } catch(e){ alert('Error al iniciar sesión. Intenta de nuevo.'); }
};

function showApp(){

  buildStrip(); renderWorkout();

function buildStrip(){
  const c=document.getElementById('dayStrip'); c.innerHTML='';
  DAYS.forEach((d,i)=>{
    const k=`${weekNum}_${i}`;
    const allDone=d.exercises.length>0&&d.exercises.every((_,ei)=>checked[`${k}_${ei}`]);
    const el=document.createElement('div');
    el.className='dp'+(i===curDay?' active':'')+(d.rest?' rest-d':'')+(allDone?' done-d':'');
    el.innerHTML=`<span class="dpn">${d.short}</span><span class="dpd">${d.name.substring(0,3)}</span><div class="dpdot"></div>`;
    el.onclick=()=>{curDay=i;expanded={};altState={};buildStrip();renderWorkout();};
    c.appendChild(el);
  });
  c.children[curDay].scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'});
}

function weightBox(dayIdx,exIdx,rec){
  const baseKey=`${weekNum}_${dayIdx}_${exIdx}`;
  // Try mapped key first, fallback to ob onboarding 1RM
  const rmKey=EX_RM_MAP[`${dayIdx}_${exIdx}`];
  let rm=rmKey?oneRM[rmKey]:null;
  // If no specific RM, use the onboarding RM as fallback
  if(!rm){
    const savedOb=localStorage.getItem('fitapp_ob');
    if(savedOb){const o=JSON.parse(savedOb);if(o.rmResult)rm=o.rmResult;}
  }
  const curVal=weights[baseKey]||'';
  if(rm){
    const pct=exIdx===0&&(dayIdx===0||dayIdx===3)?0.85:exIdx<=1&&(dayIdx===1||dayIdx===5)?0.85:0.75;
    const w75=Math.round(rm*0.75/2.5)*2.5, w80=Math.round(rm*0.80/2.5)*2.5, w70=Math.round(rm*0.70/2.5)*2.5;
    return `<div class="wbox">
      <div class="wbox-lbl" style="margin-bottom:8px">🤖 Pesos calculados — tu 1RM: <b style="color:var(--acc)">${rm}kg</b></div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px">
        <div style="background:rgba(212,255,71,.12);border:0.5px solid rgba(212,255,71,.2);border-radius:8px;padding:8px 12px;text-align:center;flex:1">
          <div style="font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:1px">Volumen 70%</div>
          <div style="font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:800;color:var(--acc);line-height:1.1">${w70}kg</div>
        </div>
        <div style="background:rgba(245,197,24,.1);border:0.5px solid rgba(245,197,24,.25);border-radius:8px;padding:8px 12px;text-align:center;flex:1">
          <div style="font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:1px">Hipertrofia 75%</div>
          <div style="font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:800;color:var(--acc);line-height:1.1">${w75}kg</div>
        </div>
        <div style="background:rgba(255,92,92,.08);border:0.5px solid rgba(255,92,92,.2);border-radius:8px;padding:8px 12px;text-align:center;flex:1">
          <div style="font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:1px">Fuerza 80%</div>
          <div style="font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:800;color:var(--red);line-height:1.1">${w80}kg</div>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:8px;background:var(--bg3);border-radius:var(--r);padding:10px 12px">
        <span style="font-size:14px">✏️</span>
        <span style="font-size:12px;color:var(--t2);flex:1">Peso que usarás hoy</span>
        <input class="winput" type="number" inputmode="numeric" pattern="[0-9]*" placeholder="—" value="${curVal}"
          onchange="saveWeight('${baseKey}',this.value)"
          style="width:70px;font-size:22px"/>
        <span style="font-size:12px;color:var(--t3)">kg</span>
      </div>
    </div>`;
  }
  // No RM at all — simple input, no test button
  return `<div class="wbox">
    <div style="font-size:11px;color:var(--t2);margin-bottom:8px">💡 ${rec}</div>
    <div style="display:flex;align-items:center;gap:8px;background:var(--bg3);border-radius:var(--r);padding:10px 12px">
      <span style="font-size:14px">🏋️</span>
      <span style="font-size:12px;color:var(--t2);flex:1">Peso que usarás hoy</span>
      <input class="winput" type="number" inputmode="numeric" pattern="[0-9]*" placeholder="—" value="${curVal}"
        onchange="saveWeight('${baseKey}',this.value)"
        style="width:70px;font-size:22px"/>
      <span style="font-size:12px;color:var(--t3)">kg</span>
    </div>

function actCard(isPage){
  const tk=todayKey();const fn=isPage?'toggleActP':'toggleAct';
  const doneCount=ACTIVATION.items.filter((_,i)=>actChk[`act_${tk}_${i}`]).length;
  const allDone=doneCount===ACTIVATION.items.length;
  let h=`<div class="actsec"><div class="acthdr"><span style="font-size:20px">🍑</span>
    <div><div class="acttitle">${ACTIVATION.title}</div><div class="actsub">${ACTIVATION.sub}</div></div></div>
    <div style="font-size:11px;color:var(--t2);margin-bottom:10px">Hoy: <b style="color:var(--orange)">${doneCount}/${ACTIVATION.items.length}</b>${allDone?'<span style="color:var(--green);margin-left:6px">✓ Ronda completa</span>':''}</div>
    <div class="actitems">`;
  ACTIVATION.items.forEach((ex,i)=>{
    const ck=`act_${tk}_${i}`;const done=!!actChk[ck];
    h+=`<div class="actitem${done?' done-a':''}" onclick="${fn}('${ck}')"><div class="actbody"><div class="actname">${ex.name}</div><div class="actsubs">${ex.sub}</div></div><div class="achk${done?' done':''}">${chkSvg()}</div></div>`;
  });
  if(allDone) h+=`<button class="mbtn" style="margin-top:10px;font-size:12px;padding:10px" onclick="resetActRound()">🔄 Nueva ronda (+1)</button>`;
  h+=`</div><div class="actwarn">${ACTIVATION.warn}</div></div>`;
  return h;
}

function renderWorkout(){
  const d=DAYS[curDay];const main=document.getElementById('main');
  if(d.rest){
    main.innerHTML=`<div class="restscr fade"><div class="restbig">ZZZ</div><div class="resttitle">Día de descanso</div>
      <div class="restdesc">El descanso es donde crece el músculo. Duerme bien, hidrátate y come proteína.</div>
      <div class="resttip"><strong>Recuerda:</strong> Haz la activación de glúteos cada 45-60 min si estás sentado.</div>
      ${actCard(false)}</div>`;return;
  }
  const k=`${weekNum}_${curDay}`;const total=d.exercises.length;
  const done=d.exercises.filter((_,i)=>checked[`${k}_${i}`]).length;
  const pct=total>0?Math.round((done/total)*100):0;
  const col=TYPE_COLOR[d.type];

  // Water tracker
  const waterCups = Array.from({length:8},(_,i)=>`
    <span class="water-cup${i<waterToday?' filled':''}" onclick="toggleWater(${i})">💧</span>`).join('');

  let html=`<div class="fade">
    <div class="hero">
      <div class="hero-cat" style="color:${col}">${TYPE_LABEL[d.type]}</div>
      <div class="hero-name">${d.name}</div>
      <div class="hero-focus">${d.focus}</div>
      <div class="hero-meta">
        <div class="hm"><div class="hmv">${d.duration}</div><div class="hml">Duración</div></div>
        <div class="hm"><div class="hmv">${d.cal}</div><div class="hml">Calorías</div></div>
        <div class="hm"><div class="hmv">${done}/${total}</div><div class="hml">Completados</div></div>
      </div>
    </div>
    <div class="prog-track"><div class="prog-fill" style="width:${pct}%"></div></div>
    ${pct===100?`<div style="background:rgba(61,214,140,.08);border:0.5px solid rgba(61,214,140,.2);border-radius:var(--r2);padding:12px 16px;margin-bottom:12px;display:flex;align-items:center;gap:10px"><span style="font-size:22px">🎉</span><div><div style="font-size:14px;font-weight:700;color:var(--green)">¡Entrenamiento completado!</div><div style="font-size:11px;color:var(--t2);margin-top:2px">Excelente trabajo hoy. El músculo crece en el descanso.</div></div></div>`:''}
    <div style="background:var(--bg2);border:0.5px solid var(--b);border-radius:var(--r2);padding:12px 14px;margin-bottom:12px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
        <div style="font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--t3)">💧 Hidratación — <span id="waterCount">${waterToday}</span>/8 vasos</div>
        <div style="font-size:10px;color:var(--t3)">${Math.round(waterToday*250)}ml / 2000ml</div>
      </div>
      <div class="water-track">${waterCups}</div>
    </div>
    <div class="slbl">Calentamiento</div>
    <div class="icard"><div class="iico iico-blue">🔥</div><div class="itext">${d.warmup}</div></div>
    <div class="slbl">Ejercicios</div><div class="exlist">`;
  d.exercises.forEach((ex,i)=>{
    const ck=`${k}_${i}`;const isDone=!!checked[ck];const isOpen=!!expanded[i];const useAlt=altState[`${curDay}_${i}`]||'A';
    html+=`<div class="excard${isDone?' done-c':''}${isOpen?' open-c':''}" id="ec${i}">
      <div class="extop" onclick="toggleEx(${i})">
        <div class="exnum${ex.key?' k':''}">${i+1}</div>
        <div class="exbody"><div class="exname">${ex.name}${ex.key?'<span class="kbadge">Clave</span>':''}</div><div class="exsets">${ex.sets}</div></div>
        <span class="exmuscle">${ex.muscle}</span>
        <div class="chk${isDone?' done':''}" onclick="event.stopPropagation();toggleCheck('${ck}')">${chkSvg()}</div>
        <span class="chev">⌄</span>
      </div>
      <div class="exdetail${isOpen?' open':''}">`;
    html+=weightBox(curDay,i,ex.rec);
    if(ex.hasAlt){
      html+=`<div class="alt-toggle">
        <button class="alt-btn${useAlt==='A'?' act-alt':''}" onclick="setAlt(${i},'A')">${ex.altA.label}</button>
        <button class="alt-btn${useAlt==='B'?' act-alt':''}" onclick="setAlt(${i},'B')">${ex.altB.label}</button>
      </div>
      <div class="alt-content${useAlt==='A'?' show':''}"><div class="alt-tip">${ex.altA.tip}</div></div>
      <div class="alt-content${useAlt==='B'?' show':''}"><div class="alt-tip">${ex.altB.tip}</div></div>`;
    }
    // Series tracker
    const setsMatch = ex.sets.match(/(\d+)\s*[×x]/);
    const totalSeries = setsMatch ? parseInt(setsMatch[1]) : 3;
    const serKey = `${k}_${i}_series`;
    const doneSeries = seriesDone[serKey] || 0;
    const restTime = ex.key ? 120 : 90;
    const serBtns = Array.from({length:totalSeries},(_,si)=>`
      <div class="serie-btn${si<doneSeries?' done-s':si===doneSeries?' current-s':''}"
        onclick="event.stopPropagation();toggleSerie('${serKey}',${totalSeries},${restTime})">${si+1}</div>`).join('');

    // GIF del ejercicio
    const gifUrl = EX_GIFS[ex.name];

      </div>`;
    }
    html+=`<div class="tipbox">${ex.tip}</div>
    <div style="margin:10px 0">
      <div style="font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px">Series completadas</div>
      <div style="display:flex;align-items:center;gap:8px">
        <div class="series-tracker">${serBtns}</div>
        <button onclick="event.stopPropagation();startRestTimer(${restTime})" style="background:rgba(245,197,24,.1);border:0.5px solid rgba(245,197,24,.2);border-radius:8px;padding:6px 12px;font-size:11px;font-weight:600;color:var(--acc);cursor:pointer;font-family:'DM Sans',sans-serif;white-space:nowrap">⏱ ${restTime}s</button>
      </div>
    </div>
</div></div>`;
  });
  html+=`</div><div class="slbl">Enfriamiento</div><div class="icard"><div class="iico iico-teal">❄️</div><div class="itext">${d.cooldown}</div></div>${actCard(false)}</div>`;
  main.innerHTML=html;
}

window.validateAndCalc=()=>{

  const rm=Math.round(p*(1+(r/30)));
  oneRM[window.testState.exKey]=rm;
  window.testState.step='result'; window.testState.result=rm;
  if(window.saveToCloud) window.saveToCloud();

function renderMedidas(){
  const today=new Date().toLocaleDateString('es-PE',{day:'2-digit',month:'short',year:'numeric'});
  const last=bodyMeas.length>0?bodyMeas[bodyMeas.length-1]:null;
  let fieldsHTML='';
  BODY_FIELDS.forEach(f=>{
    const lastVal=last?(last[f.key]||''):'';  
    fieldsHTML+=`<div class="mfield"><div class="mfield-lbl">${f.label}</div>
      <div class="mfield-row"><input class="minput" type="number" inputmode="numeric" pattern="[0-9]*" placeholder="—" id="mf_${f.key}" value="${lastVal}"/><span class="munit">${f.unit}</span></div></div>`;
  });
  let histHTML='';
  if(bodyMeas.length===0){
    histHTML='<div class="no-meas">📏 Aún no tienes registros.<br>Guarda tus medidas de hoy<br>para empezar a ver tu progreso.</div>';
  } else {
    histHTML=`<div style="display:flex;align-items:center;justify-content:space-between;margin:18px 0 10px">
      <div class="mhist-title" style="margin:0">Historial</div>
      <button onclick="clearAllMedidas()" style="background:rgba(255,92,92,.08);border:0.5px solid rgba(255,92,92,.2);border-radius:8px;padding:5px 12px;font-size:11px;color:var(--red);cursor:pointer;font-family:'DM Sans',sans-serif">🗑 Borrar todo</button>
    </div>`;
    [...bodyMeas].reverse().forEach((entry,ei)=>{
      const realIdx=bodyMeas.length-1-ei;
      const prevEntry=ei<bodyMeas.length-1?[...bodyMeas].reverse()[ei+1]:null;
      histHTML+=`<div class="mhist-entry"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
        <div class="mhist-date">📅 ${entry.date}</div>
        <button onclick="deleteMedida(${realIdx})" style="background:rgba(255,92,92,.08);border:0.5px solid rgba(255,92,92,.2);border-radius:8px;padding:4px 10px;font-size:11px;color:var(--red);cursor:pointer;font-family:'DM Sans',sans-serif">🗑</button>
      </div><div class="mhist-vals">`;
      BODY_FIELDS.forEach(f=>{
        const v=entry[f.key];const pv=prevEntry?prevEntry[f.key]:null; if(!v)return;
        let deltaHTML='';
        if(pv){const diff=+(parseFloat(v)-parseFloat(pv)).toFixed(1);if(diff!==0){const isGood=LOWER_IS_GOOD.includes(f.key)?diff<0:diff>0;deltaHTML=isGood?`<span class="dg">${diff>0?'+':''}${diff}${f.unit}</span>`:`<span class="dr">${diff>0?'+':''}${diff}${f.unit}</span>`;}else deltaHTML=`<span class="dn">=</span>`;}
        histHTML+=`<div class="mhist-item"><span class="mhist-k">${f.label}</span><span class="mhist-v">${v} ${f.unit} ${deltaHTML}</span></div>`;
      });
      histHTML+=`</div></div>`;
    });
  }
  document.getElementById('main').innerHTML=`<div class="fade" style="padding:14px 0">
    <div class="mcard">
      <div class="mcard-head"><div class="mcard-title">📏 Mis Medidas</div><div class="mcard-date">${today}</div></div>
      <div class="mgrid">${fieldsHTML}</div>
      <button class="mbtn" onclick="saveMedidas()">💾 Guardar medidas</button>
    </div>${histHTML}</div>`;
}

// ── STATS ────────────────────────────────────────────────────────
function renderStats(){
  let td=0,te=0;
  DAYS.forEach((d,di)=>d.exercises.forEach((_,ei)=>{te++;if(checked[`${weekNum}_${di}_${ei}`])td++;}));
  const streak=calcStreak();
  const bars=DAYS.map((d,di)=>{
    if(!d.exercises.length)return{pct:0};
    const dn=d.exercises.filter((_,ei)=>checked[`${weekNum}_${di}_${ei}`]).length;
    return{pct:Math.round((dn/d.exercises.length)*100)};
  });
  const imcText=()=>{
    const saved=localStorage.getItem('fitapp_ob');
    if(!saved)return'';
    const o=JSON.parse(saved);
    const h=parseFloat(o.heightCm||0),w=parseFloat(o.weightKg||0);
    if(!h||!w)return'';
    const hm=h/100,imc=(w/(hm*hm)).toFixed(1);
    return `<div style="background:var(--bg2);border:0.5px solid var(--b);border-radius:var(--r2);padding:14px;margin-bottom:12px">
      <div class="slbl" style="margin-bottom:6px">MI PERFIL</div>
      <div style="display:flex;gap:16px;flex-wrap:wrap;font-size:13px;color:var(--t2)">
        <span>⚖️ Peso: <b style="color:var(--t)">${w}kg</b></span>
        <span>📏 Altura: <b style="color:var(--t)">${h}cm</b></span>
        <span>🎯 Meta: <b style="color:var(--acc)">${o.weightGoalKg||'—'}kg</b></span>
        <span>IMC: <b style="color:var(--t)">${imc}</b></span>
      </div>
    </div>`;
  };
  let h=`<div class="fade" style="padding:14px 0">
    ${imcText()}
    <div class="slbl">Semana ${weekNum}</div>
    <div class="statsgrid">
      <div class="statcard"><div class="statnum">${td}</div><div class="statlbl">Ejercicios completados</div></div>
      <div class="statcard"><div class="statnum">${streak}</div><div class="statlbl">Días de racha</div></div>
      <div class="statcard"><div class="statnum">${Math.round((td/Math.max(te,1))*100)}%</div><div class="statlbl">Progreso semanal</div></div>
      <div class="statcard"><div class="statnum">${weekNum}</div><div class="statlbl">Semana actual</div></div>
    </div>
    <div class="slbl">Progreso por día</div>
    <div class="weekbars">${DAYS.map((d,i)=>`<div class="wb"><div class="wbwrap"><div class="wbbar" style="height:${bars[i].pct}%"></div></div><div class="wbn">${d.short}</div></div>`).join('')}</div>
    <div style="display:flex;gap:8px;margin-bottom:8px">
      <button class="btn-out" onclick="prevWeek()">← Anterior</button>
      <button class="btn-out" onclick="nextWeek()">Siguiente →</button>
    </div>
    <button class="btn-danger" onclick="resetWeek()">Reiniciar semana actual</button>
  </div>`;
  document.getElementById('main').innerHTML=h;
}

// ── GOAL PROGRESS ─────────────────────────────────────────────────
function calcGoalProgress(){
  const saved = localStorage.getItem('fitapp_ob');
  if(!saved) return null;
  const o = JSON.parse(saved);
  const cur = parseFloat(o.weightKg||0);
  const goal = parseFloat(o.weightGoalKg||0);
  const start = parseFloat(o.startWeight || o.weightKg || 0);
  if(!cur || !goal || cur===goal) return null;
  const total = Math.abs(goal - start);
  const done = Math.abs(cur - start);
  const pct = Math.min(100, Math.round((done/total)*100));
  const diff = (goal - cur).toFixed(1);
  return {cur, goal, pct, diff, losing: goal < cur};
}

  const el = document.getElementById('communityComments');
  if(!el) return;
  if(communityComments.length===0){
    el.innerHTML='<div style="text-align:center;padding:20px;color:var(--t3);font-size:13px">Sé el primero en comentar 🌟</div>';
    return;
  }
  el.innerHTML = communityComments.map(c=>{
    const initials = (c.name||'?').split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase();
    const liked = commentLikes[c.id];
    const timeStr = c.ts ? new Date(c.ts).toLocaleDateString('es-PE',{day:'2-digit',month:'short'}) : 'Hoy';
    return `<div class="comment-card">
      <div class="comment-header">
        <div class="comment-avatar">${c.photo?`<img src="${c.photo}" style="width:100%;height:100%;border-radius:50%;object-fit:cover"/>`:initials}</div>
        <div class="comment-name">${c.name||'Anónimo'}</div>
        <div class="comment-time">${timeStr}</div>
      </div>
      <div class="comment-text">${c.text}</div>
      <div class="comment-likes">
        <button class="comment-like-btn${liked?' liked':''}" onclick="likeComment('${c.id}',this)">
          ${liked?'❤️':'🤍'} ${(c.likes||0)+(liked&&!c._myLike?1:0)}
        </button>
      </div>
    </div>`;
  }).join('');
}

window.likeComment = async (id, btn) => {
  if(commentLikes[id]) return;
  commentLikes[id] = true;
  localStorage.setItem('fitapp_likes', JSON.stringify(commentLikes));
  btn.classList.add('liked');
  btn.innerHTML = '❤️ ' + (parseInt(btn.textContent.trim().split(' ')[1]||0) + 1);
  try{
    const { doc, updateDoc, increment } = await import("https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js");
    await updateDoc(doc(db,'community_comments',id), {likes: increment(1)});
  }catch(e){}
};

window.postComment = async () => {
  const input = document.getElementById('communityInput');
  const text = (input?.value||'').trim();
  if(!text){ alert('Escribe algo antes de publicar'); return; }
  if(text.length < 3){ alert('El comentario es muy corto'); return; }
  const name = currentUser?.displayName || 'Atleta Anónimo';
  const photo = currentUser?.photoURL || null;
  const newComment = {text, name, photo, likes:0, ts: new Date().toISOString()};
  // Show optimistically
  communityComments.unshift({id:'tmp_'+Date.now(),...newComment});
  renderComments();
  if(input) input.value='';
  // Save to Firestore
  try{
    const { collection, addDoc } = await import("https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js");
    await addDoc(collection(db,'community_comments'), newComment);
    addNotif('💬 Publicaste un comentario en la comunidad');
  }catch(e){
    // Offline — still shows locally
    console.log('Offline, saved locally');
  }
};

// ── EXPOSE ────────────────────────────────────────────────────────
window.renderTestPage=renderTestPage;
window.renderTestList=renderTestList;
window.loadComments=loadComments;
</script>
</body>
