<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="theme-color" content="#0f1117"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>FitApp</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#0f1117;--bg2:#181d28;--bg3:#1e2433;--bg4:#252c3d;--bg5:#2e3650;
  --b:rgba(255,255,255,0.06);--b2:rgba(255,255,255,0.12);
  --t:#f0f2f8;--t2:#8b93a8;--t3:#4a5268;
  --acc:#f5c518;--acc2:#e6b800;
  --blue:#4d9fff;--green:#3dd68c;--red:#ff5c5c;--orange:#ff8c42;--teal:#2dd4bf;--purple:#a78bfa;
  --r:12px;--r2:18px;--r3:22px;
  --card-grad:linear-gradient(135deg,#1e2433,#181d28);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--t);font-family:'DM Sans',sans-serif;overflow:hidden}
body{display:flex;flex-direction:column;max-width:430px;margin:0 auto}

/* SPLASH */
#splash{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .5s}
#splash.hide{opacity:0;pointer-events:none}
.sp-logo{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:90px;color:var(--acc);letter-spacing:-3px;line-height:1;text-shadow:0 0 40px rgba(245,197,24,.4)}
.sp-sub{font-size:11px;letter-spacing:4px;color:var(--t3);margin-top:6px;text-transform:uppercase}
.sp-bar{width:100px;height:2px;background:var(--bg3);border-radius:2px;margin-top:48px;overflow:hidden}
.sp-fill{height:2px;background:var(--acc);animation:spfill 2s cubic-bezier(.4,0,.2,1) forwards}
@keyframes spfill{from{width:0}to{width:100%}}
.sp-status{font-size:11px;color:var(--t3);margin-top:16px;letter-spacing:1px}

/* ── ONBOARDING ── */
#onboardScreen{position:fixed;inset:0;background:var(--bg);display:none;flex-direction:column;z-index:9990;overflow:hidden}
#onboardScreen.show{display:flex}
.ob-progress{height:3px;background:var(--bg3);flex-shrink:0}
.ob-bar{height:3px;background:linear-gradient(90deg,var(--acc),var(--acc2));transition:width .4s cubic-bezier(.4,0,.2,1);border-radius:3px}
.ob-body{flex:1;overflow-y:auto;padding:24px 20px 20px;scrollbar-width:none}
.ob-body::-webkit-scrollbar{display:none}
.ob-step-num{font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--acc);margin-bottom:8px}
.ob-title{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:36px;color:var(--t);line-height:1.05;margin-bottom:6px}
.ob-desc{font-size:13px;color:var(--t2);line-height:1.7;margin-bottom:24px}
.ob-footer{padding:16px 20px env(safe-area-inset-bottom,16px);flex-shrink:0;background:rgba(15,17,23,.97);border-top:0.5px solid var(--b)}
.ob-next{width:100%;padding:15px;background:linear-gradient(135deg,var(--acc),var(--acc2));color:#000;border:none;border-radius:var(--r2);font-family:'DM Sans',sans-serif;font-size:15px;font-weight:700;cursor:pointer;box-shadow:0 4px 20px rgba(245,197,24,.3);transition:opacity .2s}
.ob-next:active{opacity:.85}
.ob-skip{display:block;text-align:center;margin-top:10px;font-size:12px;color:var(--t3);cursor:pointer;padding:4px}

/* Gender cards */
.gender-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:8px}
.gender-card{background:var(--bg2);border:1.5px solid var(--b2);border-radius:var(--r2);padding:24px 16px;text-align:center;cursor:pointer;transition:all .2s}
.gender-card.selected{border-color:var(--acc);background:rgba(245,197,24,.08)}
.gender-card .gc-ico{font-size:40px;margin-bottom:8px}
.gender-card .gc-lbl{font-size:14px;font-weight:600;color:var(--t)}

/* Option pills / cards */
.ob-options{display:flex;flex-direction:column;gap:10px}
.ob-option{background:var(--bg2);border:1.5px solid var(--b2);border-radius:var(--r2);padding:14px 16px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:12px}
.ob-option.selected{border-color:var(--acc);background:rgba(245,197,24,.08)}
.ob-option .oo-ico{font-size:22px;width:36px;text-align:center;flex-shrink:0}
.ob-option .oo-text .oo-lbl{font-size:14px;font-weight:600;color:var(--t)}
.ob-option .oo-text .oo-sub{font-size:11px;color:var(--t2);margin-top:2px}
.ob-option .oo-check{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--b2);margin-left:auto;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
.ob-option.selected .oo-check{background:var(--acc);border-color:var(--acc)}

/* Multi-select chips */
.ob-chips{display:flex;flex-wrap:wrap;gap:10px}
.ob-chip{background:var(--bg2);border:1.5px solid var(--b2);border-radius:999px;padding:10px 16px;cursor:pointer;font-size:13px;font-weight:500;color:var(--t2);transition:all .2s;display:flex;align-items:center;gap:6px}
.ob-chip.selected{border-color:var(--acc);color:var(--acc);background:rgba(245,197,24,.08)}

/* Number inputs */
.ob-num-row{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.ob-num-lbl{font-size:13px;color:var(--t2);min-width:90px}
.ob-num-wrap{display:flex;align-items:center;gap:8px;flex:1}
.ob-num-input{background:var(--bg3);border:1.5px solid var(--b2);border-radius:var(--r);color:var(--t);font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:800;width:90px;padding:8px 10px;text-align:center}
.ob-num-input:focus{outline:none;border-color:var(--acc)}
.ob-num-unit{font-size:13px;color:var(--t3)}
.ob-num-toggle{display:flex;background:var(--bg3);border-radius:999px;padding:3px;gap:2px}
.ob-num-toggle button{padding:5px 14px;border:none;border-radius:999px;font-size:12px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;background:transparent;color:var(--t3);transition:all .2s}
.ob-num-toggle button.active{background:var(--acc);color:#000}
.ob-info-box{background:rgba(245,197,24,.06);border:0.5px solid rgba(245,197,24,.2);border-radius:var(--r);padding:12px 14px;margin-top:12px;font-size:12px;color:var(--t2);line-height:1.7}
.ob-info-box strong{color:var(--acc)}
.ob-info-box.warn{background:rgba(255,92,92,.06);border-color:rgba(255,92,92,.2)}
.ob-info-box.warn strong{color:var(--red)}
.ob-info-box.good{background:rgba(61,214,140,.06);border-color:rgba(61,214,140,.2)}
.ob-info-box.good strong{color:var(--green)}

/* 1RM inside onboard */
.ob-rm-result{background:linear-gradient(135deg,rgba(245,197,24,.12),rgba(245,197,24,.03));border:0.5px solid rgba(245,197,24,.35);border-radius:var(--r2);padding:20px;text-align:center;margin-top:14px}
.ob-rm-num{font-family:'Barlow Condensed',sans-serif;font-size:64px;font-weight:900;color:var(--acc);line-height:1;text-shadow:0 0 30px rgba(245,197,24,.4)}
.ob-rm-edit{background:var(--bg3);border:1.5px solid var(--b2);border-radius:var(--r);color:var(--t);font-family:'Barlow Condensed',sans-serif;font-size:36px;font-weight:800;width:120px;padding:8px;text-align:center;display:none}
.ob-rm-edit:focus{outline:none;border-color:var(--acc)}

/* Schedule days */
.ob-days-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:16px}
.ob-day-btn{aspect-ratio:1;border-radius:var(--r);border:1.5px solid var(--b2);background:var(--bg2);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .2s}
.ob-day-btn.selected{border-color:var(--acc);background:rgba(245,197,24,.1)}
.ob-day-btn .od-lbl{font-size:9px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.5px}
.ob-day-btn .od-num{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:800;color:var(--t);line-height:1}
.ob-day-btn.selected .od-lbl,.ob-day-btn.selected .od-num{color:var(--acc)}

/* Freq selector */
.ob-freq-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}
.ob-freq-btn{aspect-ratio:1;border-radius:var(--r2);border:1.5px solid var(--b2);background:var(--bg2);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .2s}
.ob-freq-btn.selected{border-color:var(--acc);background:rgba(245,197,24,.1)}
.ob-freq-btn .of-num{font-family:'Barlow Condensed',sans-serif;font-size:32px;font-weight:900;color:var(--t)}
.ob-freq-btn .of-lbl{font-size:10px;color:var(--t3)}
.ob-freq-btn.selected .of-num{color:var(--acc)}

/* Equipment multi-select */
.ob-equip-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.ob-equip-card{background:var(--bg2);border:1.5px solid var(--b2);border-radius:var(--r2);padding:14px;cursor:pointer;transition:all .2s;text-align:center}
.ob-equip-card.selected{border-color:var(--acc);background:rgba(245,197,24,.08)}
.ob-equip-card .eq-ico{font-size:28px;margin-bottom:6px}
.ob-equip-card .eq-lbl{font-size:12px;font-weight:600;color:var(--t)}

/* Time picker */
.ob-time-wrap{display:flex;align-items:center;gap:12px;justify-content:center;margin:16px 0}
.ob-time-input{background:var(--bg3);border:1.5px solid var(--b2);border-radius:var(--r);color:var(--t);font-family:'Barlow Condensed',sans-serif;font-size:48px;font-weight:800;width:130px;padding:10px;text-align:center}
.ob-time-input:focus{outline:none;border-color:var(--acc)}
.ob-time-sep{font-family:'Barlow Condensed',sans-serif;font-size:40px;font-weight:800;color:var(--t3)}

/* Login */
#loginScreen{position:fixed;inset:0;background:var(--bg);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:9998;padding:32px}
#loginScreen.show{display:flex}
.login-logo{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:72px;color:var(--acc);letter-spacing:-2px;line-height:1;margin-bottom:8px}
.login-sub{font-size:12px;color:var(--t3);letter-spacing:3px;text-transform:uppercase;margin-bottom:48px}
.login-title{font-size:18px;font-weight:600;color:var(--t);margin-bottom:8px}
.login-desc{font-size:13px;color:var(--t2);text-align:center;line-height:1.7;margin-bottom:32px;max-width:280px}
.google-btn{display:flex;align-items:center;gap:12px;padding:14px 24px;background:white;border:none;border-radius:var(--r2);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;color:#1a1a1a;width:100%;max-width:300px;justify-content:center;transition:all .2s;box-shadow:0 4px 20px rgba(0,0,0,.4)}
.google-btn:hover{opacity:.9}
.skip-login-btn{margin-top:16px;background:transparent;border:none;color:var(--t3);font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;padding:8px}

/* HEADER */
.header{padding:env(safe-area-inset-top,14px) 18px 12px;flex-shrink:0}
.hrow{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.logo{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:26px;color:var(--acc);letter-spacing:-0.5px;text-shadow:0 0 12px rgba(245,197,24,.3)}
.hright{display:flex;align-items:center;gap:8px}
.wchip{display:flex;align-items:center;gap:5px;background:var(--bg3);border:0.5px solid var(--b2);border-radius:999px;padding:5px 12px;font-size:11px;color:var(--t2)}
.wchip b{color:var(--acc);font-weight:700}
.user-avatar{width:28px;height:28px;border-radius:50%;cursor:pointer;border:1.5px solid var(--b2)}
.user-placeholder{width:28px;height:28px;border-radius:50%;background:var(--bg3);border:1.5px solid var(--b2);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:12px;color:var(--t3)}
.dstrip{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none}
.dstrip::-webkit-scrollbar{display:none}
.dp{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:2px;padding:9px 11px;background:var(--bg2);border:0.5px solid var(--b);border-radius:var(--r);cursor:pointer;transition:all .18s;min-width:46px;position:relative}
.dp.active{background:var(--acc);border-color:var(--acc);box-shadow:0 0 12px rgba(245,197,24,.3)}
.dp.active .dpn,.dp.active .dpd{color:#000}
.dp.rest-d{opacity:.4}
.dpn{font-size:11px;font-weight:700;color:var(--t);font-family:'Barlow Condensed',sans-serif;letter-spacing:.3px}
.dpd{font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px}
.dpdot{width:4px;height:4px;border-radius:50%;background:var(--green);position:absolute;top:5px;right:5px;opacity:0}
.dp.done-d .dpdot{opacity:1}

.main{flex:1;overflow-y:auto;padding:0 18px 110px;scrollbar-width:none}
.main::-webkit-scrollbar{display:none}

/* SYNC */
.sync-bar{display:flex;align-items:center;gap:6px;padding:6px 12px;background:rgba(45,212,191,.08);border:0.5px solid rgba(45,212,191,.15);border-radius:999px;font-size:10px;color:var(--teal);margin-bottom:10px;width:fit-content}
.sync-bar.saving{color:var(--orange);background:rgba(251,146,60,.08);border-color:rgba(251,146,60,.15)}
.sync-bar.error{color:var(--red);background:rgba(248,113,113,.08);border-color:rgba(248,113,113,.15)}
.sync-pulse{width:5px;height:5px;border-radius:50%;background:currentColor;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* HERO */
.hero{background:var(--card-grad);border:0.5px solid var(--b2);border-radius:var(--r3);padding:20px;margin:8px 0 12px;position:relative;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,.3)}
.hero::after{content:'';position:absolute;top:-50px;right:-50px;width:160px;height:160px;border-radius:50%;background:var(--acc);opacity:.03}
.hero-cat{font-size:10px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;margin-bottom:4px}
.hero-name{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:44px;color:var(--t);line-height:1;letter-spacing:-.5px}
.hero-focus{font-size:12px;color:var(--t2);margin-top:3px}
.hero-meta{display:flex;gap:20px;margin-top:16px}
.hm{display:flex;flex-direction:column;gap:1px}
.hmv{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:700;color:var(--t);line-height:1}
.hml{font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.6px}
.prog-track{background:var(--bg4);height:3px;border-radius:3px;margin-bottom:18px;overflow:hidden}
.prog-fill{height:3px;background:linear-gradient(90deg,var(--acc),var(--acc2));border-radius:3px;transition:width .5s cubic-bezier(.4,0,.2,1);box-shadow:0 0 6px rgba(245,197,24,.4)}
.slbl{font-size:9px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--t3);margin-bottom:8px}

/* Exercise cards */
.excard{background:var(--bg2);border:0.5px solid var(--b);border-radius:var(--r2);margin-bottom:10px;overflow:hidden;transition:border-color .2s}
.excard.done-c{opacity:.65}
.extop{display:flex;align-items:center;gap:10px;padding:13px 14px;cursor:pointer}
.exnum{width:30px;height:30px;border-radius:9px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--t2);flex-shrink:0;font-family:'Barlow Condensed',sans-serif}
.exnum.k{background:rgba(245,197,24,.12);color:var(--acc);border:0.5px solid rgba(245,197,24,.2)}
.exbody{flex:1;min-width:0}
.exname{font-size:14px;font-weight:600;color:var(--t);display:flex;align-items:center;gap:6px;flex-wrap:wrap;line-height:1.3}
.exsets{font-size:11px;color:var(--t2);margin-top:2px}
.kbadge{font-size:9px;font-weight:700;letter-spacing:1px;padding:2px 7px;border-radius:999px;background:rgba(245,197,24,.15);color:var(--acc);text-transform:uppercase;flex-shrink:0;border:0.5px solid rgba(245,197,24,.3)}
.exmuscle{font-size:10px;color:var(--t3);white-space:nowrap;flex-shrink:0}
.chk{width:26px;height:26px;border-radius:50%;border:1.5px solid var(--b2);display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;transition:all .18s}
.chk.done{background:var(--acc);border-color:var(--acc)}
.chev{color:var(--t3);font-size:18px;transition:transform .2s;flex-shrink:0;margin-left:2px}
.excard.open-c .chev{transform:rotate(180deg)}
.exdetail{max-height:0;overflow:hidden;transition:max-height .3s cubic-bezier(.4,0,.2,1)}
.exdetail.open{max-height:2000px}
.exdetail>*{padding:0 14px}
.exdetail>*:last-child{padding-bottom:14px}
.alt-toggle{display:flex;background:var(--bg3);border-radius:999px;padding:3px;gap:2px;margin:10px 0}
.alt-btn{flex:1;padding:7px 8px;border:none;border-radius:999px;font-size:11px;font-weight:600;color:var(--t3);background:transparent;cursor:pointer;transition:all .18s;font-family:'DM Sans',sans-serif}
.alt-btn.act-alt{background:var(--acc);color:#000}
.alt-content{display:none}
.alt-content.show{display:block}
.alt-tip{font-size:11px;color:var(--teal);background:rgba(45,212,191,.07);border:0.5px solid rgba(45,212,191,.15);border-radius:var(--r);padding:10px 12px;margin-bottom:10px;line-height:1.6}
.tipbox{font-size:12px;color:var(--t2);line-height:1.7;margin:8px 0 12px;padding:12px;background:rgba(245,197,24,.05);border-radius:var(--r);border-left:2px solid var(--acc)}
.tipbox strong{color:var(--acc);font-weight:600}
.ytlink{display:flex;align-items:center;gap:10px;padding:9px 12px;background:var(--bg3);border-radius:var(--r);margin-bottom:10px;text-decoration:none;border:0.5px solid var(--b)}
.ytico{width:30px;height:30px;background:#ff0000;border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.yttxt{font-size:12px;font-weight:500}.ytsub{font-size:10px;color:var(--t2);margin-top:1px}
.icard{background:var(--bg2);border:0.5px solid var(--b);border-radius:var(--r2);padding:13px 15px;margin-bottom:18px;display:flex;align-items:flex-start;gap:11px}
.iico{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:15px}
.iico-blue{background:rgba(96,165,250,.1)}
.iico-teal{background:rgba(45,212,191,.1)}
.itext{font-size:12px;color:var(--t2);line-height:1.65}
.itext strong{color:var(--t);font-weight:600}

/* Weight box */
.wbox{background:var(--bg3);border-radius:var(--r);padding:12px 14px;margin:10px 0}
.wbox-top{display:flex;align-items:center;gap:10px}
.wbox-ico{font-size:20px}
.wbox-info{flex:1}
.wbox-lbl{font-size:11px;color:var(--t3);text-transform:uppercase;letter-spacing:1px}
.wbox-rec{font-size:11px;color:var(--acc);font-weight:600;line-height:1.4}
.winput{background:var(--bg4);border:0.5px solid var(--b2);border-radius:9px;color:var(--t);font-family:'DM Sans',sans-serif;font-size:20px;font-weight:700;width:72px;padding:7px 8px;text-align:center;flex-shrink:0}
.winput:focus{outline:none;border-color:var(--acc)}
.wunit{font-size:12px;color:var(--t3);flex-shrink:0}
.whislist{margin-top:10px;display:flex;flex-direction:column;gap:4px}
.whis-row{display:flex;align-items:center;justify-content:space-between;padding:5px 0;border-bottom:0.5px solid var(--b)}
.whis-week{font-size:11px;color:var(--t3)}
.whis-val{font-size:13px;font-weight:600;color:var(--t);display:flex;align-items:center;gap:5px}
.d-up{font-size:10px;color:var(--green)}.d-dn{font-size:10px;color:var(--red)}.d-eq{font-size:10px;color:var(--t3)}
.warmup-series{display:flex;flex-direction:column;gap:5px;margin-bottom:8px}
.warmup-row{display:flex;align-items:center;gap:10px;padding:8px 10px;background:var(--bg4);border-radius:8px}
.warmup-pct{font-size:10px;font-weight:700;color:var(--t3);width:36px;text-align:center}
.warmup-peso{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:800;color:var(--t);flex:1}
.warmup-reps{font-size:12px;color:var(--t2)}

/* Test */

/* BOTTOM NAV */

.food-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.food-card{background:var(--bg2);border:0.5px solid var(--b);border-radius:var(--r2);overflow:hidden;cursor:pointer;transition:all .2s;active:scale(.98)}

.food-img{width:100%;aspect-ratio:4/3;object-fit:cover;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:40px}
.food-info{padding:10px}
.food-name{font-size:13px;font-weight:600;color:var(--t);margin-bottom:4px;line-height:1.3}

.statsgrid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:20px}

.statnum{font-family:'Barlow Condensed',sans-serif;font-size:48px;font-weight:800;color:var(--acc);line-height:1;text-shadow:0 0 20px rgba(245,197,24,.3)}

.weekbars{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:16px}
.wb{display:flex;flex-direction:column;align-items:center;gap:4px}
.wbwrap{width:100%;height:50px;background:var(--bg3);border-radius:4px;overflow:hidden;display:flex;align-items:flex-end}
.wbbar{width:100%;background:linear-gradient(180deg,var(--acc),var(--acc2));border-radius:4px;transition:height .5s cubic-bezier(.4,0,.2,1)}
.wbn{font-size:9px;color:var(--t3);font-weight:600;text-transform:uppercase;letter-spacing:.3px}
.btn-out{flex:1;padding:11px;background:var(--bg2);border:0.5px solid var(--b2);border-radius:var(--r);color:var(--t2);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer}

.prof-hero{background:var(--card-grad);border:0.5px solid var(--b2);border-radius:var(--r3);padding:24px 20px;text-align:center;position:relative;overflow:hidden;margin-bottom:12px}

.prof-name{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:28px;color:var(--t);letter-spacing:-.3px;margin-bottom:2px}

.ring-wrap{position:relative;width:80px;height:80px;flex-shrink:0}

.streak-bar{display:flex;gap:4px}

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged }
  from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc }
  from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDtaI4--fvZksSbgHtr-2enyKiFqy3iTdc",
  authDomain: "fitwilmerapp.firebaseapp.com",
  projectId: "fitwilmerapp",
  storageBucket: "fitwilmerapp.firebasestorage.app",
  messagingSenderId: "809165143909",
  appId: "1:809165143909:web:ea6e336074715f9350eb8c"
};
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const provider = new GoogleAuthProvider();
let currentUser = null;
let saveTimeout = null;

// ── ONBOARDING STATE ─────────────────────────────────────────────
let ob = {
  step: 0,
  gender: null,
  goal: null,
  areas: [],
  heightUnit: 'cm',
  heightCm: '',
  weightUnit: 'kg',
  weightKg: '',
  weightGoalKg: '',
  fitnessLevel: null,
  rmExercise: null,
  rmWeight: '',
  rmReps: '',
  rmResult: null,
  freq: null,
  startDay: null,
  equipment: [],
  location: null,
  challenge: null,
  trainTime: '07:00',
  onboardDone: false
};

const OB_STEPS = [
  'gender','goal','areas','height','weight','weightGoal','fitness','rm','freq','equipment','location','challenge','time','login'
];

function obRender(){
  const step = OB_STEPS[ob.step];
  const pct = Math.round(((ob.step+1)/OB_STEPS.length)*100);
  document.getElementById('obBar').style.width = pct+'%';
  const skip = document.getElementById('obSkip');
  const next = document.getElementById('obNext');
  skip.style.display = ['areas','rm','login'].includes(step) ? 'block' : 'none';
  next.textContent = ob.step === OB_STEPS.length-1 ? '¡Empezar ahora! 🚀' : 'Continuar →';

  let html = '';
  if(step==='gender'){
    html = `<div class="ob-step-num">Paso 1 de ${OB_STEPS.length}</div>
    <div class="ob-title">¿Cuál es tu género?</div>
    <div class="ob-desc">Esto nos ayuda a personalizar tu programa y cálculos.</div>
    <div class="gender-grid">
      <div class="gender-card${ob.gender==='hombre'?' selected':''}" onclick="obSet('gender','hombre');obRender()">
        <div class="gc-ico">♂️</div><div class="gc-lbl">Hombre</div>
      </div>
      <div class="gender-card${ob.gender==='mujer'?' selected':''}" onclick="obSet('gender','mujer');obRender()">
        <div class="gc-ico">♀️</div><div class="gc-lbl">Mujer</div>
      </div>
    </div>`;
  } else if(step==='goal'){
    const goals = [
      {k:'fuerza',ico:'💪',lbl:'Volverme más fuerte',sub:'Aumentar mi fuerza máxima'},
      {k:'masa',ico:'🏋️',lbl:'Aumentar masa muscular',sub:'Crecer y definir mi cuerpo'},
      {k:'definicion',ico:'✨',lbl:'Ponerme definido y tonificado',sub:'Marcar el músculo existente'},
      {k:'peso',ico:'⚖️',lbl:'Reducir peso corporal',sub:'Bajar grasa de forma saludable'},
      {k:'salud',ico:'❤️',lbl:'Mejorar salud y bienestar',sub:'Sentirme mejor en general'},
      {k:'rendimiento',ico:'🏆',lbl:'Mejorar rendimiento deportivo',sub:'Rendir más en mi deporte'},
    ];
    html = `<div class="ob-step-num">Paso 2 de ${OB_STEPS.length}</div>
    <div class="ob-title">¿Cuál es tu objetivo principal?</div>
    <div class="ob-desc">Elige el que más te representa ahora mismo.</div>
    <div class="ob-options">${goals.map(g=>`
      <div class="ob-option${ob.goal===g.k?' selected':''}" onclick="obSet('goal','${g.k}');obRender()">
        <div class="oo-ico">${g.ico}</div>
        <div class="oo-text"><div class="oo-lbl">${g.lbl}</div><div class="oo-sub">${g.sub}</div></div>
        <div class="oo-check">${ob.goal===g.k?'✓':''}</div>
      </div>`).join('')}
    </div>`;
  } else if(step==='areas'){
    const areas = ['Espalda','Hombros','Brazos','Pecho','Abdominales','Glúteos','Piernas','Todo el cuerpo'];
    const icos =  ['🔙','🦾','💪','🫀','🎯','🍑','🦵','⚡'];
    html = `<div class="ob-step-num">Paso 3 de ${OB_STEPS.length}</div>
    <div class="ob-title">¿En qué áreas quieres concentrarte?</div>
    <div class="ob-desc">Puedes elegir más de una.</div>
    <div class="ob-chips">${areas.map((a,i)=>`
      <div class="ob-chip${ob.areas.includes(a)?' selected':''}" onclick="obToggleArea('${a}');obRender()">${icos[i]} ${a}</div>`).join('')}
    </div>`;
  } else if(step==='height'){
    html = `<div class="ob-step-num">Paso 4 de ${OB_STEPS.length}</div>
    <div class="ob-title">¿Cuánto mides?</div>
    <div class="ob-desc">Lo usamos para calcular tu IMC y recomendaciones.</div>
    <div class="ob-num-toggle" style="margin-bottom:16px;width:fit-content">
      <button class="${ob.heightUnit==='cm'?'active':''}" onclick="obSet('heightUnit','cm');obRender()">cm</button>
      <button class="${ob.heightUnit==='ft'?'active':''}" onclick="obSet('heightUnit','ft');obRender()">ft</button>
    </div>
    <div class="ob-num-row">
      <span class="ob-num-lbl">Altura</span>
      <div class="ob-num-wrap">
        <input class="ob-num-input" type="number" inputmode="decimal" placeholder="${ob.heightUnit==='cm'?'170':'5.8'}" value="${ob.heightCm}" oninput="obSet('heightCm',this.value)"/>
        <span class="ob-num-unit">${ob.heightUnit}</span>
      </div>
    </div>`;
  } else if(step==='weight'){
    const h = parseFloat(ob.heightUnit==='ft' ? (parseFloat(ob.heightCm||0)*30.48) : (ob.heightCm||0));
    const w = parseFloat(ob.weightKg||0);
    let imcHTML = '';
    if(h>0 && w>0){
      const hm = h/100;
      const imc = (w/(hm*hm)).toFixed(1);
      let cat='', cls='';
      if(imc<18.5){cat='Bajo peso';cls='warn';}
      else if(imc<25){cat='Peso normal';cls='good';}
      else if(imc<30){cat='Sobrepeso';cls='warn';}
      else{cat='Obesidad';cls='warn';}
      imcHTML = `<div class="ob-info-box ${cls}"><strong>IMC actual: ${imc}</strong> — ${cat}</div>`;
    }
    html = `<div class="ob-step-num">Paso 5 de ${OB_STEPS.length}</div>
    <div class="ob-title">¿Cuánto pesas?</div>
    <div class="ob-desc">Dato privado, solo para calcular tu IMC y pesos de trabajo.</div>
    <div class="ob-num-toggle" style="margin-bottom:16px;width:fit-content">
      <button class="${ob.weightUnit==='kg'?'active':''}" onclick="obSet('weightUnit','kg');obRender()">kg</button>
      <button class="${ob.weightUnit==='lbs'?'active':''}" onclick="obSet('weightUnit','lbs');obRender()">lbs</button>
    </div>
    <div class="ob-num-row">
      <span class="ob-num-lbl">Peso actual</span>
      <div class="ob-num-wrap">
        <input class="ob-num-input" type="number" inputmode="decimal" placeholder="${ob.weightUnit==='kg'?'70':'154'}" value="${ob.weightKg}" oninput="obSet('weightKg',this.value);obRender()"/>
        <span class="ob-num-unit">${ob.weightUnit}</span>
      </div>
    </div>
    ${imcHTML}`;
  } else if(step==='weightGoal'){
    const cur = parseFloat(ob.weightKg||0);
    const goal = parseFloat(ob.weightGoalKg||0);
    let recHTML = '';
    if(cur>0 && goal>0){
      const diff = goal-cur;
      if(Math.abs(diff)<2) recHTML=`<div class="ob-info-box good"><strong>Excelente objetivo.</strong> Muy razonable. Tu programa lo logrará con constancia.</div>`;
      else if(diff<-10) recHTML=`<div class="ob-info-box warn"><strong>Cambio considerable.</strong> Bajar más de 10kg requiere tiempo. Iremos paso a paso sin comprometer tu salud.</div>`;
      else if(diff>10) recHTML=`<div class="ob-info-box warn"><strong>Meta ambiciosa.</strong> Subir masa muscular toma tiempo. Tu programa te guiará de forma progresiva y segura.</div>`;
      else if(diff<0) recHTML=`<div class="ob-info-box good"><strong>Objetivo razonable.</strong> Un déficit moderado con entrenamiento de fuerza es lo más efectivo.</div>`;
      else recHTML=`<div class="ob-info-box good"><strong>Objetivo alcanzable.</strong> Con el programa correcto y nutrición adecuada llegarás a tu meta.</div>`;
    }
    html = `<div class="ob-step-num">Paso 6 de ${OB_STEPS.length}</div>
    <div class="ob-title">¿Cuál es tu peso objetivo?</div>
    <div class="ob-desc">Sé realista. Un cambio de 0.5-1 kg/semana es lo más efectivo.</div>
    <div class="ob-num-row">
      <span class="ob-num-lbl">Peso meta</span>
      <div class="ob-num-wrap">
        <input class="ob-num-input" type="number" inputmode="decimal" placeholder="65" value="${ob.weightGoalKg}" oninput="obSet('weightGoalKg',this.value);obRender()"/>
        <span class="ob-num-unit">${ob.weightUnit}</span>
      </div>
    </div>
    ${recHTML}`;
  } else if(step==='fitness'){
    const levels = [
      {k:'principiante',ico:'🌱',lbl:'Principiante',sub:'Menos de 6 meses entrenando o recién empiezo'},
      {k:'intermedio',ico:'⚡',lbl:'Intermedio',sub:'6 meses a 2 años de entrenamiento regular'},
      {k:'avanzado',ico:'🔥',lbl:'Avanzado',sub:'Más de 2 años entrenando consistentemente'},
    ];
    html = `<div class="ob-step-num">Paso 7 de ${OB_STEPS.length}</div>
    <div class="ob-title">¿Cuál es tu nivel de fitness?</div>
    <div class="ob-desc">Sé honesto, eso nos ayuda a ajustar la intensidad perfecta para ti.</div>
    <div class="ob-options">${levels.map(l=>`
      <div class="ob-option${ob.fitnessLevel===l.k?' selected':''}" onclick="obSet('fitnessLevel','${l.k}');obRender()">
        <div class="oo-ico">${l.ico}</div>
        <div class="oo-text"><div class="oo-lbl">${l.lbl}</div><div class="oo-sub">${l.sub}</div></div>
        <div class="oo-check">${ob.fitnessLevel===l.k?'✓':''}</div>
      </div>`).join('')}
    </div>`;
  } else if(step==='rm'){
    const exs = [
      {k:'press_banca',ico:'🏋️',lbl:'Press de banca'},
      {k:'sentadilla',ico:'🦵',lbl:'Sentadilla con barra'},
      {k:'peso_muerto',ico:'💪',lbl:'Peso muerto'},
    ];
    const selEx = exs.find(e=>e.k===ob.rmExercise);
    let rmResultHTML = '';
    if(ob.rmResult){
      const rm = ob.rmResult;
      rmResultHTML = `<div class="ob-rm-result">
        <div style="font-size:10px;color:var(--t3);letter-spacing:2px;text-transform:uppercase;margin-bottom:4px">Tu 1RM estimado</div>
        <div id="rmDisplayNum" class="ob-rm-num">${rm}kg</div>
        <div style="font-size:13px;color:var(--t2);margin-bottom:12px">Puedes editar este valor si no es correcto</div>
        <input id="rmEditInput" class="rm-edit-input" type="number" value="${rm}" oninput="obUpdateRM(this.value)" style="display:none;margin:0 auto"/>
        <button onclick="obToggleRMEdit()" style="background:rgba(245,197,24,.1);border:0.5px solid rgba(245,197,24,.2);border-radius:8px;padding:6px 14px;font-size:12px;font-weight:600;color:var(--acc);cursor:pointer;font-family:'DM Sans',sans-serif">✏️ Editar resultado</button>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:16px">
          ${[['70%',Math.round(rm*0.7),'Volumen'],['75%',Math.round(rm*0.75),'Hipertrofia'],['85%',Math.round(rm*0.85),'Fuerza']].map(([p,v,u])=>`
          <div style="background:var(--bg2);border-radius:10px;padding:10px;text-align:center">
            <div style="font-size:9px;color:var(--t3);text-transform:uppercase">${p}</div>
            <div style="font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:800;color:var(--t)">${v}kg</div>
            <div style="font-size:10px;color:var(--t2)">${u}</div>
          </div>`).join('')}
        </div>
      </div>`;
    }
    html = `<div class="ob-step-num">Paso 8 de ${OB_STEPS.length}</div>
    <div class="ob-title">Test de fuerza (1RM)</div>
    <div class="ob-desc">Tu repetición máxima nos permite calcular pesos exactos para cada ejercicio.</div>
    <div class="ob-options" style="margin-bottom:16px">${exs.map(e=>`
      <div class="ob-option${ob.rmExercise===e.k?' selected':''}" onclick="obSet('rmExercise','${e.k}');obSet('rmResult',null);obRender()">
        <div class="oo-ico">${e.ico}</div>
        <div class="oo-text"><div class="oo-lbl">${e.lbl}</div></div>
        <div class="oo-check">${ob.rmExercise===e.k?'✓':''}</div>
      </div>`).join('')}
    </div>
    ${selEx?`
    <div style="background:var(--bg2);border:0.5px solid var(--b2);border-radius:var(--r2);padding:16px;margin-bottom:12px">
      <div style="font-size:13px;font-weight:600;color:var(--t);margin-bottom:12px">¿Cuánto levantaste y cuántas reps?</div>
      <div class="test-inputs">
        <div class="test-input-wrap">
          <div class="test-input-lbl">Peso levantado (kg)</div>
          <input class="test-big-input" type="number" inputmode="decimal" placeholder="80" value="${ob.rmWeight}" oninput="obSet('rmWeight',this.value);obCalcRM()"/>
        </div>
        <div class="test-input-wrap">
          <div class="test-input-lbl">Reps realizadas</div>
          <input class="test-big-input" type="number" inputmode="decimal" placeholder="5" value="${ob.rmReps}" oninput="obSet('rmReps',this.value);obCalcRM()"/>
        </div>
      </div>
    </div>
    ${rmResultHTML}
    `:''}`;
  } else if(step==='freq'){
    const freqs = [3,4,5,6];
    const recs = {3:'Ideal para principiantes. Descanso entre sesiones.',4:'El punto óptimo para la mayoría.',5:'Frecuencia avanzada. Gran volumen semanal.',6:'Para atletas avanzados. Requiere buena recuperación.'};
    html = `<div class="ob-step-num">Paso 9 de ${OB_STEPS.length}</div>
    <div class="ob-title">¿Con qué frecuencia vas a entrenar?</div>
    <div class="ob-desc">Sé realista con tu tiempo y energía. Mejor consistencia que intensidad.</div>
    <div class="ob-freq-grid">${freqs.map(f=>`
      <div class="ob-freq-btn${ob.freq===f?' selected':''}" onclick="obSet('freq',${f});obRender()">
        <div class="of-num">${f}</div>
        <div class="of-lbl">días/sem</div>
      </div>`).join('')}

    ${ob.freq?`<div class="ob-info-box good"><strong>${ob.freq} días/semana.</strong> ${recs[ob.freq]}</div>`:''}
    ${ob.freq?`
    <div style="margin-top:16px">
      <div class="slbl" style="margin-bottom:10px">¿Qué día empiezas tu semana?</div>
      <div class="ob-days-grid">

    </div>`:''}`;
  } else if(step==='equipment'){
    const equips = [
      {k:'mancuernas',ico:'🏋️',lbl:'Mancuernas'},
      {k:'barra',ico:'⚡',lbl:'Barra olímpica'},
      {k:'rusas',ico:'🔔',lbl:'Pesas rusas'},
      {k:'maquinas',ico:'🏭',lbl:'Máquinas de pesas'},
      {k:'ninguna',ico:'🤸',lbl:'Sin equipamiento'},
      {k:'todo',ico:'✅',lbl:'Todo lo anterior'},
    ];
    html = `<div class="ob-step-num">Paso 10 de ${OB_STEPS.length}</div>
    <div class="ob-title">¿Qué equipo tienes disponible?</div>
    <div class="ob-desc">Puedes elegir más de uno.</div>

      {k:'gym_pequeño',ico:'🏋️',lbl:'Gimnasio pequeño',sub:'Pesas libres, máquinas básicas, buenas barras'},
      {k:'cochera',ico:'🚗',lbl:'Mi cochera o garaje',sub:'Espacio personal con mis propios equipos'},
      {k:'casa',ico:'🏠',lbl:'En casa',sub:'Equipo personal limitado, mucho peso corporal'},
    ];
    html = `<div class="ob-step-num">Paso 11 de ${OB_STEPS.length}</div>
    <div class="ob-title">¿Dónde prefieres entrenar?</div>
    <div class="ob-desc">Adaptaremos tu rutina al lugar donde entrenas.</div>
    <div class="ob-options">${locs.map(l=>`

window.obSet = (k,v) => { ob[k]=v; };
window.obToggleArea = (a) => { const i=ob.areas.indexOf(a); i>=0?ob.areas.splice(i,1):ob.areas.push(a); };
window.obToggleEquip = (e) => { const i=ob.equipment.indexOf(e); i>=0?ob.equipment.splice(i,1):ob.equipment.push(e); };
window.obCalcRM = () => {
  const w=parseFloat(ob.rmWeight), r=parseInt(ob.rmReps);
  if(w>0&&r>0&&r<=10){ ob.rmResult = Math.round(w*(1+(r/30))); obRender(); }
};
window.obToggleRMEdit = () => {
  const input = document.getElementById('rmEditInput');
  const num = document.getElementById('rmDisplayNum');
  if(input.style.display==='none'){ input.style.display='block'; num.style.display='none'; }
  else { input.style.display='none'; num.style.display='block'; }
};
window.obUpdateRM = (v) => {
  ob.rmResult = Math.round(parseFloat(v)||0);
  const num = document.getElementById('rmDisplayNum');
  if(num) num.textContent = ob.rmResult+'kg';
};
window.obNextStep = () => {
  if(ob.step < OB_STEPS.length-1){ ob.step++; obRender(); document.getElementById('obBody').scrollTop=0; }
  else { obFinishLocal(); }
};
window.obSkipStep = () => {
  if(ob.step < OB_STEPS.length-1){ ob.step++; obRender(); document.getElementById('obBody').scrollTop=0; }
  else { obFinishLocal(); }
};
window.obRender = obRender;
window.obFinishLocal = () => {
  ob.onboardDone=true;
  localStorage.setItem('fitapp_ob', JSON.stringify(ob));
  if(ob.rmExercise && ob.rmResult) oneRM[ob.rmExercise] = ob.rmResult;
  document.getElementById('onboardScreen').classList.remove('show');
  showApp();
};
window.signInWithGoogleOnboard = async () => {
  try {
    await signInWithPopup(auth, provider);
    ob.onboardDone=true;
    localStorage.setItem('fitapp_ob', JSON.stringify(ob));
    if(ob.rmExercise && ob.rmResult) oneRM[ob.rmExercise] = ob.rmResult;
    document.getElementById('onboardScreen').classList.remove('show');
  } catch(e){ alert('Error al iniciar sesión. Intenta de nuevo.'); }
};

function showApp(){
  document.getElementById('appHeader').style.display='';
  document.getElementById('main').style.display='';

  document.getElementById('weekNum').textContent=weekNum;
  buildStrip(); renderWorkout();
}

function buildStrip(){
  const c=document.getElementById('dayStrip'); c.innerHTML='';
  DAYS.forEach((d,i)=>{
    const k=`${weekNum}_${i}`;
    const allDone=d.exercises.length>0&&d.exercises.every((_,ei)=>checked[`${k}_${ei}`]);
    const el=document.createElement('div');
    el.className='dp'+(i===curDay?' active':'')+(d.rest?' rest-d':'')+(allDone?' done-d':'');
    el.innerHTML=`<span class="dpn">${d.short}</span><span class="dpd">${d.name.substring(0,3)}</span><div class="dpdot"></div>`;
    el.onclick=()=>{curDay=i;expanded={};altState={};buildStrip();renderWorkout();};
    c.appendChild(el);
  });
  c.children[curDay].scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'});
}

function weightBox(dayIdx,exIdx,rec){

  const rmKey=EX_RM_MAP[`${dayIdx}_${exIdx}`];
  const rm=rmKey?oneRM[rmKey]:null;
  if(rm){
    const w75=Math.round(rm*0.75/2.5)*2.5, w80=Math.round(rm*0.80/2.5)*2.5, w70=Math.round(rm*0.70/2.5)*2.5;
    return `<div class="wbox">
      <div class="wbox-lbl" style="margin-bottom:8px">🤖 Peso calculado — 1RM: ${rm}kg</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px">
        <div style="background:rgba(212,255,71,.12);border:0.5px solid rgba(212,255,71,.2);border-radius:8px;padding:6px 12px;text-align:center">
          <div style="font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:800;color:var(--acc);line-height:1">${w75}kg</div>
          <div style="font-size:9px;color:var(--t3);margin-top:2px">75% · Hipertrofia</div>
        </div>
        <div style="background:var(--bg3);border:0.5px solid var(--b);border-radius:8px;padding:6px 12px;text-align:center">
          <div style="font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:800;color:var(--t);line-height:1">${w80}kg</div>
          <div style="font-size:9px;color:var(--t3);margin-top:2px">80% · Fuerza</div>
        </div>
        <div style="background:var(--bg3);border:0.5px solid var(--b);border-radius:8px;padding:6px 12px;text-align:center">
          <div style="font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:800;color:var(--t);line-height:1">${w70}kg</div>
          <div style="font-size:9px;color:var(--t3);margin-top:2px">70% · Volumen</div>
        </div>
      </div>
      <div style="font-size:10px;color:var(--t3);text-align:right;cursor:pointer" onclick="showTab('test',document.querySelectorAll('.nbtn')[4])">Re-testear →</div>
    </div>`;
  }
  const noRmHTML=rmKey?`<div style="background:rgba(212,255,71,.05);border:0.5px solid rgba(212,255,71,.15);border-radius:var(--r);padding:12px;margin:10px 0;display:flex;align-items:center;gap:10px">

    <div style="flex:1"><div style="font-size:13px;font-weight:600;color:var(--acc)">Haz el test de fuerza</div><div style="font-size:11px;color:var(--t2);margin-top:2px">La app calculará tu peso automáticamente</div></div>
    <button onclick="showTab('test',document.querySelectorAll('.nbtn')[4])" style="background:var(--acc);color:#000;border:none;border-radius:8px;padding:7px 12px;font-size:12px;font-weight:700;cursor:pointer">Ir al test</button>
  </div>`:'';
  const curVal=weights[baseKey]||'';
  return `<div class="wbox">${noRmHTML}<div class="wbox-top"><span class="wbox-ico">🏋️</span><div class="wbox-info"><div class="wbox-lbl">Peso que usas</div><div class="wbox-rec">${rec}</div></div>
    <input class="winput" type="number" inputmode="decimal" placeholder="—" value="${curVal}" onchange="saveWeight('${baseKey}',this.value)" oninput="saveWeight('${baseKey}',this.value)"/>
    <span class="wunit">kg</span></div></div>`;
}

function actCard(isPage){
  const tk=todayKey();const fn=isPage?'toggleActP':'toggleAct';
  const doneCount=ACTIVATION.items.filter((_,i)=>actChk[`act_${tk}_${i}`]).length;
  const allDone=doneCount===ACTIVATION.items.length;
  let h=`<div class="actsec"><div class="acthdr"><span style="font-size:20px">🍑</span>
    <div><div class="acttitle">${ACTIVATION.title}</div><div class="actsub">${ACTIVATION.sub}</div></div></div>
    <div style="font-size:11px;color:var(--t2);margin-bottom:10px">Hoy: <b style="color:var(--orange)">${doneCount}/${ACTIVATION.items.length}</b>${allDone?'<span style="color:var(--green);margin-left:6px">✓ Ronda completa</span>':''}</div>
    <div class="actitems">`;
  ACTIVATION.items.forEach((ex,i)=>{
    const ck=`act_${tk}_${i}`;const done=!!actChk[ck];
    h+=`<div class="actitem${done?' done-a':''}" onclick="${fn}('${ck}')"><div class="actbody"><div class="actname">${ex.name}</div><div class="actsubs">${ex.sub}</div></div><div class="achk${done?' done':''}">${chkSvg()}</div></div>`;
  });
  if(allDone) h+=`<button class="mbtn" style="margin-top:10px;font-size:12px;padding:10px" onclick="resetActRound()">🔄 Nueva ronda (+1)</button>`;
  h+=`</div><div class="actwarn">${ACTIVATION.warn}</div></div>`;
  return h;
}

function renderWorkout(){
  const d=DAYS[curDay];const main=document.getElementById('main');
  if(d.rest){
    main.innerHTML=`<div class="restscr fade"><div class="restbig">ZZZ</div><div class="resttitle">Día de descanso</div>
      <div class="restdesc">El descanso es donde crece el músculo. Duerme bien, hidrátate y come proteína.</div>
      <div class="resttip"><strong>Recuerda:</strong> Haz la activación de glúteos cada 45-60 min si estás sentado.</div>
      ${actCard(false)}</div>`;return;
  }
  const k=`${weekNum}_${curDay}`;const total=d.exercises.length;
  const done=d.exercises.filter((_,i)=>checked[`${k}_${i}`]).length;
  const pct=total>0?Math.round((done/total)*100):0;
  const col=TYPE_COLOR[d.type];
  let html=`<div class="fade">
    <div class="hero">
      <div class="hero-cat" style="color:${col}">${TYPE_LABEL[d.type]}</div>
      <div class="hero-name">${d.name}</div>
      <div class="hero-focus">${d.focus}</div>
      <div class="hero-meta">
        <div class="hm"><div class="hmv">${d.duration}</div><div class="hml">Duración</div></div>
        <div class="hm"><div class="hmv">${d.cal}</div><div class="hml">Calorías</div></div>
        <div class="hm"><div class="hmv">${done}/${total}</div><div class="hml">Completados</div></div>
      </div>
    </div>
    <div class="prog-track"><div class="prog-fill" style="width:${pct}%"></div></div>
    <div class="slbl">Calentamiento</div>
    <div class="icard"><div class="iico iico-blue">🔥</div><div class="itext">${d.warmup}</div></div>
    <div class="slbl">Ejercicios</div><div class="exlist">`;
  d.exercises.forEach((ex,i)=>{
    const ck=`${k}_${i}`;const isDone=!!checked[ck];const isOpen=!!expanded[i];const useAlt=altState[`${curDay}_${i}`]||'A';
    html+=`<div class="excard${isDone?' done-c':''}${isOpen?' open-c':''}" id="ec${i}">
      <div class="extop" onclick="toggleEx(${i})">
        <div class="exnum${ex.key?' k':''}">${i+1}</div>
        <div class="exbody"><div class="exname">${ex.name}${ex.key?'<span class="kbadge">Clave</span>':''}</div><div class="exsets">${ex.sets}</div></div>
        <span class="exmuscle">${ex.muscle}</span>
        <div class="chk${isDone?' done':''}" onclick="event.stopPropagation();toggleCheck('${ck}')">${chkSvg()}</div>
        <span class="chev">⌄</span>
      </div>
      <div class="exdetail${isOpen?' open':''}">`;
    html+=weightBox(curDay,i,ex.rec);
    if(ex.hasAlt){
      html+=`<div class="alt-toggle">
        <button class="alt-btn${useAlt==='A'?' act-alt':''}" onclick="setAlt(${i},'A')">${ex.altA.label}</button>
        <button class="alt-btn${useAlt==='B'?' act-alt':''}" onclick="setAlt(${i},'B')">${ex.altB.label}</button>
      </div>
      <div class="alt-content${useAlt==='A'?' show':''}"><div class="alt-tip">${ex.altA.tip}</div></div>
      <div class="alt-content${useAlt==='B'?' show':''}"><div class="alt-tip">${ex.altB.tip}</div></div>`;
    }
    html+=`<div class="tipbox">${ex.tip}</div>
      <a href="${ex.video}" target="_blank" class="ytlink">
        <div class="ytico"><svg width="12" height="12" viewBox="0 0 24 24" fill="white"><path d="M8 5v14l11-7z"/></svg></div>
        <div><div class="yttxt">${ex.vname}</div><div class="ytsub">Ver tutorial en YouTube</div></div>
      </a></div></div>`;
  });
  html+=`</div><div class="slbl">Enfriamiento</div><div class="icard"><div class="iico iico-teal">❄️</div><div class="itext">${d.cooldown}</div></div>${actCard(false)}</div>`;
  main.innerHTML=html;
}

function renderTestPage(){
  window.testState=window.testState||{step:'list',exKey:null,peso:null,reps:null};

  else if(window.testState.step==='test') renderTestMain();
  else if(window.testState.step==='result') renderTestResult();
}

window.startTest=(exKey)=>{window.testState={step:'test',exKey,peso:null,reps:null};renderTestPage();};

function renderTestMain(){
  const exNames={press_banca:'Press de banca',sentadilla:'Sentadilla',peso_muerto:'Peso muerto',hip_thrust:'Hip Thrust',press_militar:'Press militar',remo_barra:'Remo con barra'};

      <div class="test-inputs">
        <div class="test-input-wrap">
          <div class="test-input-lbl">Peso (kg)</div>
          <input class="test-big-input" type="number" inputmode="decimal" placeholder="80" id="tPeso" value="${window.testState.peso||''}"/>
        </div>
        <div class="test-input-wrap">
          <div class="test-input-lbl">Repeticiones</div>
          <input class="test-big-input" type="number" inputmode="decimal" placeholder="5" id="tReps" value="${window.testState.reps||''}"/>

window.validateAndCalc=()=>{
  const p=parseFloat(document.getElementById('tPeso').value);
  const r=parseInt(document.getElementById('tReps').value);
  if(!p||!r||p<=0||r<=0||r>10){alert('Ingresa un peso y entre 1-10 repeticiones.');return;}
  window.testState.peso=p; window.testState.reps=r;
  const rm=Math.round(p*(1+(r/30)));
  oneRM[window.testState.exKey]=rm;
  window.testState.step='result'; window.testState.result=rm;
  if(window.saveToCloud) window.saveToCloud();
  renderTestPage();
};

  const rm=window.testState.result;const exKey=window.testState.exKey;
  document.getElementById('main').innerHTML=`<div class="fade" style="padding:14px 0">

}

window.toggleRMEditInline=()=>{
  const i=document.getElementById('rmEditInline'), n=document.getElementById('rmDisplayNum');
  if(i.style.display==='none'){i.style.display='block';n.style.display='none';}
  else{i.style.display='none';n.style.display='block';}
};
window.updateRMInline=(key,val)=>{
  const v=Math.round(parseFloat(val)||0);
  oneRM[key]=v; window.testState.result=v;
  const n=document.getElementById('rmDisplayNum');
  if(n) n.textContent=v+'kg';
  if(window.saveToCloud) window.saveToCloud();
};

// ── MEDIDAS ─────────────────────────────────────────────────────
function renderMedidas(){
  const today=new Date().toLocaleDateString('es-PE',{day:'2-digit',month:'short',year:'numeric'});
  const last=bodyMeas.length>0?bodyMeas[bodyMeas.length-1]:null;
  let fieldsHTML='';
  BODY_FIELDS.forEach(f=>{
    const lastVal=last?(last[f.key]||')':'';
    fieldsHTML+=`<div class="mfield"><div class="mfield-lbl">${f.label}</div>
      <div class="mfield-row"><input class="minput" type="number" inputmode="decimal" placeholder="—" id="mf_${f.key}" value="${lastVal}"/><span class="munit">${f.unit}</span></div></div>`;
  });
  let histHTML='';
  if(bodyMeas.length===0){
    histHTML='<div class="no-meas">📏 Aún no tienes registros.<br>Guarda tus medidas de hoy<br>para empezar a ver tu progreso.</div>';
  } else {
    histHTML=`<div style="display:flex;align-items:center;justify-content:space-between;margin:18px 0 10px">
      <div class="mhist-title" style="margin:0">Historial</div>
      <button onclick="clearAllMedidas()" style="background:rgba(255,92,92,.08);border:0.5px solid rgba(255,92,92,.2);border-radius:8px;padding:5px 12px;font-size:11px;color:var(--red);cursor:pointer;font-family:'DM Sans',sans-serif">🗑 Borrar todo</button>
    </div>`;
    [...bodyMeas].reverse().forEach((entry,ei)=>{
      const realIdx=bodyMeas.length-1-ei;
      const prevEntry=ei<bodyMeas.length-1?[...bodyMeas].reverse()[ei+1]:null;
      histHTML+=`<div class="mhist-entry"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
        <div class="mhist-date">📅 ${entry.date}</div>
        <button onclick="deleteMedida(${realIdx})" style="background:rgba(255,92,92,.08);border:0.5px solid rgba(255,92,92,.2);border-radius:8px;padding:4px 10px;font-size:11px;color:var(--red);cursor:pointer;font-family:'DM Sans',sans-serif">🗑</button>
      </div><div class="mhist-vals">`;
      BODY_FIELDS.forEach(f=>{
        const v=entry[f.key];const pv=prevEntry?prevEntry[f.key]:null; if(!v)return;
        let deltaHTML='';
        if(pv){const diff=+(parseFloat(v)-parseFloat(pv)).toFixed(1);if(diff!==0){const isGood=LOWER_IS_GOOD.includes(f.key)?diff<0:diff>0;deltaHTML=isGood?`<span class="dg">${diff>0?'+':''}${diff}${f.unit}</span>`:`<span class="dr">${diff>0?'+':''}${diff}${f.unit}</span>`;}else deltaHTML=`<span class="dn">=</span>`;}
        histHTML+=`<div class="mhist-item"><span class="mhist-k">${f.label}</span><span class="mhist-v">${v} ${f.unit} ${deltaHTML}</span></div>`;
      });
      histHTML+=`</div></div>`;
    });
  }
  document.getElementById('main').innerHTML=`<div class="fade" style="padding:14px 0">
    <div class="mcard">
      <div class="mcard-head"><div class="mcard-title">📏 Mis Medidas</div><div class="mcard-date">${today}</div></div>
      <div class="mgrid">${fieldsHTML}</div>
      <button class="mbtn" onclick="saveMedidas()">💾 Guardar medidas</button>
    </div>${histHTML}</div>`;
}

// ── ACTIVATION PAGE ─────────────────────────────────────────────
function renderActPage(){
  const tk=todayKey();
  const doneCount=ACTIVATION.items.filter((_,i)=>actChk[`act_${tk}_${i}`]).length;
  let roundsToday=0,r=1;
  while(ACTIVATION.items.every((_,i)=>actChk[`act_${tk}_r${r}_${i}`])){roundsToday++;r++;}
  if(ACTIVATION.items.every((_,i)=>actChk[`act_${tk}_${i}`])) roundsToday++;
  const DAY_NAMES=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  let histHTML='<div class="act-hist"><div class="act-hist-title">Últimos 7 días</div><div class="act-hist-grid">';
  for(let dd=6;dd>=0;dd--){
    const date=new Date();date.setDate(date.getDate()-dd);const dk=date.toDateString();
    const label=dd===0?'Hoy':DAY_NAMES[date.getDay()];
    let dayRounds=0;
    if(ACTIVATION.items.every((_,i)=>actChk[`act_${dk}_${i}`])) dayRounds++;
    let rr=1;while(ACTIVATION.items.every((_,i)=>actChk[`act_${dk}_r${rr}_${i}`])){dayRounds++;rr++;}
    histHTML+=`<div class="act-hist-day${dd===0?' act-hist-today':''}${dayRounds>0?' act-hist-done':''}">
      <div class="act-hist-lbl">${label}</div>
      <div class="act-hist-dot">${dayRounds>0?dayRounds:'·'}</div>
    </div>`;
  }
  histHTML+='</div><div style="font-size:10px;color:var(--t2);margin-top:6px">Número = rondas completadas ese día</div></div>';
  let h=`<div class="fade" style="padding:14px 0">${actCard(true)}${histHTML}</div>`;
  document.getElementById('main').innerHTML=h;
}

// ── STATS ────────────────────────────────────────────────────────
function renderStats(){
  let td=0,te=0;
  DAYS.forEach((d,di)=>d.exercises.forEach((_,ei)=>{te++;if(checked[`${weekNum}_${di}_${ei}`])td++;}));
  const streak=calcStreak();
  const bars=DAYS.map((d,di)=>{
    if(!d.exercises.length)return{pct:0};
    const dn=d.exercises.filter((_,ei)=>checked[`${weekNum}_${di}_${ei}`]).length;
    return{pct:Math.round((dn/d.exercises.length)*100)};
  });
  const imcText=()=>{
    const saved=localStorage.getItem('fitapp_ob');
    if(!saved)return'';
    const o=JSON.parse(saved);
    const h=parseFloat(o.heightCm||0),w=parseFloat(o.weightKg||0);
    if(!h||!w)return'';
    const hm=h/100,imc=(w/(hm*hm)).toFixed(1);
    return `<div style="background:var(--bg2);border:0.5px solid var(--b);border-radius:var(--r2);padding:14px;margin-bottom:12px">
      <div class="slbl" style="margin-bottom:6px">MI PERFIL</div>
      <div style="display:flex;gap:16px;flex-wrap:wrap;font-size:13px;color:var(--t2)">
        <span>⚖️ Peso: <b style="color:var(--t)">${w}kg</b></span>
        <span>📏 Altura: <b style="color:var(--t)">${h}cm</b></span>
        <span>🎯 Meta: <b style="color:var(--acc)">${o.weightGoalKg||'—'}kg</b></span>
        <span>IMC: <b style="color:var(--t)">${imc}</b></span>
      </div>
    </div>`;
  };
  let h=`<div class="fade" style="padding:14px 0">
    ${imcText()}
    <div class="slbl">Semana ${weekNum}</div>
    <div class="statsgrid">
      <div class="statcard"><div class="statnum">${td}</div><div class="statlbl">Ejercicios completados</div></div>
      <div class="statcard"><div class="statnum">${streak}</div><div class="statlbl">Días de racha</div></div>
      <div class="statcard"><div class="statnum">${Math.round((td/Math.max(te,1))*100)}%</div><div class="statlbl">Progreso semanal</div></div>
      <div class="statcard"><div class="statnum">${weekNum}</div><div class="statlbl">Semana actual</div></div>
    </div>
    <div class="slbl">Progreso por día</div>
    <div class="weekbars">${DAYS.map((d,i)=>`<div class="wb"><div class="wbwrap"><div class="wbbar" style="height:${bars[i].pct}%"></div></div><div class="wbn">${d.short}</div></div>`).join('')}</div>
    <div style="display:flex;gap:8px;margin-bottom:8px">
      <button class="btn-out" onclick="prevWeek()">← Anterior</button>
      <button class="btn-out" onclick="nextWeek()">Siguiente →</button>
    </div>
    <button class="btn-danger" onclick="resetWeek()">Reiniciar semana actual</button>
  </div>`;
  document.getElementById('main').innerHTML=h;
}

    <div class="mcard">
      <div class="mgrid">
        <div class="mfield"><div class="mfield-lbl">Peso actual (kg)</div><div class="mfield-row"><input class="minput" type="number" id="ep_peso" value="${o.weightKg||''}"/></div></div>
        <div class="mfield"><div class="mfield-lbl">Peso objetivo (kg)</div><div class="mfield-row"><input class="minput" type="number" id="ep_goal" value="${o.weightGoalKg||''}"/></div></div>
        <div class="mfield"><div class="mfield-lbl">Altura (cm)</div><div class="mfield-row"><input class="minput" type="number" id="ep_height" value="${o.heightCm||''}"/></div></div>
        <div class="mfield"><div class="mfield-lbl">Días/semana</div><div class="mfield-row"><input class="minput" type="number" id="ep_freq" value="${o.freq||''}"/></div></div>
      </div>
      <button class="mbtn" onclick="saveProfileEdit()">Guardar cambios</button>
    </div>
  </div>`;
};

window.saveProfileEdit=()=>{
  const saved=localStorage.getItem('fitapp_ob');
  const o=saved?JSON.parse(saved):{};
  o.weightKg=document.getElementById('ep_peso').value||o.weightKg;
  o.weightGoalKg=document.getElementById('ep_goal').value||o.weightGoalKg;
  o.heightCm=document.getElementById('ep_height').value||o.heightCm;
  o.freq=document.getElementById('ep_freq').value||o.freq;
  localStorage.setItem('fitapp_ob',JSON.stringify(o));
  renderProfile();
};

window.inviteFriend=()=>{
  const msg='¡Estoy usando FitApp para mis entrenamientos! Pruébala, tiene rutinas personalizadas con pesos calculados automáticamente. 💪🔥';
  if(navigator.share){navigator.share({title:'FitApp',text:msg});}
  else{navigator.clipboard.writeText(msg).then(()=>alert('Mensaje copiado al portapapeles'));}
};

window.openFeedback=()=>{feedbackStars=0;updateStars();document.getElementById('feedbackModal').classList.add('show');};
window.closeFeedbackModal=(e)=>{if(!e||e.target.id==='feedbackModal')document.getElementById('feedbackModal').classList.remove('show');};
window.setStar=(n)=>{feedbackStars=n;updateStars();};
function updateStars(){document.querySelectorAll('.star').forEach((s,i)=>s.classList.toggle('active',i<feedbackStars));}
window.submitFeedback=()=>{
  const txt=document.getElementById('feedbackText').value;
  if(!feedbackStars){alert('Selecciona una valoración');return;}
  alert(`¡Gracias! Recibimos tu valoración de ${feedbackStars} ⭐${txt?'\n"'+txt+'"':''}`);
  document.getElementById('feedbackModal').classList.remove('show');
};

// ── TABS ─────────────────────────────────────────────────────────
window.showTab=(tab,btn)=>{
  document.querySelectorAll('.nbtn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active'); expanded={}; altState={};
  if(tab==='rutina'){buildStrip();renderWorkout();}
  else if(tab==='activacion')renderActPage();
  else if(tab==='alimentos')renderFood();
  else if(tab==='tranquilidad')renderRelax();
  else if(tab==='test'){window.testState=null;renderTestPage();}
  else if(tab==='medidas')renderMedidas();
  else if(tab==='perfil')renderProfile();
  else renderStats();
  document.getElementById('main').scrollTop=0;
};

// ── INTERACTIONS ─────────────────────────────────────────────────
window.toggleEx=(i)=>{expanded[i]=!expanded[i];renderWorkout();};
window.toggleCheck=(ck)=>{checked[ck]=!checked[ck];if(window.saveToCloud)window.saveToCloud();buildStrip();renderWorkout();};
window.toggleAct=(ck)=>{actChk[ck]=!actChk[ck];if(window.saveToCloud)window.saveToCloud();renderWorkout();};
window.toggleActP=(ck)=>{actChk[ck]=!actChk[ck];if(window.saveToCloud)window.saveToCloud();renderActPage();};
window.setAlt=(i,side)=>{altState[`${curDay}_${i}`]=side;renderWorkout();};
window.saveWeight=(key,val)=>{if(val&&val.trim()!=='')weights[key]=val;else delete weights[key];if(window.saveToCloud)window.saveToCloud();};
window.resetActRound=()=>{
  const tk=todayKey();let r=1;
  while(ACTIVATION.items.some((_,i)=>actChk[`act_${tk}_r${r}_${i}`]))r++;
  ACTIVATION.items.forEach((_,i)=>{actChk[`act_${tk}_r${r}_${i}`]=true;delete actChk[`act_${tk}_${i}`];});
  if(window.saveToCloud)window.saveToCloud();
  renderActPage();
};
window.prevWeek=()=>{if(weekNum>1)weekNum--;document.getElementById('weekNum').textContent=weekNum;if(window.saveToCloud)window.saveToCloud();renderStats();};
window.nextWeek=()=>{weekNum++;document.getElementById('weekNum').textContent=weekNum;if(window.saveToCloud)window.saveToCloud();renderStats();};
window.resetWeek=()=>{if(confirm('¿Reiniciar todos los ejercicios de esta semana?')){DAYS.forEach((d,di)=>d.exercises.forEach((_,ei)=>delete checked[`${weekNum}_${di}_${ei}`]));if(window.saveToCloud)window.saveToCloud();buildStrip();renderStats();}};
window.saveMedidas=()=>{
  const entry={date:new Date().toLocaleDateString('es-PE',{day:'2-digit',month:'long',year:'numeric'})};
  let hasAny=false;
  BODY_FIELDS.forEach(f=>{const el=document.getElementById('mf_'+f.key);if(el&&el.value&&el.value.trim()!==''){entry[f.key]=el.value.trim();hasAny=true;}});
  if(!hasAny){alert('Ingresa al menos una medida.');return;}
  bodyMeas.push(entry);if(window.saveToCloud)window.saveToCloud();renderMedidas();
};
window.deleteMedida=(idx)=>{if(!confirm('¿Borrar este registro?'))return;bodyMeas.splice(idx,1);if(window.saveToCloud)window.saveToCloud();renderMedidas();};
window.clearAllMedidas=()=>{if(!confirm('¿Borrar TODO el historial?'))return;bodyMeas=[];if(window.saveToCloud)window.saveToCloud();renderMedidas();};
function calcStreak(){
  let s=0;const ti=(()=>{let d=new Date().getDay();return d===0?6:d-1;})();
  for(let i=ti;i>=0;i--){const d=DAYS[i];if(d.rest){s++;continue;}const dn=d.exercises.filter((_,ei)=>checked[`${weekNum}_${i}_${ei}`]).length;if(dn>0)s++;else break;}return s;
}

// ── AUTH ─────────────────────────────────────────────────────────
window.signInWithGoogle=async()=>{try{await signInWithPopup(auth,provider);}catch(e){alert('Error al iniciar sesión.');}};
window.doSignOut=()=>{if(confirm('¿Cerrar sesión?'))signOut(auth);};
window.skipLogin=()=>{
  document.getElementById('loginScreen').classList.remove('show');
  const savedOb=localStorage.getItem('fitapp_ob');
  if(!savedOb||!JSON.parse(savedOb).onboardDone){
    document.getElementById('onboardScreen').classList.add('show');
    obRender();
  } else {
    showApp();
  }
};

// ── CLOUD SYNC ───────────────────────────────────────────────────
async function loadFromCloud(){
  try{
    const ref=doc(db,'users',currentUser.uid);const snap=await getDoc(ref);
    if(snap.exists()){
      const data=snap.data();
      if(data.checked)checked=data.checked;if(data.oneRM)oneRM=data.oneRM;
      if(data.actChk)actChk=data.actChk;if(data.weights)weights=data.weights;
      if(data.bodyMeas)bodyMeas=data.bodyMeas;if(data.weekNum)weekNum=data.weekNum;
    }
  }catch(e){console.log('Load error:',e);}
}

window.saveToCloud=async()=>{
  if(!currentUser)return;
  clearTimeout(saveTimeout);
  saveTimeout=setTimeout(async()=>{
    try{await setDoc(doc(db,'users',currentUser.uid),{checked,actChk,weights,bodyMeas,weekNum,oneRM,updatedAt:new Date().toISOString()});}
    catch(e){console.log('Save error:',e);}
  },800);
};

// ── BOOT ─────────────────────────────────────────────────────────
const splashTimeout=setTimeout(()=>{
  document.getElementById('splash').classList.add('hide');
  document.getElementById('loginScreen').classList.add('show');
},5000);

onAuthStateChanged(auth,async(user)=>{
  clearTimeout(splashTimeout);
  if(user){
    currentUser=user;
    document.getElementById('loginScreen').classList.remove('show');
    document.getElementById('onboardScreen').classList.remove('show');
    const av=document.getElementById('userAvatar');
    if(user.photoURL)av.innerHTML=`<img src="${user.photoURL}" class="user-avatar" onclick="showTab('perfil',document.querySelectorAll('.nbtn')[6])"/>`;
    else av.textContent=user.displayName?user.displayName[0].toUpperCase():'👤';
    try{await loadFromCloud();}catch(e){}
    document.getElementById('splash').classList.add('hide');
    document.getElementById('weekNum').textContent=weekNum;
    const savedOb=localStorage.getItem('fitapp_ob');
    if(!savedOb||!JSON.parse(savedOb).onboardDone){
      document.getElementById('onboardScreen').classList.add('show');obRender();
    } else {
      if(JSON.parse(savedOb).rmExercise&&JSON.parse(savedOb).rmResult)oneRM[JSON.parse(savedOb).rmExercise]=JSON.parse(savedOb).rmResult;
      showApp();
    }
  } else {
    currentUser=null;
    document.getElementById('splash').classList.add('hide');
    const savedOb=localStorage.getItem('fitapp_ob');
    if(!savedOb||!JSON.parse(savedOb).onboardDone){
      document.getElementById('onboardScreen').classList.add('show');obRender();
    } else {
      if(JSON.parse(savedOb).rmExercise&&JSON.parse(savedOb).rmResult)oneRM[JSON.parse(savedOb).rmExercise]=JSON.parse(savedOb).rmResult;
      showApp();
    }
  }
});

// Expose
window.renderTestPage=renderTestPage;window.renderTestList=renderTestList;
</script>
</body>
</html>
